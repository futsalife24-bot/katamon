      ctx.fillRect(0, 0, VW, VH);
    }

    if (!stageBackground) {
    // テーマごとの天体と地平線の光。背景画像を増やさず、試合ごとに位置が少し変わる。
    const orbX = 78 + ((parallaxSeed * 0.137) % (VW - 156));
    const orbY = currentThemeKey === 'desert' ? 168 : 92;
    const orbRadius = currentThemeKey === 'desert' ? 32 : currentThemeKey === 'volcanic' ? 22 : 20;
    const glow = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbRadius * 4.8);
    glow.addColorStop(0, fx.glow);
    glow.addColorStop(0.36, fx.glow);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(orbX - orbRadius * 5, orbY - orbRadius * 5, orbRadius * 10, orbRadius * 10);
    ctx.save();
    ctx.shadowColor = fx.orb;
    ctx.shadowBlur = 18;
    ctx.fillStyle = fx.orb;
    ctx.beginPath();
    ctx.arc(orbX, orbY, orbRadius, 0, Math.PI * 2);
    ctx.fill();
    if (currentThemeKey === 'grass' || currentThemeKey === 'snow') {
      ctx.fillStyle = currentTheme.sky[0];
      ctx.beginPath();
      ctx.arc(orbX + 8, orbY - 5, orbRadius * 0.92, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    if (currentThemeKey === 'snow') {
      // 淡いオーロラ。主張を抑えてUIと弾道を見やすく保つ。
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.lineCap = 'round';
      for (let band = 0; band < 3; band++) {
        const aurora = ctx.createLinearGradient(0, 0, VW, 0);
        aurora.addColorStop(0, 'rgba(76,255,208,0)');
        aurora.addColorStop(0.45, band === 1 ? 'rgba(96,196,255,0.65)' : 'rgba(98,255,195,0.55)');
        aurora.addColorStop(1, 'rgba(132,109,255,0)');
        ctx.strokeStyle = aurora;
        ctx.lineWidth = 16 - band * 3;
        ctx.beginPath();
        ctx.moveTo(-40, 105 + band * 28);
        ctx.bezierCurveTo(120, 35 + band * 22, 350, 210 - band * 18, VW + 40, 70 + band * 30);
        ctx.stroke();
      }
      ctx.restore();
    } else if (currentThemeKey === 'volcanic') {
      const lavaGlow = ctx.createRadialGradient(VW * 0.62, GROUND_MIN_Y + 10, 10, VW * 0.62, GROUND_MIN_Y, 260);
      lavaGlow.addColorStop(0, 'rgba(255,72,20,0.34)');
      lavaGlow.addColorStop(1, 'rgba(255,50,10,0)');
      ctx.fillStyle = lavaGlow;
      ctx.fillRect(0, 170, VW, GROUND_MIN_Y);
    }
    }

    // 星・火の粉・雪・砂埃をテーマ別に描き分ける。
    const t = performance.now() * 0.001;
    for (let i = 0; i < 44; i++) {
      let sx = (i * 137.5 + parallaxSeed * 0.19) % VW;
      let sy = (i * 71.3 + parallaxSeed * 0.07) % (GROUND_MIN_Y - 24);
      let size = 0.8 + (i % 4) * 0.45;
      let alpha = 0.35 + (i % 5) * 0.1;
      if (currentThemeKey === 'volcanic') {
        sx = (sx + Math.sin(t * 0.7 + i) * 18 + VW) % VW;
        sy = GROUND_MIN_Y - ((sy + t * (18 + i % 7)) % (GROUND_MIN_Y - 36));
        size += 0.6;
      } else if (currentThemeKey === 'snow') {
        sx = (sx + t * (5 + i % 4)) % VW;
        sy = (sy + t * (12 + i % 6)) % (GROUND_MIN_Y - 18);
      } else if (currentThemeKey === 'desert') {
        sx = (sx + t * (10 + i % 7)) % VW;
        sy = 145 + (sy % 185) + Math.sin(t + i) * 5;
        alpha *= 0.48;
      } else {
        alpha *= 0.72 + Math.sin(t * 2 + i) * 0.2;
      }
      ctx.globalAlpha = Math.max(0.08, alpha);
      ctx.fillStyle = fx.particle;
      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const vignette = ctx.createRadialGradient(VW / 2, VH * 0.4, 80, VW / 2, VH * 0.4, VW * 0.72);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.28)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, VW, VH);
  }

  // ===== 遠景パララックス(山のシルエット・雲。カメラより遅く動いて奥行きを出す) =====
  function bgHillY(x, seedOffset, baseY, amp) {
    const p = x + seedOffset;
    return baseY
      + Math.sin(p * 0.006) * amp
      + Math.sin(p * 0.017 + 1.3) * amp * 0.4
      + Math.sin(p * 0.041 + 2.7) * amp * 0.18;
  }

  function drawHillLayer(seedOffset, baseY, amp, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    const fromX = -200, toX = STAGE_W + 200, step = 24;
    ctx.moveTo(fromX, bgHillY(fromX, seedOffset, baseY, amp));
    for (let x = fromX + step; x <= toX; x += step) {
      ctx.lineTo(x, bgHillY(x, seedOffset, baseY, amp));
    }
    ctx.lineTo(toX, GROUND_MAX_Y + 50);
    ctx.lineTo(fromX, GROUND_MAX_Y + 50);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(fromX, bgHillY(fromX, seedOffset, baseY, amp));
    for (let x = fromX + step; x <= toX; x += step) {
      ctx.lineTo(x, bgHillY(x, seedOffset, baseY, amp));
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawCloudShape(cx, cy, r) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - r * 0.6, cy + r * 0.15, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + r * 0.6, cy + r * 0.1, r * 0.65, r * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawClouds() {
    ctx.save();
    ctx.fillStyle = currentTheme.cloud;
    const t = Date.now() * 0.008;
    for (let i = 0; i < 6; i++) {
      const cx = ((i * 260 + t * 4 + parallaxSeed) % (STAGE_W + 400)) - 200;
      const cy = 60 + (i % 3) * 45;
      drawCloudShape(cx, cy, 34 + (i % 2) * 14);
    }
    ctx.restore();
  }

  function drawParallax() {
    // 専用背景が読み込めたテーマでは、画像内の遠景を活かして二重の山・雲を描かない。
    if (getReadyStageBackground()) return;
    ctx.save();
    applyWorldCamera(0.15);
    drawHillLayer(parallaxSeed, 220, 46, currentTheme.farHill);
    ctx.restore();
    ctx.save();
    applyWorldCamera(0.35);
    drawHillLayer(parallaxSeed + 500, 270, 60, currentTheme.nearHill);
    ctx.restore();
    ctx.save();
    applyWorldCamera(0.1);
    drawClouds();
    ctx.restore();
  }

  function drawTerrain() {
    // 地形マスク(ピクセル単位で穴があいた実体)をそのまま描画
    ctx.drawImage(terrainCanvas, 0, 0);
    // 地形マスクから生成した全周の境界線。浮島・縦崖・爆破穴も実際の形どおりに縁取る。
    ctx.drawImage(terrainRimCanvas, 0, 0);
    // 橋は既存の薄床地形に重ねた装飾。地形と一緒に爆破で削れる。
    ctx.drawImage(bridgeCanvas, 0, 0);
  }

  function drawDeadLine() {
    const y = worldToScreenY(DEAD_LINE_Y);
    const pulse = 0.68 + Math.sin(performance.now() * 0.006) * 0.18;
    ctx.save();
    ctx.shadowColor = `rgba(255,45,55,${pulse})`;
    ctx.shadowBlur = 10;
    ctx.strokeStyle = `rgba(255,72,72,${pulse + 0.12})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([13, 7]);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(VW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,95,95,0.95)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DEAD LINE', VW / 2, y - 6);
    ctx.restore();
  }

  // 接地点付近の地形傾斜(ラジアン)。急すぎる斜面は見た目が破綻しないようクランプ
  function groundSlopeAt(u) {
    const d = 14;
    const feetY = u.y + UNIT_RADIUS;
    const leftGround = walkableGroundYAt(Math.max(0, u.x - d), feetY);
    const rightGround = walkableGroundYAt(Math.min(STAGE_W, u.x + d), feetY);
    const y1 = leftGround === null ? feetY : leftGround;
    const y2 = rightGround === null ? feetY : rightGround;
    const MAX_TILT = 0.5; // 約28.6度
    return Math.max(-MAX_TILT, Math.min(MAX_TILT, Math.atan2(y2 - y1, 2 * d)));
  }

  function drawUnit(u) {
    const a = unitAnchor(u);
    const isBossUnit = isBossMatch && u.side === 'cpu';
    const img = u.character ? charImages[u.character] : null;
    const imgReady = img && img.complete && img.naturalWidth > 0;
    const sourceFacesLeft = !!CHARACTERS[u.character]?.facesLeft;
    // プレイヤーは右、CPUは左を向く。左向き素材だけ反転ルールを入れ替える。
    const facingLeft = (u.side === 'cpu') !== sourceFacesLeft;
    const tilt = u.grounded ? groundSlopeAt(u) : 0; // 空中では傾けない

    // 画像は接地ライン(groundY = a.y + UNIT_RADIUS)に底面を合わせて描画
    const h = SPRITE_SIZE;
    const w = imgReady ? h * (img.naturalWidth / img.naturalHeight) : h;
    const imgTopAbs = a.y + UNIT_RADIUS - h;

    ctx.save();
    ctx.translate(a.x, a.y);
    if (isBossUnit) {
      ctx.beginPath();
      ctx.arc(0, UNIT_RADIUS - h / 2, h / 2 + 8, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    if (imgReady) {
      ctx.save();
      ctx.globalAlpha = u.hp > 0 ? 1 : 0.4;
      // 接地点(0, UNIT_RADIUS)を軸に地形傾斜ぶんだけ回転。flipより外側に回転をかけることで
      // 反転していても傾き方向が世界座標基準(実際の地形)と一致するようにする
      ctx.translate(0, UNIT_RADIUS);
      ctx.rotate(tilt);
      if (facingLeft) ctx.scale(-1, 1);
      ctx.translate(0, -UNIT_RADIUS);
      ctx.drawImage(img, -w / 2, UNIT_RADIUS - h, w, h);
      ctx.restore();
    } else {
      // 画像読み込み中のフォールバック(色付き円)
      ctx.beginPath();
      ctx.arc(0, 0, UNIT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = u.hp > 0 ? u.color : '#555';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(u.label, 0, 4);
    }
    ctx.restore();

    if (isBossUnit) {
      ctx.save();
      ctx.fillStyle = '#ffd24a';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', a.x, imgTopAbs - 2);
      ctx.restore();
    }

    // HPバー
    const barW = 70, barX = a.x - barW / 2, barY = imgTopAbs - (isBossUnit ? 18 : 4);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, 8);
    const ratio = Math.max(0, u.hp / u.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#7be07b' : ratio > 0.25 ? '#f0c860' : '#f06060';
    ctx.fillRect(barX, barY, barW * ratio, 8);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.fillText(`${u.hp}/${u.maxHp}`, a.x, barY - 3);
  }

  function drawWindMeter() {
    const cx = VW / 2, cy = 56;
    ctx.save();

    ctx.strokeStyle = calmWind ? '#72e8ff' : '#ffe08a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - dir * len / 2, cy + 8);
    ctx.lineTo(cx + dir * len / 2, cy + 8);
    ctx.stroke();
    if (!calmWind) {
      // 矢じり
      const ax = cx + dir * len / 2;
      ctx.beginPath();
      ctx.moveTo(ax, cy + 8);
      ctx.lineTo(ax - dir * 7, cy + 4);
      ctx.lineTo(ax - dir * 7, cy + 12);
      ctx.closePath();
      ctx.fillStyle = '#ffe08a';

  // 「減った分=そのターンでどれだけ移動したか」が常に見える =====

  // 引っ張り線(スクリーン座標。カメラの影響を受けないUIレイヤー)
  function drawPullLine() {
    if (!aimState) return;
    const { origin, curX, curY } = aimState;
    const cancelled = isInCancelZone(curX, curY);
    ctx.save();
    ctx.strokeStyle = cancelled ? 'rgba(255,90,90,0.85)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(curX, curY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(curX, curY, 10, 0, Math.PI * 2);
    ctx.fillStyle = cancelled ? 'rgba(255,90,90,0.85)' : 'rgba(255,255,255,0.8)';
    ctx.fill();
    ctx.restore();
  }

  // 弾道プレビュー(ワールド座標。カメラ変換の中で描画する)
  function drawTrajectoryPreview() {
    if (!aimState) return;
    const { anchor, origin, curX, curY } = aimState;
    if (isInCancelZone(curX, curY)) return;

    let dx = curX - origin.x;
    let dy = curY - origin.y;
    const dist = Math.min(MAX_DRAG, Math.hypot(dx, dy));
    if (dist < FIRE_MIN_DRAG) return;
    const ang = Math.atan2(dy, dx);
    dx = Math.cos(ang) * dist;
    dy = Math.sin(ang) * dist;

    // 発射方向は引っ張りの逆向き(自キャラの性能を反映)
    const def = CHARACTERS[player.character];
    const { vx0, vy0 } = computeLaunchVelocity(dx, dy, def);
    const gravity = GRAVITY * (def.gravityMul || 1);
    const previewT = trajectoryPreviewDuration(vx0, vy0, gravity) * (def.guideMul || 1);
    const steps = 14;
    const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX * def.windMul;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let i = 1; i <= steps; i++) {
      const t = (previewT * i) / steps;
      const px = anchor.x + vx0 * t + 0.5 * windAccel * t * t;
      const py = anchor.y + vy0 * t + 0.5 * gravity * t * t;
      ctx.beginPath();
      ctx.arc(px, py, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 画面外の敵の方向インジケータ(スクリーン座標)
  function drawOffscreenIndicator() {
    const sx = worldToScreenX(cpu.x);
    if (sx >= -UNIT_RADIUS && sx <= VW + UNIT_RADIUS) return;
    const onRight = sx > VW;
    const ix = onRight ? VW - 16 : 16;
    const iy = Math.max(180, Math.min(CONTROL_PANEL_Y - 30, worldToScreenY(cpu.y)));
    ctx.save();
    ctx.fillStyle = 'rgba(255,107,107,0.9)';
    ctx.beginPath();
    if (onRight) {
      ctx.moveTo(ix + 10, iy);
      ctx.lineTo(ix - 6, iy - 9);
      ctx.lineTo(ix - 6, iy + 9);
    } else {
      ctx.moveTo(ix - 10, iy);
      ctx.lineTo(ix + 6, iy - 9);
      ctx.lineTo(ix + 6, iy + 9);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('敵', ix + (onRight ? -14 : 14), iy + 4);
    ctx.restore();
  }

  function drawProjectile() {
    for (const p of projectiles) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));

      if (p.fireworkShard) {
        ctx.shadowColor = '#ff9d42';
        ctx.shadowBlur = 12;
        const spark = ctx.createLinearGradient(-24, 0, 10, 0);
        spark.addColorStop(0, 'rgba(255,116,40,0)');
        spark.addColorStop(0.55, '#ffb84a');
        spark.addColorStop(1, '#fff3b0');
        ctx.strokeStyle = spark;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-24, 0);
        ctx.lineTo(10, 0);
        ctx.stroke();
        ctx.fillStyle = '#fff5bb';
        ctx.beginPath();
        ctx.arc(10, 0, 3.2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.pierce) {
        // 貫通弾は高密度のエネルギーボルト。芯・外光・速度線を分けて描く。
        ctx.shadowColor = '#5de8ff';
        ctx.shadowBlur = 18;
        const beam = ctx.createLinearGradient(-32, 0, 13, 0);
        beam.addColorStop(0, 'rgba(79,195,247,0)');
        beam.addColorStop(0.55, 'rgba(79,195,247,0.48)');
        beam.addColorStop(1, '#dfffff');
        ctx.strokeStyle = beam;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(-32, 0);
        ctx.lineTo(12, 0);
        ctx.stroke();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.lineTo(15, 0);
        ctx.stroke();
        ctx.fillStyle = '#eaffff';
        ctx.beginPath();
        ctx.moveTo(17, 0);
        ctx.lineTo(7, -6);
        ctx.lineTo(7, 6);
        ctx.closePath();
        ctx.fill();
      } else {
        // 通常弾は金属製の砲弾。飛翔方向に合わせた尾・胴・帯・先端で立体感を出す。
        const hot = p.blastMul > 1.45;
        const trail = ctx.createLinearGradient(-30, 0, -4, 0);
        trail.addColorStop(0, 'rgba(255,120,36,0)');
        trail.addColorStop(0.55, hot ? 'rgba(255,80,20,0.45)' : 'rgba(255,192,74,0.30)');
        trail.addColorStop(1, hot ? 'rgba(255,223,112,0.92)' : 'rgba(255,238,170,0.72)');
        ctx.strokeStyle = trail;
        ctx.lineWidth = hot ? 7 : 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-30, 0);
        ctx.lineTo(-4, 0);
        ctx.stroke();

        ctx.shadowColor = hot ? '#ff5b22' : '#ffd45c';
        ctx.shadowBlur = hot ? 16 : 9;
        const shell = ctx.createLinearGradient(0, -6, 0, 6);
        shell.addColorStop(0, '#fff2b0');
        shell.addColorStop(0.28, hot ? '#d85a24' : '#9a7541');
        shell.addColorStop(0.72, hot ? '#71301f' : '#40372e');
        shell.addColorStop(1, '#17191d');
        ctx.fillStyle = shell;
        ctx.beginPath();
        ctx.moveTo(11, 0);
        ctx.quadraticCurveTo(6, -6, -5, -5);
        ctx.lineTo(-9, -3);
        ctx.lineTo(-9, 3);
        ctx.lineTo(-5, 5);
        ctx.quadraticCurveTo(6, 6, 11, 0);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(0,0,0,0.78)';
        ctx.lineWidth = 1.3;
        ctx.stroke();
        ctx.fillStyle = hot ? '#ff9d42' : '#d0a451';
        ctx.fillRect(-4, -5, 3, 10);
        ctx.strokeStyle = 'rgba(255,255,255,0.48)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-3, -3.2);
        ctx.lineTo(5.5, -2.4);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ===== ミニマップ(ステージ全体とカメラの可視範囲を表示) =====

  function drawParticles() {
    for (const ring of empRings) {
      const progress = 1 - ring.life / ring.maxLife;
      ctx.save();
      ctx.globalAlpha = Math.max(0, ring.life / ring.maxLife) * 0.75;
      ctx.strokeStyle = '#66e8ff';
      ctx.shadowColor = '#66e8ff';
      ctx.shadowBlur = 14;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, ring.radius * (0.28 + progress * 0.72), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    for (const pt of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFloatTexts() {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 15px sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 3;
    for (const ft of floatTexts) {
      ctx.globalAlpha = Math.max(0, ft.life / 0.9);
      ctx.strokeText(ft.text, ft.x, ft.y);
      ctx.fillStyle = ft.color;
      ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.restore();
  }

  function drawSpecialFlash() {
    if (specialFlash.timer <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, specialFlash.timer * 2.2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#ff6b3a';
    ctx.lineWidth = 4;
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText(specialFlash.text, VW / 2, VH * 0.42);
    ctx.fillText(specialFlash.text, VW / 2, VH * 0.42);
    ctx.restore();
  }

  const soundBtn = { x: VW - 28, y: 20, r: 17 }; // 右上・CPUパネルと重ならない高さ
  function drawSoundToggle() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(soundBtn.x, soundBtn.y, soundBtn.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(soundOn ? '♪' : '✕', soundBtn.x, soundBtn.y + 1);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // ===== 下部コントローラパネル(ここより下は地形を描かず操作専用のデッドゾーンにする) =====
  function drawControlPanel() {
    if (gamePhase !== 'battle') return;
    ctx.save();
    ctx.fillStyle = '#151826';
    ctx.fillRect(0, CONTROL_PANEL_Y, VW, VH - CONTROL_PANEL_Y);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, CONTROL_PANEL_Y);
    ctx.lineTo(VW, CONTROL_PANEL_Y);
    ctx.stroke();
    ctx.restore();
  }

  function drawFireButton() {
    if (gamePhase !== 'battle') return;
    const active = currentTurn === 'player' && !awaitingResolve && !matchOver && !cutIn && player.grounded;
    ctx.save();
    ctx.beginPath();
    ctx.arc(FIRE_BTN.x, FIRE_BTN.y, FIRE_BTN.r, 0, Math.PI * 2);
    ctx.fillStyle = aimState ? 'rgba(255,210,74,0.16)' : active ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();
    if (!aimState) {
      ctx.fillStyle = active ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('引いて発射', FIRE_BTN.x, FIRE_BTN.y + 5);
    }
    ctx.restore();
  }

  function drawMenuButton() {
    if (gamePhase !== 'battle') return;
    const active = canOpenMenu();
    ctx.save();
    ctx.beginPath();
    ctx.arc(menuBtn.x, menuBtn.y, menuBtn.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = active ? '#fff' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    for (const dy of [-5, 0, 5]) {
      ctx.beginPath();
      ctx.moveTo(menuBtn.x - 8, menuBtn.y + dy);
      ctx.lineTo(menuBtn.x + 8, menuBtn.y + dy);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawMenuOverlay() {
    if (!menuOpen) return;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('メニュー', VW / 2, VH / 2 - 90);

    const items = [
      [menuResumeBtn, 'ゲームに戻る', ''],
      [menuSuspendBtn, '中断してタイトルへ', '進行状況を保存します']
    ];
    for (const [b, label, sub] of items) {
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, 10);
      else ctx.rect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      ctx.fillStyle = '#2c3a63';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText(label, b.x, b.y + (sub ? -3 : 5));
      if (sub) {
        ctx.font = '10px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(sub, b.x, b.y + 15);
      }
    }
    ctx.restore();
  }

  function drawCancelZone() {
    if (!aimState) return;
    const inCancel = isInCancelZone(aimState.curX, aimState.curY);
    ctx.save();
    ctx.strokeStyle = inCancel ? 'rgba(255,90,90,0.9)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.arc(FIRE_BTN.x, FIRE_BTN.y, CANCEL_RADIUS, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = inCancel ? '#ff5a5a' : 'rgba(255,255,255,0.55)';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(inCancel ? 'ここで離すとキャンセル' : '', FIRE_BTN.x, FIRE_BTN.y - FIRE_BTN.r - 10);
    ctx.restore();
  }

  function drawMoveButtons() {
    const active = currentTurn === 'player' && player.moveLockTurns <= 0 && !awaitingResolve && !matchOver && !cutIn;
    ctx.save();
    ctx.textBaseline = 'middle';
    for (const [btn, dir, glyph] of [[leftBtn, -1, '◀'], [rightBtn, 1, '▶']]) {
      const held = active && moveDir === dir;
      ctx.beginPath();
      ctx.arc(btn.x, btn.y, BTN_R, 0, Math.PI * 2);
      ctx.fillStyle = held ? 'rgba(255,255,255,0.4)' : active ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.strokeStyle = active ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.4)';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(glyph, btn.x, btn.y + 2);
    }
    ctx.restore();
  }

  function render() {
    // 地形名・テーマ表示は対戦中だけ見せ、タイトルやキャラ選択では内部情報を隠す。
    debugPanel.style.display = gamePhase === 'battle' ? 'block' : 'none';
    ctx.save();
    if (shakeTimer > 0) {
      const mag = shakeMag * (shakeTimer / 0.3);
      ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
    }

    if (gamePhase === 'loading' && areCoreImagesReady()) gamePhase = 'press';
    if (gamePhase === 'loading') {
      drawLoadingScreen();
      ctx.restore();
      return;
    }
    if (gamePhase === 'title') {
      drawSky();
      drawParallax();
      ctx.save();
      applyWorldCamera();
      drawTerrain();
      ctx.restore();
      drawTitleScreen();
      ctx.restore();
      return;
    }
    if (gamePhase === 'press') {
      drawLoadingScreen();
      ctx.restore();
      return;
    }
    if (gamePhase === 'select') {
      drawCharacterSelect();
      ctx.restore();
      return;
    }

    drawSky();
    drawParallax();

    // ワールドレイヤー(カメラの影響を受ける)
    ctx.save();
    applyWorldCamera();
    drawTerrain();
    drawTrajectoryPreview();
    drawProjectile();
    drawParticles();
    drawUnit(player);
    drawUnit(cpu);
    drawFloatTexts();
    ctx.restore();

    // UIレイヤー(スクリーン固定)
    drawDeadLine();
    drawOffscreenIndicator();
    drawWindMeter();
    drawUnitPanel(player, 10, 'left');
    drawUnitPanel(cpu, VW - 10, 'right');
    drawMinimap();
    drawTurnInfo();
    drawControlPanel();
    drawMoveButtons();
    drawFireButton();
    drawPullLine();
    drawCancelZone();
    drawSpecialButton();
    drawSoundToggle();
    drawMenuButton();
    drawResultBanner();
    drawBossBanner();
    drawSpecialFlash();
    drawCutIn();
    drawMenuOverlay();
    ctx.restore();
  }

  function updateDebug() {
    debugPanel.textContent =
      `${currentPattern}${startOnIsland ? '(浮島スタート)' : ''} / テーマ:${currentThemeKey}`;
  }

  // ===== 入力(引っ張り照準) =====
  function canvasPointFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const scaleX = VW / rect.width;
    const scaleY = VH / rect.height;
    return { x: cx * scaleX, y: cy * scaleY };
  }

  function beginPinchIfPossible() {
    const touches = [...activeTouchPoints.entries()].filter(([, p]) => p.y < CONTROL_PANEL_Y);
    if (touches.length < 2) return false;
    const [first, second] = touches.slice(-2);
    const a = first[1], b = second[1];
    const distance = Math.hypot(b.x - a.x, b.y - a.y);
    if (distance < 12) return false;
    const midpointX = (a.x + b.x) / 2;

    // 1本目で始まっていたパンを2本指ズームへ切り替える。
    if (inputMode === 'aim') aimState = null;
    if (inputMode === 'moveL' || inputMode === 'moveR') moveDir = 0;
    inputMode = 'pinch';
    inputPointerId = null;
    pinchState = {
      ids: [first[0], second[0]],
      startDistance: distance,
      startZoom: cameraZoom,
      anchorWorldX: cameraX + midpointX / cameraZoom
    };
    return true;
  }

  function hitButton(p, btn) {
    return Math.hypot(p.x - btn.x, p.y - btn.y) <= BTN_R + 12;
  }

  function onPointerDown(e) {
    e.preventDefault();
    if (cutIn) return; // カットイン中は入力を受け付けない
    const p0 = canvasPointFromEvent(e);
    if (gamePhase === 'loading') return;
    if (gamePhase === 'press') {
      // 指を離した瞬間を、スマホで確実な音声再生トリガーとして使う。
      inputMode = 'start';
      inputPointerId = e.pointerId;
      canvas.setPointerCapture(e.pointerId);
      return;
    }
    startTitleBgm();
    if (gamePhase === 'title') {
      if (hitRect(p0, titleVsCpuBtn)) {
        playUiSound();
        selectWheelPosition = 0;
        selectWheelVelocity = 0;
        selectWheelDragging = false;
        gamePhase = 'select';
      }
      return;
    }
    if (gamePhase === 'select') {
      if (hasSuspendedSave && hitRect(p0, resumeBtn)) {
        resumeSuspendedMatch();
        return;
      }
      const tappedCard = getSelectCardAtPoint(p0);
      selectWheelDragging = true;
      selectWheelLastY = p0.y;
      selectWheelLastTime = e.timeStamp;
      selectWheelTravel = 0;
      selectWheelTapKey = tappedCard?.key || null;
      selectWheelVelocity = 0;
      inputMode = 'selectWheel';
      inputPointerId = e.pointerId;
      canvas.setPointerCapture(e.pointerId);
      return;
    }

    if (menuOpen) {
      if (hitRect(p0, menuResumeBtn)) { menuOpen = false; return; }
      if (hitRect(p0, menuSuspendBtn)) {
        saveSuspendedMatch();
        menuOpen = false;
        stopStageBgm();
        gamePhase = 'title';
        hasSuspendedSave = true;
        startTitleBgm();
        return;
      }
      return; // メニュー表示中は他の操作を無視
    }

    if (canOpenMenu() && Math.hypot(p0.x - menuBtn.x, p0.y - menuBtn.y) <= menuBtn.r + 10) {
      menuOpen = true;
      return;
    }

    if (Math.hypot(p0.x - soundBtn.x, p0.y - soundBtn.y) <= soundBtn.r + 10) {
      soundOn = !soundOn;
      if (soundOn) {
        playUiSound();
        if (gamePhase === 'battle') playStageBgm(currentThemeKey);
        else startTitleBgm();
      } else {
        titleBgm.pause();
        stageBgm.pause();
      }
      return;
    }

    if (matchOver) {
      const b = continueBtn;
      if (Math.abs(p0.x - b.x) <= b.w / 2 && Math.abs(p0.y - b.y) <= b.h / 2) {
        resetMatch(true);
      }
      return;
    }

    // 戦場エリアの2本指操作。指を広げると等倍へ、縮めると全景へ戻る。
    if (e.pointerType === 'touch' && p0.y < CONTROL_PANEL_Y) {
      activeTouchPoints.set(e.pointerId, p0);
      canvas.setPointerCapture(e.pointerId);
      if (beginPinchIfPossible()) return;
    }

    // 移動ボタン・必殺ボタン・発射ボタンは自分のターンでのみ
    if (currentTurn === 'player' && !awaitingResolve) {
      if (player.moveLockTurns <= 0 && hitButton(p0, leftBtn)) {
        inputMode = 'moveL'; inputPointerId = e.pointerId; moveDir = -1;
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      if (player.moveLockTurns <= 0 && hitButton(p0, rightBtn)) {
        inputMode = 'moveR'; inputPointerId = e.pointerId; moveDir = 1;
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      if (isSpecialReady(player) && Math.hypot(p0.x - specialBtn.x, p0.y - specialBtn.y) <= specialBtn.r + 10) {
        specialArmed = !specialArmed;
        return;
      }
      if (player.grounded && Math.hypot(p0.x - FIRE_BTN.x, p0.y - FIRE_BTN.y) <= FIRE_BTN.r + 10) {
        // 固定アンカー式:発射ボタンの中心から引っ張った分だけ飛ぶ
        inputMode = 'aim'; inputPointerId = e.pointerId;
        aimState = { anchor: unitAnchor(player), origin: { x: FIRE_BTN.x, y: FIRE_BTN.y }, curX: p0.x, curY: p0.y };
        canvas.setPointerCapture(e.pointerId);
        return;
      }
    }

    // それ以外は画面を直接スライドして視点移動(どちらのターン中でも可・離しても位置はそのまま)
    if (p0.y < CONTROL_PANEL_Y) {
      inputMode = 'pan'; inputPointerId = e.pointerId;
      panLastX = p0.x;
      canvas.setPointerCapture(e.pointerId);
    }
  }

  function onPointerMove(e) {
    const p = canvasPointFromEvent(e);
    if (e.pointerType === 'touch' && activeTouchPoints.has(e.pointerId)) {
      activeTouchPoints.set(e.pointerId, p);
    }
    if (pinchState && pinchState.ids.includes(e.pointerId)) {
      const a = activeTouchPoints.get(pinchState.ids[0]);
      const b = activeTouchPoints.get(pinchState.ids[1]);
      if (a && b) {
        const distance = Math.max(12, Math.hypot(b.x - a.x, b.y - a.y));
        const midpointX = (a.x + b.x) / 2;
        cameraZoom = clampCameraZoom(pinchState.startZoom * distance / pinchState.startDistance);
        cameraX = clampCameraX(pinchState.anchorWorldX - midpointX / cameraZoom);
      }
      return;
    }
    if (e.pointerId !== inputPointerId) return;
    if (inputMode === 'selectWheel' && gamePhase === 'select') {
      const dy = p.y - selectWheelLastY;
      const elapsed = Math.max(8, e.timeStamp - selectWheelLastTime) / 1000;
      selectWheelPosition = wrapSelectWheelPosition(selectWheelPosition - dy / SELECT_WHEEL_DRAG_STEP);
      selectWheelVelocity = Math.max(-9, Math.min(9, (-dy / SELECT_WHEEL_DRAG_STEP) / elapsed));
      selectWheelTravel += Math.abs(dy);
      selectWheelLastY = p.y;
      selectWheelLastTime = e.timeStamp;
    } else if (inputMode === 'aim' && aimState) {
      aimState.curX = p.x;
      aimState.curY = p.y;
    } else if (inputMode === 'pan') {
      cameraX = clampCameraX(cameraX - (p.x - panLastX) / cameraZoom);
      panLastX = p.x;
    }
  }

  function onPointerUp(e) {
    if (e.pointerType === 'touch') activeTouchPoints.delete(e.pointerId);
    if (inputMode === 'start' && e.pointerId === inputPointerId) {
      inputMode = null;
      inputPointerId = null;
      if (e.type === 'pointerup' && gamePhase === 'press') {
        // このユーザー操作の中で直接play()を呼ぶ。音源待ちが止まっても安全弁でタイトルへ進む。
        enterTitleFromTap();
        playUiSound();
      }
      return;
    }
    if (inputMode === 'selectWheel' && e.pointerId === inputPointerId) {
      const p = canvasPointFromEvent(e);
      selectWheelDragging = false;
      if (e.type === 'pointerup' && selectWheelTravel < 10) {
        const tappedCard = getSelectCardAtPoint(p);
        if (tappedCard && tappedCard.key === selectWheelTapKey) {
          if (tappedCard.index === getFocusedSelectIndex() && Math.abs(getSelectWheelDelta(tappedCard.index)) < 0.15) {
            if (hitRect(p, selectSortieBtn)) {
              playUiSound();
              inputMode = null;
              inputPointerId = null;
              selectWheelTapKey = null;
              selectCharacterAndStart(tappedCard.key);
              return;
            }
          } else {
            focusSelectWheelIndex(tappedCard.index);
            playUiSound();
          }
        }
      }
      selectWheelTapKey = null;
      inputMode = null;
      inputPointerId = null;
      return;
    }
    if (pinchState && pinchState.ids.includes(e.pointerId)) {
      pinchState = null;
      inputMode = null;
      inputPointerId = null;
      return;
    }
    if (e.pointerId !== inputPointerId) return;
    if (inputMode === 'aim' && aimState) {
      if (!isInCancelZone(aimState.curX, aimState.curY)) {
        let dx = aimState.curX - aimState.origin.x;
        let dy = aimState.curY - aimState.origin.y;
        const dist = Math.min(MAX_DRAG, Math.hypot(dx, dy));
        if (dist >= FIRE_MIN_DRAG) {
          const ang = Math.atan2(dy, dx);
          dx = Math.cos(ang) * dist;
          dy = Math.sin(ang) * dist;
          const def = CHARACTERS[player.character];
          const { vx0, vy0 } = computeLaunchVelocity(dx, dy, def);
          launchShot(player, aimState.anchor, vx0, vy0, specialArmed);
          runStats.shots++;
          specialArmed = false;
          awaitingResolve = true;
        }
      }
      aimState = null;
    } else if (inputMode === 'moveL' || inputMode === 'moveR') {
      moveDir = 0;
    }
    inputMode = null;
    inputPointerId = null;
  }

  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('wheel', (e) => {
    if (gamePhase !== 'select') return;
    e.preventDefault();
    selectWheelDragging = false;
    selectWheelVelocity = Math.max(-8, Math.min(8, selectWheelVelocity + e.deltaY * 0.018));
  }, { passive: false });
  window.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  canvas.addEventListener('dragstart', (e) => e.preventDefault());
  window.addEventListener('pointercancel', onPointerUp);

  function resetMatch(carrySpecialCharge) {
    const playerCharge = carrySpecialCharge ? player.specialCharge : 0;
    const cpuCharge = carrySpecialCharge ? cpu.specialCharge : 0;
    calmBattle = Math.random() < CALM_BATTLE_CHANCE;
    calmWind = false;
    newTerrain();
    applyCharacter(player, player.character);
    applyCharacter(cpu, cpu.character);
    player.x = STAGE_W * 0.15;
    cpu.x = STAGE_W * 0.85;
    initUnitOnGround(player);
    initUnitOnGround(cpu);
    projectiles = [];
    aimState = null;
    moveDir = 0;
    inputMode = null;
    inputPointerId = null;
    activeTouchPoints.clear();
    pinchState = null;
    specialArmed = false;
    player.specialCharge = Math.max(0, Math.min(SPECIAL_CHARGE_MAX, playerCharge));
    cpu.specialCharge = Math.max(0, Math.min(SPECIAL_CHARGE_MAX, cpuCharge));
    matchOver = false;
    winner = null;
    awaitingResolve = false;
    turnCount = 0;
    currentTurn = 'player';
    cpuMoveDir = 0;
    cpuMoveRemaining = 0;
    cpuPhase = 'aim';
    particles = [];
    empRings = [];
    floatTexts = [];
    shakeTimer = 0;
    specialFlash = { timer: 0, text: '' };
    cutIn = null;
    cameraZoom = MIN_CAMERA_ZOOM;
    cameraX = 0;
    menuOpen = false;
    isBossMatch = winStreak > 0 && winStreak % 10 === 0;
    bossBannerTimer = isBossMatch ? 2.2 : 0;
    startTurn();
    if (gamePhase === 'battle') playStageBgm(currentThemeKey, true);
  }

  window.addEventListener('keydown', (e) => {
    if ((e.key === 'r' || e.key === 'R') && gamePhase === 'battle') resetMatch(false);
  });

  window.addEventListener('resize', resize);

  // ===== ゲームループ =====
  let lastTime = 0;
  function update(dt) {
    if (gamePhase === 'select') {
      updateSelectWheel(dt);
      return;
    }
    if (gamePhase !== 'battle') return;
    if (menuOpen) return; // メニュー表示中はゲーム進行を止める

    // カメラ:弾が飛んでいる間だけ自動で追従する。それ以外は指でスライドした位置のまま維持する(戻さない)
    if (projectiles.length) {
      const target = centerCameraOn(projectiles[0].x);
      cameraX += (target - cameraX) * Math.min(1, dt * 5);
    }

    // 演出系の更新はカットイン中も続ける(シェイクが残り続けて震え続けるのを防ぐ)
    if (bossBannerTimer > 0) bossBannerTimer = Math.max(0, bossBannerTimer - dt);
    if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
    if (specialFlash.timer > 0) specialFlash.timer = Math.max(0, specialFlash.timer - dt);

    // パーティクル更新
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.vy += 400 * dt;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.life -= dt;
      if (pt.life <= 0) particles.splice(i, 1);
    }
    for (let i = empRings.length - 1; i >= 0; i--) {
      empRings[i].life -= dt;
      if (empRings[i].life <= 0) empRings.splice(i, 1);
    }
    // ダメージ数字ポップ更新
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const ft = floatTexts[i];
      ft.y += ft.vy * dt;
      ft.life -= dt;
      if (ft.life <= 0) floatTexts.splice(i, 1);
    }

    if (cutIn) {
      cutIn.timer -= dt;
      if (cutIn.timer <= 0) {
        const done = cutIn.onDone;
        cutIn = null;
        if (done) done();
      }
      return; // カットイン表示中はターン進行・移動・CPU思考を止める
    }

    // 弾の物理(花火の本体弾と、地形を細く削る8方向の拡散弾に対応)
    let trailDirty = false;
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX * p.windMul;
      p.vx += windAccel * dt;
      p.vy += GRAVITY * (p.gravityMul || 1) * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      if (p.firework) p.fireworkTimer += dt;
      if (p.fireworkShard) {
        p.travelDistance += Math.hypot(p.vx * dt, p.vy * dt);
        if (p.trailRadius > 0) {
          carveTrailMark(p.x, p.y, p.trailRadius);
          trailDirty = true;
        }
        if (p.travelDistance >= p.maxDistance) {
          projectiles.splice(i, 1);
          continue;
        }
      }

      const fireworkDue = p.firework && !p.fireworkShard && p.fireworkTimer >= 1.1;

      let hit = false;
      // ユニットへの直撃判定(発射者自身は着弾するまで判定除外。誤射防止)
      for (const u of [player, cpu]) {
        if (u.side === p.owner) continue;
        const a = unitAnchor(u);
        if (Math.hypot(a.x - p.x, a.y - p.y) <= UNIT_HIT_RADIUS + p.radius) {
          if (p.fireworkShard) {
            applyFireworkShardHit(p, u);
          } else if (p.emp) {
            emitEmp(p.x, p.y, p.empRadius, p.owner, p.empTurns);
          } else if (p.firework) {
            explodeAt(p.x, p.y, 0.5, p.owner, 0.65);
            spawnFireworkBurst(p);
          } else {
            explodeAt(p.x, p.y, p.blastMul, p.owner, p.damageMul);
          }
          if (!p.fireworkShard) projectiles.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;

      if (fireworkDue) {
        spawnFireworkBurst(p);
        projectiles.splice(i, 1);
        continue;
      }

      if (!p.pierce && isSolidAt(p.x, p.y)) {
        if (p.emp) emitEmp(p.x, p.y, p.empRadius, p.owner, p.empTurns);
        else if (p.firework) {
          explodeAt(p.x, p.y, 0.5, p.owner, 0.65);
          spawnFireworkBurst(p);
        } else explodeAt(p.x, p.y, p.blastMul, p.owner, p.damageMul);
        projectiles.splice(i, 1);
      } else if (p.x < -30 || p.x > STAGE_W + 30 || p.y > VH + 60) {
        projectiles.splice(i, 1); // 画面外(誤爆なしで消滅)
      }
    }
    if (trailDirty) rebuildTerrainRim();

    // 落下物理(常時判定)
    updateFalling(dt, player);
    updateFalling(dt, cpu);

    if (matchOver) return;

    // 移動(プレイヤーのターンのみ・燃料制・長押しボタン)
    if (currentTurn === 'player' && player.moveLockTurns <= 0 && !awaitingResolve && moveDir !== 0 && player.grounded && player.fuel > 0) {
      const dist = Math.min(MOVE_SPEED * dt, player.fuel);
      let nx = Math.min(STAGE_W - UNIT_RADIUS - 4, Math.max(UNIT_RADIUS + 4, player.x + moveDir * dist));
      nx = limitMoveByClimb(player, nx);
      const moved = Math.abs(nx - player.x);
      player.x = nx;
      player.fuel -= moved;
      followGroundOrFall(player);
    }

    // CPU移動→思考→発射
    if (currentTurn === 'cpu' && !awaitingResolve && cpu.grounded && !projectiles.length) {
      if (cpuPhase === 'move') {
        if (cpuMoveDir !== 0 && cpuMoveRemaining > 0 && cpu.fuel > 0) {
          const dist = Math.min(MOVE_SPEED * dt, cpu.fuel, cpuMoveRemaining);
          let nx = Math.min(STAGE_W - UNIT_RADIUS - 4, Math.max(UNIT_RADIUS + 4, cpu.x + cpuMoveDir * dist));
          nx = limitMoveByClimb(cpu, nx);
          const moved = Math.abs(nx - cpu.x);
          cpu.x = nx;
          cpu.fuel -= moved;
          cpuMoveRemaining -= moved;
          followGroundOrFall(cpu);
          if (moved < 0.01) cpuPhase = 'aim'; // 端に到達して進めなくなったら打ち切り
        } else {
          cpuPhase = 'aim';
        }
      } else {
        cpuThinkTimer -= dt;
        if (cpuThinkTimer <= 0) cpuAutoTurn();
      }
    }

    // ターン解決(着弾+落下が収まったら手番交代)
    if (awaitingResolve && !projectiles.length && player.grounded && cpu.grounded) {
      awaitingResolve = false;
      endTurn();
    }
  }

  function gameLoop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  newTerrain(); // 選択画面の背景として地形だけ先に用意
  resize();
  requestAnimationFrame(gameLoop);

  // GitHub PagesなどHTTPS環境では、ホーム画面追加とオフライン起動を有効にする。
  if ('serviceWorker' in navigator
      && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
