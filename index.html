<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>カタモン - カタパルトモンスター</title>
<link rel="preload" as="image" href="assets/loading-emblem.png" fetchpriority="high">
<link rel="preload" as="image" href="assets/title-logo.png" fetchpriority="high">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0b0d17;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    display: block;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-drag: none;
    -webkit-tap-highlight-color: transparent;
  }
  #debugPanel {
    position: fixed;
    top: 4px;
    left: 4px;
    color: #9effa8;
    font: 12px/1.4 monospace;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    white-space: pre;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
</div>
<div id="debugPanel">M1: 地形生成+描画+破壊テスト(タップでクレーター)</div>

<script>
(() => {
  'use strict';

  // ===== 仮想解像度(9:16縦画面) =====
  const VW = 540;
  const VH = 960;

  // ===== 最終更新日(サーバー側のファイル更新日時から自動取得。手動更新不要) =====
  const LAST_UPDATED_TEXT = (() => {
    const d = new Date(document.lastModified);
    if (isNaN(d.getTime())) return '';
    const pad = n => String(n).padStart(2, '0');
    return `最終更新: ${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
  })();

  // ===== ステージ(横長)とカメラ =====
  // 初期状態はステージ全幅。ピンチアウトで従来の等倍サイズまで拡大できる。
  const STAGE_W = 960;
  const MIN_CAMERA_ZOOM = VW / STAGE_W;
  const MAX_CAMERA_ZOOM = 1;
  let cameraZoom = MIN_CAMERA_ZOOM;
  let cameraX = 0;
  function clampCameraZoom(zoom) {
    return Math.min(MAX_CAMERA_ZOOM, Math.max(MIN_CAMERA_ZOOM, zoom));
  }
  function visibleWorldWidth() {
    return VW / cameraZoom;
  }
  function clampCameraX(x) {
    return Math.min(Math.max(0, STAGE_W - visibleWorldWidth()), Math.max(0, x));
  }
  function centerCameraOn(worldX) {
    return clampCameraX(worldX - visibleWorldWidth() / 2);
  }
  function applyWorldCamera(parallaxFactor = 1) {
    ctx.translate(0, CONTROL_PANEL_Y);
    ctx.scale(cameraZoom, cameraZoom);
    ctx.translate(-cameraX * parallaxFactor, -CONTROL_PANEL_Y);
  }
  function worldToScreenX(worldX) {
    return (worldX - cameraX) * cameraZoom;
  }
  function worldToScreenY(worldY) {
    return CONTROL_PANEL_Y + (worldY - CONTROL_PANEL_Y) * cameraZoom;
  }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ===== 効果音(WebAudio合成・音源ファイル不要) =====
  let soundOn = true;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration, type, peakGain, freqEnd, delay, attack) {
    if (!soundOn) return;
    const ac = getAudioCtx();
    const startAt = ac.currentTime + (delay || 0);
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, startAt);
    if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), startAt + duration);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(peakGain || 0.25, startAt + (attack == null ? 0.015 : attack));
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.connect(gain).connect(ac.destination);
    osc.start(startAt);
    osc.stop(startAt + duration + 0.02);
  }

  function playFilteredNoise(duration, peakGain, filterType, frequency, delay, attack, q) {
    if (!soundOn) return;
    const ac = getAudioCtx();
    const startAt = ac.currentTime + (delay || 0);
    const bufSize = Math.floor(ac.sampleRate * duration);
    const buffer = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const decay = Math.pow(1 - i / bufSize, 1.35);
      data[i] = (Math.random() * 2 - 1) * decay;
    }
    const src = ac.createBufferSource();
    src.buffer = buffer;
    const filter = ac.createBiquadFilter();
    filter.type = filterType || 'lowpass';
    filter.frequency.setValueAtTime(frequency || 900, startAt);
    filter.Q.value = q == null ? 0.8 : q;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(peakGain || 0.4, startAt + (attack == null ? 0.003 : attack));
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    src.connect(filter).connect(gain).connect(ac.destination);
    src.start(startAt);
  }

  function playLaunchSound() {
    // 信管の作動クリック→火薬の短い噴出→低い発射圧。上昇電子音は使わない。
    playFilteredNoise(0.045, 0.22, 'highpass', 1800, 0, 0.001, 0.7);
    playFilteredNoise(0.18, 0.13, 'bandpass', 820, 0.018, 0.004, 1.1);
    playTone(145, 0.13, 'sine', 0.18, 62, 0.006, 0.002);
  }
  function playExplosionSound(blastMul) {
    // 小さな破裂音と短い低音を重ね、重すぎない着弾爆発にする。
    const power = Math.min(1.35, Math.max(0.72, Math.sqrt(blastMul || 1)));
    playFilteredNoise(0.055, 0.17 * power, 'highpass', 1650, 0, 0.001, 0.6);
    playFilteredNoise(0.26, 0.30 * power, 'lowpass', 680, 0.004, 0.002, 0.75);
    playTone(92, 0.23, 'sine', 0.24 * power, 42, 0.003, 0.002);
  }
  function playDeadLineSound() { playTone(150, 0.22, 'sawtooth', 0.22, 60); }
  function playSpecialSound() {
    playLaunchSound();
    playTone(420, 0.28, 'triangle', 0.12, 680, 0.035, 0.005);
  }
  function playUiSound() { playTone(600, 0.08, 'sine', 0.12, 800); }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;
    const scale = Math.min(viewportW / VW, viewportH / VH);
    const cssW = VW * scale;
    const cssH = VH * scale;

    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.round(VW * dpr);
    canvas.height = Math.round(VH * dpr);

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  // ===== 地形生成(ピクセル単位のマスク方式:キャンバスに地形を描いて円形にくり抜く) =====
  const TERRAIN_COLS = 320; // STAGE_W=960 → 3px刻み(接地判定・描画キャッシュ用の列)
  const COL_W = STAGE_W / TERRAIN_COLS;
  const ROW_H = 4; // 縦方向の判定グリッド刻み
  const ROWS = Math.ceil(VH / ROW_H);
  const GROUND_MIN_Y = 380;   // 地形が取りうる最も高い(浅い)位置
  const GROUND_MAX_Y = 600;   // 地形が取りうる最も低い(深い)位置(下部コントローラパネルとの間に余白を確保)
  const FLOOR_Y = VH;         // 画面下端(この高さ=地面なし/場外扱い)

  // ===== ステージの見た目テーマ(空・地形・草・遠景の配色セット。試合ごとにランダムで選ぶ) =====
  const THEMES = {
    grass: {
      sky: ['#1a2340', '#2c3a63', '#4a5a8a'],
      dirtTop: '#7a5a3a', dirtBottom: '#33241a',
      rim: '#9be08a', rimShadow: '#4f8a4f',
      farHill: 'rgba(58,70,112,0.55)', nearHill: 'rgba(60,88,66,0.55)',
      cloud: 'rgba(255,255,255,0.22)'
    },
    desert: {
      sky: ['#3a2b1a', '#6b4a2a', '#c98a4a'],
      dirtTop: '#c9954a', dirtBottom: '#5a3a1c',
      rim: '#e0c37a', rimShadow: '#a97f30',
      farHill: 'rgba(110,66,40,0.5)', nearHill: 'rgba(160,110,60,0.5)',
      cloud: 'rgba(255,240,220,0.18)'
    },
    snow: {
      sky: ['#233047', '#3c5170', '#7c9bb8'],
      dirtTop: '#e8eef5', dirtBottom: '#6f7f93',
      rim: '#ffffff', rimShadow: '#b9cadd',
      farHill: 'rgba(90,110,140,0.5)', nearHill: 'rgba(140,160,182,0.45)',
      cloud: 'rgba(255,255,255,0.3)'
    },
    volcanic: {
      sky: ['#200f14', '#4a1a20', '#8a3018'],
      dirtTop: '#5a4038', dirtBottom: '#180f0d',
      rim: '#ff7a3a', rimShadow: '#a8371a',
      farHill: 'rgba(50,20,20,0.6)', nearHill: 'rgba(96,32,20,0.55)',
      cloud: 'rgba(255,160,100,0.14)'
    }
  };
  const THEME_KEYS = Object.keys(THEMES);
  let currentTheme = THEMES.grass;
  let currentThemeKey = 'grass';
  let parallaxSeed = 0; // 遠景の山の形を試合ごとに変えるための位相オフセット

  // 実体は不可視のオフスクリーンキャンバス(見た目)。塗り(source-over)で地面、destination-outで爆風の穴をあける
  const terrainCanvas = document.createElement('canvas');
  terrainCanvas.width = STAGE_W;
  terrainCanvas.height = VH;
  const terrainCtx = terrainCanvas.getContext('2d');

  // 地形マスク全体から境界線を作る専用キャンバス。最上面の点を結ぶ方式だと、浮島や縦崖を
  // またいで長い線が出るため、実際の地形シルエットを膨張させて全周の輪郭だけを抜き出す。
  const terrainRimCanvas = document.createElement('canvas');
  terrainRimCanvas.width = STAGE_W;
  terrainRimCanvas.height = VH;
  const terrainRimCtx = terrainRimCanvas.getContext('2d');
  const terrainRimLayer = document.createElement('canvas');
  terrainRimLayer.width = STAGE_W;
  terrainRimLayer.height = VH;
  const terrainRimLayerCtx = terrainRimLayer.getContext('2d');

  function paintTerrainRimLayer(color, radius) {
    terrainRimLayerCtx.save();
    terrainRimLayerCtx.clearRect(0, 0, STAGE_W, VH);
    terrainRimLayerCtx.globalCompositeOperation = 'source-over';
    terrainRimLayerCtx.imageSmoothingEnabled = true;
    for (let i = 0; i < 16; i++) {
      const angle = i * Math.PI * 2 / 16;
      terrainRimLayerCtx.drawImage(terrainCanvas, Math.cos(angle) * radius, Math.sin(angle) * radius);
    }
    terrainRimLayerCtx.globalCompositeOperation = 'source-in';
    terrainRimLayerCtx.fillStyle = color;
    terrainRimLayerCtx.fillRect(0, 0, STAGE_W, VH);
    terrainRimLayerCtx.globalCompositeOperation = 'destination-out';
    terrainRimLayerCtx.drawImage(terrainCanvas, 0, 0);
    terrainRimLayerCtx.restore();
    terrainRimCtx.drawImage(terrainRimLayer, 0, 0);
  }

  function rebuildTerrainRim() {
    terrainRimCtx.clearRect(0, 0, STAGE_W, VH);
    paintTerrainRimLayer(currentTheme.rimShadow, 6);
    paintTerrainRimLayer(currentTheme.rim, 3);
  }

  // 既存の薄床地形を土台にして、橋だと一目で分かる装飾だけを別レイヤーに描く。
  // 地形と同じクレーターで削るため、爆破後に絵だけ宙へ残ることもない。
  const bridgeCanvas = document.createElement('canvas');
  bridgeCanvas.width = STAGE_W;
  bridgeCanvas.height = VH;
  const bridgeCtx = bridgeCanvas.getContext('2d');

  function rebuildBridgeDecoration() {
    bridgeCtx.clearRect(0, 0, STAGE_W, VH);
    if (!currentBridge) return;
    const { startX, endX, y, style } = currentBridge;
    const length = endX - startX;
    const plankStep = style === 'rope' ? 11 : 15;
    const postStep = style === 'rope' ? 44 : 38;

    bridgeCtx.save();
    bridgeCtx.lineCap = 'round';
    bridgeCtx.lineJoin = 'round';

    // 橋桁と板張り
    bridgeCtx.fillStyle = '#6b3f24';
    bridgeCtx.fillRect(startX - 8, y - 6, length + 16, 19);
    bridgeCtx.fillStyle = '#b8793f';
    bridgeCtx.fillRect(startX - 5, y - 5, length + 10, 11);
    bridgeCtx.strokeStyle = '#3b2418';
    bridgeCtx.lineWidth = 2;
    for (let x = startX; x <= endX; x += plankStep) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y - 5);
      bridgeCtx.lineTo(x + Math.sin(x * 0.17 + currentBridge.seed) * 2, y + 7);
      bridgeCtx.stroke();
    }
    bridgeCtx.strokeStyle = '#2b1a12';
    bridgeCtx.lineWidth = 5;
    bridgeCtx.beginPath();
    bridgeCtx.moveTo(startX - 5, y + 13);
    bridgeCtx.lineTo(endX + 5, y + 13);
    bridgeCtx.stroke();

    // 支柱・手すり。ロープ橋は上の線を少したるませる。
    const posts = [];
    for (let x = startX; x <= endX + 1; x += postStep) posts.push(Math.min(x, endX));
    if (posts[posts.length - 1] !== endX) posts.push(endX);
    bridgeCtx.strokeStyle = '#4a2b1b';
    bridgeCtx.lineWidth = 5;
    for (const x of posts) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y + 10);
      bridgeCtx.lineTo(x, y - 32);
      bridgeCtx.stroke();
    }
    bridgeCtx.strokeStyle = style === 'rope' ? '#d3b27a' : '#7e512e';
    bridgeCtx.lineWidth = style === 'rope' ? 3 : 5;
    bridgeCtx.beginPath();
    bridgeCtx.moveTo(posts[0], y - 29);
    for (let i = 1; i < posts.length; i++) {
      if (style === 'rope') {
        const midX = (posts[i - 1] + posts[i]) / 2;
        bridgeCtx.quadraticCurveTo(midX, y - 20, posts[i], y - 29);
      } else {
        bridgeCtx.lineTo(posts[i], y - 29);
      }
    }
    bridgeCtx.stroke();

    // 地面の表面に見える補強材。長い橋ほど三角形が増えて橋らしく見える。
    bridgeCtx.strokeStyle = 'rgba(62,34,20,0.9)';
    bridgeCtx.lineWidth = 4;
    for (let x = startX; x + postStep <= endX; x += postStep) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y + 15);
      bridgeCtx.lineTo(x + postStep / 2, y + 40);
      bridgeCtx.lineTo(x + postStep, y + 15);
      bridgeCtx.stroke();
    }

    // 両端の橋台
    bridgeCtx.fillStyle = '#51483f';
    bridgeCtx.fillRect(startX - 12, y - 3, 10, 28);
    bridgeCtx.fillRect(endX + 2, y - 3, 10, 28);
    bridgeCtx.restore();
  }

  // 地形の質感用ノイズタイル(1度だけ生成し、繰り返しパターンとして焼き込む。点描だとムラや塊が
  // 出てしまうため、ピクセル単位のノイズタイルの方が均一な粒立ちになる)
  const noiseTile = document.createElement('canvas');
  noiseTile.width = 28;
  noiseTile.height = 28;
  (() => {
    const ntCtx = noiseTile.getContext('2d');
    const img = ntCtx.createImageData(28, 28);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() < 0.5 ? 0 : 255;
      img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v;
      img.data[i + 3] = Math.round(Math.random() * 46);
    }
    ntCtx.putImageData(img, 0, 0);
  })();

  // 判定用のグリッド(見た目のキャンバスとは別に、ロジック側で正確に持つ実体データ)。1=地面,0=空気
  let solidGrid = new Uint8Array(TERRAIN_COLS * ROWS);
  // 列ごとの「一番上にある地面のY」キャッシュ(接地判定・描画の草ラインに使用。掘削のたびに該当範囲だけ再走査)
  let surfaceY = new Float64Array(TERRAIN_COLS).fill(FLOOR_Y);

  function clampGround(y) {
    return Math.min(GROUND_MAX_Y, Math.max(GROUND_MIN_Y, y));
  }

  function buildTerrainMask(segments, refreshRim = true) {
    terrainCtx.clearRect(0, 0, STAGE_W, VH);
    terrainCtx.globalCompositeOperation = 'source-over';
    const grad = terrainCtx.createLinearGradient(0, GROUND_MIN_Y, 0, FLOOR_Y);
    grad.addColorStop(0, currentTheme.dirtTop);
    grad.addColorStop(1, currentTheme.dirtBottom);
    terrainCtx.fillStyle = grad;
    solidGrid.fill(0);
    for (let c = 0; c < TERRAIN_COLS; c++) {
      const x = c * COL_W;
      for (const seg of segments[c]) {
        const top = seg[0], bottom = seg[1];
        if (bottom <= top) continue;
        terrainCtx.fillRect(x, top, COL_W + 0.6, bottom - top);
        const r0 = Math.max(0, Math.floor(top / ROW_H));
        const r1 = Math.min(ROWS - 1, Math.ceil(bottom / ROW_H));
        for (let r = r0; r <= r1; r++) solidGrid[r * TERRAIN_COLS + c] = 1;
      }
    }
    // 質感付け:ピクセル単位のノイズタイルを繰り返し焼き込んで単色塗りっぽさを消す
    // (点描だと粒がランダムに寄り集まって「塊」に見えてしまうため、均一なタイルパターンにする)
    terrainCtx.save();
    terrainCtx.globalCompositeOperation = 'source-atop';
    terrainCtx.fillStyle = terrainCtx.createPattern(noiseTile, 'repeat');
    terrainCtx.fillRect(0, 0, STAGE_W, VH);
    terrainCtx.restore();
    rebuildBridgeDecoration();
    if (refreshRim) rebuildTerrainRim();
  }

  // グリッド上の地面から、列ごとの最上段Yを再計算する(軽量。掘削のたびに影響範囲だけ呼ぶ)
  function rescanColumnsFromGrid(colFrom, colTo) {
    colFrom = Math.max(0, colFrom);
    colTo = Math.min(TERRAIN_COLS - 1, colTo);
    for (let c = colFrom; c <= colTo; c++) {
      let topRow = ROWS;
      for (let r = 0; r < ROWS; r++) {
        if (solidGrid[r * TERRAIN_COLS + c]) { topRow = r; break; }
      }
      surfaceY[c] = topRow >= ROWS ? FLOOR_Y : topRow * ROW_H;
    }
  }

  // 着弾クレーターの実処理:見た目(キャンバス)と判定(グリッド)の両方を円形にくり抜く
  function carveCraterInternal(cx, cy, radius, refreshRim = true) {
    terrainCtx.save();
    terrainCtx.globalCompositeOperation = 'destination-out';
    terrainCtx.beginPath();
    terrainCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    terrainCtx.fill();
    terrainCtx.restore();
    bridgeCtx.save();
    bridgeCtx.globalCompositeOperation = 'destination-out';
    bridgeCtx.beginPath();
    bridgeCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    bridgeCtx.fill();
    bridgeCtx.restore();

    const colFrom = Math.max(0, Math.floor((cx - radius) / COL_W));
    const colTo = Math.min(TERRAIN_COLS - 1, Math.ceil((cx + radius) / COL_W));
    const rowFrom = Math.max(0, Math.floor((cy - radius) / ROW_H));
    const rowTo = Math.min(ROWS - 1, Math.ceil((cy + radius) / ROW_H));
    const r2 = radius * radius;
    for (let c = colFrom; c <= colTo; c++) {
      const colCx = (c + 0.5) * COL_W;
      for (let r = rowFrom; r <= rowTo; r++) {
        const rowCy = (r + 0.5) * ROW_H;
        const dx = colCx - cx, dy = rowCy - cy;
        if (dx * dx + dy * dy <= r2) solidGrid[r * TERRAIN_COLS + c] = 0;
      }
    }
    rescanColumnsFromGrid(colFrom, colTo);
    if (refreshRim) rebuildTerrainRim();
  }

  let craterHistory = []; // 中断/再開のため、実発射で開いたクレーターを再生可能な形で記録
  function carveCrater(cx, cy, radius) {
    carveCraterInternal(cx, cy, radius);
    craterHistory.push({ x: cx, y: cy, r: radius });
  }

  function groundYAt(x) {
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    return surfaceY[c];
  }

  // 弾の直撃判定用:列の最上段ではなく、その座標そのものに地面があるかを正確に見る
  // (浮島の下の空間などで「列の最上段=島の上」を基準にすると何もない場所で爆発してしまうため)
  function isSolidAt(x, y) {
    if (y < 0 || y >= VH) return false;
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    const r = Math.min(ROWS - 1, Math.max(0, Math.floor(y / ROW_H)));
    return solidGrid[r * TERRAIN_COLS + c] === 1;
  }

  // 骨格パターン: 片方が高台/中央に山/谷底スタート/なだらか
  function baseCurve(pattern, t) {
    // t: 0..1 (左端から右端)。yは小さいほど浅い(高い地形)、大きいほど深い(低い地形)
    const mid = (GROUND_MIN_Y + GROUND_MAX_Y) / 2;
    const range = GROUND_MAX_Y - GROUND_MIN_Y;
    switch (pattern) {
      case 'plateauLeft':
        // 左が高台(浅い)、右が低地
        return GROUND_MIN_Y + range * smoothstep(t, 0.25, 0.75);
      case 'plateauRight':
        // 右が高台(浅い)、左が低地
        return GROUND_MAX_Y - range * smoothstep(t, 0.25, 0.75);
      case 'mountainCenter':
        // 中央が山(浅い)、両端が低地(深い)
        return GROUND_MAX_Y - range * Math.sin(Math.PI * t);
      case 'valley':
        // 中央が谷(深い)、両端が高台(浅い)
        return GROUND_MIN_Y + range * Math.sin(Math.PI * t);
      case 'bridge':
        // 橋用。左右の岸を近い高さにそろえ、中央へ細い足場を架けやすくする
        return mid + Math.sin(t * Math.PI * 2) * range * 0.045;
      case 'rolling':
      default:
        return mid;
    }
  }

  function smoothstep(t, a, b) {
    const x = Math.min(1, Math.max(0, (t - a) / (b - a)));
    return x * x * (3 - 2 * x);
  }

  // 中点変位法で乱数揺らぎを加える(滑らかなノイズ)
  function midpointDisplacement(n, roughness) {
    const size = 1;
    let arr = new Float64Array(n + 1);
    arr[0] = (Math.random() - 0.5) * 2;
    arr[n] = (Math.random() - 0.5) * 2;
    let step = n;
    let scale = 1;
    while (step > 1) {
      const half = step / 2;
      for (let i = half; i < n; i += step) {
        const left = arr[i - half];
        const right = arr[i + half];
        arr[i] = (left + right) / 2 + (Math.random() - 0.5) * 2 * scale;
      }
      step = half;
      scale *= roughness;
    }
    return arr;
  }

  // スポーン地点(左15%/右85%)の列。ランダム地形イベントがここに重ならないよう避ける
  const SPAWN_COLS = [Math.round(STAGE_W * 0.15 / COL_W), Math.round(STAGE_W * 0.85 / COL_W)];
  function overlapsSpawn(start, len, margin) {
    const end = start + len;
    return SPAWN_COLS.some(sc => sc + margin >= start && sc - margin <= end);
  }

  function applyNaturalThinFloor(segments, hm, start, len, baseDepth) {
    const shoulder = Math.max(5, Math.floor(len * 0.3));
    const phase = Math.random() * Math.PI * 2;
    for (let i = 0; i < len; i++) {
      const c = start + i;
      if (c < 0 || c >= TERRAIN_COLS) continue;

      // 両端では通常の地面の厚さを保ち、中央へ向けて洞窟状になだらかに薄くする。
      const edgeDistance = Math.min(i, len - 1 - i);
      const thinBlend = smoothstep(edgeDistance, 0, shoulder);
      const organicDepth = baseDepth * (0.95 + Math.sin(i * 0.52 + phase) * 0.05);
      const fullDepth = FLOOR_Y - hm[c];
      const depth = fullDepth + (organicDepth - fullDepth) * thinBlend;
      segments[c] = [[hm[c], Math.min(FLOOR_Y, hm[c] + depth)]];
    }
  }

  const ISLAND_SHAPES = ['lens', 'long', 'jagged', 'mesa'];
  function addFloatingIsland(segments, start, len, islandTop, thickness, shape, phase) {
    for (let i = 0; i < len; i++) {
      const c = start + i;
      if (c < 0 || c >= TERRAIN_COLS) continue;
      const t = (i + 0.5) / len;
      const taper = Math.sin(t * Math.PI);
      if (taper < 0.08) continue;

      let topOffset = 0;
      let depth = thickness;
      if (shape === 'lens') {
        topOffset = (1 - taper) * thickness * 0.28;
        depth = Math.max(8, thickness * (0.35 + taper * 0.65));
      } else if (shape === 'long') {
        topOffset = Math.sin(t * Math.PI * 4 + phase) * 2;
        depth = Math.max(10, thickness * (0.7 + taper * 0.2) + Math.sin(t * 9 + phase) * 3);
      } else if (shape === 'jagged') {
        topOffset = (1 - taper) * 9 + Math.sin(t * 12 + phase) * 3.5;
        depth = Math.max(9, thickness * (0.52 + taper * 0.48) + Math.sin(t * 17 + phase) * 5);
      } else {
        // mesa:中央は平らで、両端だけ丸くすぼむ大型足場向け
        const edge = Math.max(0, (0.2 - Math.min(t, 1 - t)) / 0.2);
        topOffset = edge * 8;
        depth = Math.max(10, thickness * (0.72 + taper * 0.28));
      }

      const top = islandTop + topOffset;
      segments[c] = [[top, top + depth], ...segments[c]];
    }
  }

  function generateTerrain(pattern) {
    const patterns = ['plateauLeft', 'plateauRight', 'mountainCenter', 'valley', 'rolling', 'bridge'];
    const p = pattern || patterns[Math.floor(Math.random() * patterns.length)];

    // 中点変位のnは2の冪にする必要があるため、近い2の冪を使い後でリサンプル
    let pow = 1;
    while (pow < TERRAIN_COLS) pow *= 2;
    const noiseRaw = midpointDisplacement(pow, 0.55);
    const noiseAmp = p === 'bridge' ? 9 : 26; // 橋は接続部を安定させるため凹凸を控えめにする

    const hm = new Float64Array(TERRAIN_COLS);
    for (let i = 0; i < TERRAIN_COLS; i++) {
      const t = i / (TERRAIN_COLS - 1);
      const base = baseCurve(p, t);
      const noiseIdx = t * pow;
      const i0 = Math.floor(noiseIdx);
      const i1 = Math.min(pow, i0 + 1);
      const frac = noiseIdx - i0;
      const noiseVal = noiseRaw[i0] * (1 - frac) + noiseRaw[i1] * frac;
      hm[i] = clampGround(base + noiseVal * noiseAmp);
    }
    // 両端を少しなだらかに(プレイヤー初期足場を安定させる)
    for (let i = 0; i < 8; i++) {
      const wL = i / 8;
      hm[i] = hm[i] * wL + hm[8] * (1 - wL);
      const j = TERRAIN_COLS - 1 - i;
      hm[j] = hm[j] * wL + hm[TERRAIN_COLS - 9] * (1 - wL);
    }

    // 各列の中身(地面の実区間リスト)。基本は地表〜床までの単一の塊
    const segments = [];
    for (let c = 0; c < TERRAIN_COLS; c++) segments.push([[hm[c], FLOOR_Y]]);

    const midStart = 14, midEnd = TERRAIN_COLS - 14;
    let bridge = null;

    // 橋ステージ:既存の薄床地形に、長さが毎回変わる橋イラストを重ねる。
    if (p === 'bridge') {
      const bridgeLen = 30 + Math.floor(Math.random() * 61); // 約90〜270px
      const rawStart = Math.floor(TERRAIN_COLS / 2 - bridgeLen / 2 + (Math.random() - 0.5) * 28);
      const bridgeStart = Math.max(midStart + 18, Math.min(midEnd - bridgeLen - 18, rawStart));
      const leftY = hm[Math.max(0, bridgeStart - 1)];
      const rightY = hm[Math.min(TERRAIN_COLS - 1, bridgeStart + bridgeLen)];
      const bridgeY = clampGround((leftY + rightY) / 2 - 4);
      // 当たり判定に必要な最小限の薄さだけ残し、見た目は橋の板と桁が足場になる。
      const thinDepth = 8 + Math.random() * 5;
      for (let i = 0; i < bridgeLen; i++) {
        const c = bridgeStart + i;
        if (c < midStart || c >= midEnd) continue;
        hm[c] = bridgeY;
        segments[c] = [[bridgeY, bridgeY + thinDepth]];
      }
      bridge = {
        startX: bridgeStart * COL_W,
        endX: (bridgeStart + bridgeLen) * COL_W,
        y: bridgeY,
        style: Math.random() < 0.5 ? 'timber' : 'rope',
        seed: Math.random() * 1000
      };
    // 通常ステージにも、ときどき短い薄床を混ぜる。
    } else if (Math.random() < 0.35) {
      const zoneLen = 18 + Math.floor(Math.random() * 20);
      const zoneStart = midStart + Math.floor(Math.random() * Math.max(1, midEnd - midStart - zoneLen));
      if (!overlapsSpawn(zoneStart, zoneLen, 20)) {
        const thinDepth = 34 + Math.random() * 22;
        const actualLen = Math.min(zoneLen, midEnd - zoneStart);
        applyNaturalThinFloor(segments, hm, zoneStart, actualLen, thinDepth);
      }
    }

    // 浮島ゾーン。崖・薄床の有無とは完全に独立して抽選し、連続した普通の地面の上にも出現する。
    // 下の地面は必ず残すので、島と同じ幅の縦穴や崖は作らない。
    const floatingIslandCount = Math.random() < 0.58 ? (Math.random() < 0.22 ? 2 : 1) : 0;
    const floatingIslandRanges = [];
    for (let islandIndex = 0; islandIndex < floatingIslandCount; islandIndex++) {
      const sizeRoll = Math.random();
      const islandLen = sizeRoll < 0.22
        ? 10 + Math.floor(Math.random() * 10)
        : sizeRoll < 0.55
          ? 38 + Math.floor(Math.random() * 25)
          : 20 + Math.floor(Math.random() * 18);
      let islandStart = -1;
      for (let attempt = 0; attempt < 8; attempt++) {
        const candidate = midStart + Math.floor(Math.random() * Math.max(1, midEnd - midStart - islandLen));
        const overlapsOtherIsland = floatingIslandRanges.some(r => candidate < r.end + 10 && candidate + islandLen > r.start - 10);
        if (!overlapsSpawn(candidate, islandLen, 20) && !overlapsOtherIsland) {
          islandStart = candidate;
          break;
        }
      }
      if (islandStart >= 0) {
        let localMinY = Infinity;
        for (let c = islandStart; c < islandStart + islandLen && c < midEnd; c++) localMinY = Math.min(localMinY, hm[c]);
        const gap = 70 + Math.random() * 220; // 近い(二段地形)〜遠い(独立浮島)まで幅を持たせる
        const shape = ISLAND_SHAPES[Math.floor(Math.random() * ISLAND_SHAPES.length)];
        const islandThickness = shape === 'long' ? 18 + Math.random() * 20 : 24 + Math.random() * 34;
        const islandTop = Math.max(120, localMinY - gap - islandThickness);
        addFloatingIsland(segments, islandStart, islandLen, islandTop, islandThickness, shape, Math.random() * Math.PI * 2);
        floatingIslandRanges.push({ start: islandStart, end: islandStart + islandLen });
      }
    }

    // 空洞(山の内部の未露出の空間。着弾で偶然開通することがある)
    // レンズ状に丸くすぼませ、縁も波打たせることで、四角い穴に見えないようにする
    if (Math.random() < 0.3) {
      const cavernLen = 22 + Math.floor(Math.random() * 16);
      const cavernStart = midStart + Math.floor(Math.random() * Math.max(1, midEnd - midStart - cavernLen));
      if (!overlapsSpawn(cavernStart, cavernLen, 20)) {
        const cavernCy = GROUND_MIN_Y + 100 + Math.random() * 80;
        const cavernHalfH = 42 + Math.random() * 26;
        const wobbleAmp = 8 + Math.random() * 8;
        const phase = Math.random() * Math.PI * 2;
        for (let i = 0; i < cavernLen; i++) {
          const c = cavernStart + i;
          if (c >= midEnd) break;
          const groundIndex = segments[c].length - 1;
          const seg = segments[c][groundIndex];
          const t = i / (cavernLen - 1);
          const taper = Math.sin(t * Math.PI); // 両端でゼロ→中央で1(レンズ状に丸くすぼめる)
          if (taper < 0.1) continue; // 端は開けずに閉じておく
          const wobble = Math.sin(t * 7 + phase) * wobbleAmp;
          const halfH = cavernHalfH * taper;
          const top = cavernCy - halfH + wobble * 0.5;
          const bottom = Math.min(seg[1] - 20, cavernCy + halfH + wobble * 0.5);
          if (bottom > top + 12 && top > seg[0] + 15) {
            segments[c] = [...segments[c].slice(0, groundIndex), [seg[0], top], [bottom, seg[1]]];
          }
        }
      }
    }

    // スタート地点浮島(たまにプレイヤー/CPUの出現位置そのものが浮島になる)。
    // 真下の通常地面は消さずに残し、不自然な島幅ぴったりの縦穴を作らない。
    let startOnIsland = false;
    if (Math.random() < 0.18) {
      startOnIsland = true;
      for (const sx of [STAGE_W * 0.15, STAGE_W * 0.85]) {
        const cCenter = Math.round(sx / COL_W);
        const islandLen = 18 + Math.floor(Math.random() * 18);
        const islandStart = cCenter - Math.floor(islandLen / 2);
        const islandTop = GROUND_MIN_Y - 90 - Math.random() * 50;
        const islandThickness = 28 + Math.random() * 18;
        const shape = ['mesa', 'lens', 'jagged'][Math.floor(Math.random() * 3)];
        addFloatingIsland(segments, islandStart, islandLen, islandTop, islandThickness, shape, Math.random() * Math.PI * 2);
      }
    }

    return { pattern: p, segments, startOnIsland, bridge };
  }

  let currentPattern = null;
  let startOnIsland = false;
  let currentBridge = null;
  let currentSegments = null; // 中断/再開用に、生成直後(未破壊)の地形を保持しておく

  function newTerrain(pattern) {
    currentThemeKey = THEME_KEYS[Math.floor(Math.random() * THEME_KEYS.length)];
    currentTheme = THEMES[currentThemeKey];
    parallaxSeed = Math.random() * 10000;
    const r = generateTerrain(pattern);
    currentSegments = r.segments;
    currentBridge = r.bridge || null;
    craterHistory = [];
    buildTerrainMask(r.segments);
    rescanColumnsFromGrid(0, TERRAIN_COLS - 1);
    currentPattern = r.pattern;
    startOnIsland = r.startOnIsland;
    updateDebug();
  }

  // 中断データからの地形復元:未破壊の地形を作り直し、記録しておいたクレーターを同じ順で開け直す
  function loadTerrainFromSave(segments, craters, pattern, wasStartOnIsland, themeKey, savedParallaxSeed, savedBridge) {
    currentThemeKey = themeKey && THEMES[themeKey] ? themeKey : 'grass';
    currentTheme = THEMES[currentThemeKey];
    parallaxSeed = savedParallaxSeed || 0;
    currentSegments = segments;
    currentBridge = savedBridge || null;
    buildTerrainMask(segments, false);
    rescanColumnsFromGrid(0, TERRAIN_COLS - 1);
    for (const cr of craters) carveCraterInternal(cr.x, cr.y, cr.r, false);
    rebuildTerrainRim();
    craterHistory = craters.slice();
    currentPattern = pattern;
    startOnIsland = wasStartOnIsland;
    updateDebug();
  }

  // ===== キャラクター =====
  const CHARACTERS = {
    medama: {
      key: 'medama', name: '目玉', desc: '標準型・素直な弾道の万能キャラ',
      maxHp: 100, blastMul: 1.0, windMul: 1.0, fuelMul: 1.0, velScaleMul: 1.0, tBias: 1.0,
      color: '#ffd24a', special: '3連弾'
    },
    iwa: {
      key: 'iwa', name: '岩', desc: '重戦車型・HP高、爆風大、弾速遅く風に流されやすい',
      maxHp: 130, blastMul: 1.35, windMul: 1.4, fuelMul: 0.85, velScaleMul: 0.82, tBias: 1.25,
      color: '#9a9086', special: '地形大破壊'
    },
    tori: {
      key: 'tori', name: '鳥', desc: 'トリッキー型・HP低、弾が軽く飛距離◎、移動燃料多め',
      maxHp: 75, blastMul: 0.8, windMul: 0.6, fuelMul: 1.3, velScaleMul: 1.2, tBias: 0.85,
      color: '#ff8c3a', special: '貫通弾'
    }
  };
  const CHARACTER_LIST = ['medama', 'iwa', 'tori'];

  // キャラ画像(モンスター戦車・右向き)を事前読み込み
  const charImages = {};
  for (const key of CHARACTER_LIST) {
    const img = new Image();
    img.src = `assets/${key}.png`;
    charImages[key] = img;
  }
  // ロード画面用の背景透過エンブレム。タイトルロゴより軽いため先に読み込む。
  let loadingEmblemReady = false;
  const loadingEmblemImage = new Image();
  loadingEmblemImage.fetchPriority = 'high';
  loadingEmblemImage.onload = () => { loadingEmblemReady = true; };
  loadingEmblemImage.src = 'assets/loading-emblem.png';

  // 背景透過のタイトルロゴ。
  let titleLogoReady = false;
  let titleLogoFailed = false;
  const titleLogoImage = new Image();
  titleLogoImage.fetchPriority = 'high';
  titleLogoImage.onload = () => { titleLogoReady = true; };
  titleLogoImage.onerror = () => { titleLogoFailed = true; };
  titleLogoImage.src = 'assets/title-logo.png';
  const SPRITE_SIZE = 78; // 画像の表示高さ(px)。幅は元画像のアスペクト比から算出

  // ===== ユニット =====
  const UNIT_RADIUS = 16;      // 接地・アンカー計算用の半径
  const UNIT_HIT_RADIUS = 30;  // 弾の直撃判定用(見た目のスプライトサイズに合わせて大きめ)
  const MAX_HP = 100;
  const FUEL_MAX = 102; // 全キャラの基本移動可能距離を従来の2倍にする
  const MOVE_SPEED = 95; // px/s
  const SPECIAL_CHARGE_MAX = 4; // 自分4手番=相手込み8ターンでMAX。新規挑戦は0、次戦へ残量を持ち越す

  function isSpecialReady(u) {
    return u.specialCharge >= SPECIAL_CHARGE_MAX;
  }

  function advanceSpecialCharge(u) {
    u.specialCharge = Math.min(SPECIAL_CHARGE_MAX, u.specialCharge + 1);
  }

  // ある程度以上の急斜面(崖)は歩いて登れない。上り方向にこの角度を超える段差があると足止めする
  const MAX_CLIMB_ANGLE = 58 * Math.PI / 180;
  const CLIMB_LOOKAHEAD = 26; // px。移動は1フレームあたり数pxしか進まないため、常にこの距離先の傾斜で判定する
  const MAX_CLIMB_RISE = Math.ceil(Math.tan(MAX_CLIMB_ANGLE) * CLIMB_LOOKAHEAD);

  // 同じ列に浮島と地面がある場合も、列の最上面ではなくキャラの足元に最も近い地面を選ぶ。
  // 探索開始地点がすでに地中なら、登れない縦壁としてnullを返す。
  function walkableGroundYAt(x, referenceGroundY) {
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    const startY = Math.max(0, referenceGroundY - MAX_CLIMB_RISE);
    const startRow = Math.min(ROWS - 1, Math.max(0, Math.floor(startY / ROW_H)));
    if (solidGrid[startRow * TERRAIN_COLS + c]) return null;
    for (let r = startRow + 1; r < ROWS; r++) {
      if (solidGrid[r * TERRAIN_COLS + c]) return r * ROW_H;
    }
    return FLOOR_Y;
  }

  // 落下中は直前の足位置より下にある最初の足場を探す。浮島の上面をすり抜けず、
  // 頭上の別レイヤーへ吸い上げられることもない。
  function groundYBelow(x, fromY) {
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    const startRow = Math.min(ROWS - 1, Math.max(0, Math.floor(fromY / ROW_H)));
    for (let r = startRow; r < ROWS; r++) {
      if (solidGrid[r * TERRAIN_COLS + c]) return r * ROW_H;
    }
    return FLOOR_Y;
  }

  // 進行方向の少し先までの傾斜を見て、急坂ならその場で足止めする(細かい地形ノイズに反応しないよう固定距離で判定)
  function limitMoveByClimb(u, toX) {
    const fromX = u.x;
    if (toX === fromX) return fromX;
    const dir = toX > fromX ? 1 : -1;
    const nx = Math.min(STAGE_W - 1, Math.max(0, fromX + dir * CLIMB_LOOKAHEAD));
    const feetY = u.y + UNIT_RADIUS;
    const targetGround = walkableGroundYAt(toX, feetY);
    const aheadGround = walkableGroundYAt(nx, feetY);
    if (targetGround === null || aheadGround === null) return fromX;
    const currentGround = walkableGroundYAt(fromX, feetY);
    const y1 = currentGround === null ? feetY : currentGround;
    const y2 = aheadGround;
    const climbAngle = Math.atan2(y1 - y2, CLIMB_LOOKAHEAD); // 正=上り
    if (climbAngle > MAX_CLIMB_ANGLE) return fromX;
    return toX;
  }

  const FALL_TRIGGER = 22; // px。移動先の地面がこれ以上下にある場合は歩いて追従させず落下扱いにする
  // 歩行中の接地追従:通常の緩やかな上り下りはそのまま歩けるが、崖や浮島の縁など大きな段差では
  // 自然に落下させる(常にYを地形に同期させてしまうと、足元が無くなっても「歩いて降りる」形になり
  // 場外判定が発生しない=落下自滅ができなくなるため)
  function followGroundOrFall(u) {
    const surfaceY = walkableGroundYAt(u.x, u.y + UNIT_RADIUS);
    if (surfaceY === null) return; // 移動前の崖判定で止まるため、ここは防御用
    const groundY = surfaceY - UNIT_RADIUS;
    if (groundY - u.y > FALL_TRIGGER) {
      u.grounded = false;
      u.vy = 0;
      u.fallStartY = u.y;
    } else {
      u.y = groundY;
    }
  }

  const player = {
    x: STAGE_W * 0.15, y: 0, vy: 0, grounded: true, fallStartY: 0,
    hp: MAX_HP, maxHp: MAX_HP, fuel: FUEL_MAX, fuelMax: FUEL_MAX,
    color: '#4fc3f7', label: 'YOU', side: 'player',
    character: null, specialCharge: 0
  };
  const cpu = {
    x: STAGE_W * 0.85, y: 0, vy: 0, grounded: true, fallStartY: 0,
    hp: MAX_HP, maxHp: MAX_HP, fuel: FUEL_MAX, fuelMax: FUEL_MAX,
    color: '#ff6b6b', label: 'CPU', side: 'cpu',
    character: null, specialCharge: 0
  };

  function applyCharacter(u, key) {
    const def = CHARACTERS[key];
    u.character = key;
    u.maxHp = def.maxHp;
    u.hp = def.maxHp;
    u.fuelMax = Math.round(FUEL_MAX * def.fuelMul);
    u.fuel = u.fuelMax;
    u.color = def.color;
    u.label = def.name;
  }

  function unitAnchor(u) {
    // キャラの中心(発射基点/爆風判定の基点)
    return { x: u.x, y: u.y };
  }

  function initUnitOnGround(u) {
    u.y = groundYAt(u.x) - UNIT_RADIUS;
    u.vy = 0;
    u.grounded = true;
    u.fallStartY = u.y;
  }

  // ===== 風 =====
  const WIND_ACCEL_MAX = 260; // px/s^2
  let wind = { dir: 1, strength: 0 }; // strength: 0..1

  function rollWind() {
    wind.dir = Math.random() < 0.5 ? -1 : 1;

  }

  // ===== 弾道物理 =====
  const GRAVITY = 650; // px/s^2
  const MAX_DRAG = 130; // px
  const VEL_SCALE = 6.5; // px/s per px(ドラッグ量)。水平方向でも十分届くよう底上げ
  const FIRE_MIN_DRAG = 12;

  // 引っ張り量(dx,dy)からキャラ性能を反映した発射初速を計算する共通処理(プレビューと実発射で共有)
  // 引っ張った向きをそのまま反映する(狙った角度を歪めない。水平が撃ちにくい問題はVEL_SCALE側で補う)
  function computeLaunchVelocity(dx, dy, def) {
    const vx0 = -dx * VEL_SCALE * def.velScaleMul;
    const vy0 = -dy * VEL_SCALE * def.velScaleMul;
    return { vx0, vy0 };
  }

  let projectiles = []; // [{x,y,vx,vy,owner,radius,blastMul,windMul,pierce}]
  let aimState = null;   // {owner, anchorX, anchorY, curX, curY}

  function fireProjectile(owner, anchor, vx, vy, opts) {
    opts = opts || {};
    projectiles.push({
      x: anchor.x, y: anchor.y, vx, vy, owner, radius: 5,
      blastMul: opts.blastMul || 1,
      windMul: opts.windMul != null ? opts.windMul : 1,
      pierce: !!opts.pierce
    });
  }

  function rotateVec(vx, vy, deg) {
    const r = deg * Math.PI / 180;
    return { vx: vx * Math.cos(r) - vy * Math.sin(r), vy: vx * Math.sin(r) + vy * Math.cos(r) };
  }

  // キャラ性能+必殺ショットを反映して発射する共通口
  function launchShot(unit, anchor, vx0, vy0, useSpecial) {
    const def = CHARACTERS[unit.character];
    const owner = unit.side;
    const activateSpecial = useSpecial && isSpecialReady(unit);

    if (activateSpecial && def.key === 'medama') {
      // 目玉の必殺: 3連弾(扇状に3発)
      for (const deg of [-9, 0, 9]) {
        const v = rotateVec(vx0, vy0, deg);
        fireProjectile(owner, anchor, v.vx, v.vy, { blastMul: def.blastMul, windMul: def.windMul });
      }
    } else if (activateSpecial && def.key === 'iwa') {
      // 岩の必殺: 地形大破壊(巨大クレーター)
      fireProjectile(owner, anchor, vx0, vy0, { blastMul: def.blastMul * 2.6, windMul: def.windMul });
    } else if (activateSpecial && def.key === 'tori') {
      // 鳥の必殺: 貫通弾(地形を無視して直進)
      fireProjectile(owner, anchor, vx0, vy0, { blastMul: def.blastMul, windMul: def.windMul, pierce: true });
    } else {
      fireProjectile(owner, anchor, vx0, vy0, { blastMul: def.blastMul, windMul: def.windMul });
    }

    if (activateSpecial) {
      unit.specialCharge = 0;
      triggerSpecialFlash(`必殺: ${def.special}!!`);
      playSpecialSound();
    } else {
      playLaunchSound();
    }
  }

    const data = loadSuspendedMatch();

    if (line) ctx.fillText(line, x, cy);

  // 直撃>至近>爆風減衰のダメージ計算(blastMulでキャラの爆風サイズを反映)
  function computeDamage(dist, blastMul) {
    const DIRECT = 20 * blastMul, CLOSE = 48 * blastMul, BLAST = 100 * blastMul;
    if (dist <= DIRECT) return 45;
    if (dist <= CLOSE) return Math.round(45 - (dist - DIRECT) / (CLOSE - DIRECT) * 20);
    if (dist <= BLAST) return Math.round(25 - (dist - CLOSE) / (BLAST - CLOSE) * 25);
    return 0;
  }

  function explodeAt(x, y, blastMul, owner) {
    blastMul = blastMul || 1;
    carveCrater(x, y, 44 * blastMul);
    spawnExplosion(x, y, blastMul);
    triggerShake(4 + 4 * blastMul, 0.12 + 0.08 * blastMul);
    playExplosionSound(blastMul);
    for (const u of [player, cpu]) {
      const a = unitAnchor(u);
      const dist = Math.hypot(a.x - x, a.y - y);
      const dmg = computeDamage(dist, blastMul);
      if (dmg > 0) {
        u.hp = Math.max(0, u.hp - dmg);
        spawnDamageText(a.x, a.y - UNIT_RADIUS - 10, dmg);
        if (owner === 'player' && u.side === 'cpu') runStats.damageDealt += dmg;
      }
    }
    checkMatchEnd();
  }

  function estimateFlightTime(vx0, vy0) {
    // ほぼ水平(vy0が±1px/s程度)なドラッグはatan2/sinの浮動小数点誤差で
    // vy0がごく僅かな負値になり得るため、しきい値を設けてフォールバックに逃がす
    if (vy0 < -1) return Math.min(3, (2 * Math.abs(vy0)) / GRAVITY);
    return 0.6;
  }

  // 水平付近では「発射高度へ戻るまでの時間」がほぼ0になるため、時間だけで
  // ガイド長を決めると点が発射位置に固まる。角度に関係なく最低限の距離を見せる。
  const TRAJECTORY_PREVIEW_MIN_DISTANCE = 100;
  const TRAJECTORY_PREVIEW_MAX_MIN_TIME = 0.45;
  function trajectoryPreviewDuration(vx0, vy0) {
    const normalPreviewTime = estimateFlightTime(vx0, vy0) * 0.2;
    const speed = Math.max(1, Math.hypot(vx0, vy0));
    const minimumVisibleTime = Math.min(
      TRAJECTORY_PREVIEW_MAX_MIN_TIME,
      TRAJECTORY_PREVIEW_MIN_DISTANCE / speed
    );
    return Math.max(normalPreviewTime, minimumVisibleTime);
  }

  function checkMatchEnd() {
    if (matchOver) return;
    if (player.hp <= 0 || cpu.hp <= 0) {
      matchOver = true;
      winner = (player.hp <= 0 && cpu.hp <= 0) ? 'cpu' : (player.hp <= 0 ? 'cpu' : 'player');
      applyStreakResult();
    }
  }

  function judgeByHp() {
    matchOver = true;
    const pr = player.hp / player.maxHp;
    const cr = cpu.hp / cpu.maxHp;
    winner = pr > cr ? 'player' : 'cpu'; // 同率は引き分けなし・CPU勝ち扱い
    applyStreakResult();
  }

  let lastRunStreak = 0;
  let lastRunEfficiency = 0;
  function applyStreakResult() {
    if (winner === 'player') {
      winStreak++;
    } else {
      lastRunStreak = winStreak;
      lastRunEfficiency = currentEfficiency();
      winStreak = 0;
      runStats = { damageDealt: 0, shots: 0 }; // 連勝が途切れたら次の挑戦は与ダメ効率もリセット
    }
  }

  function startTurn() {
    if (turnCount % 4 === 0) rollWind(); // 風は自分・相手2ターンずつ(計4ターン)固定
    if (currentTurn === 'player') {
      player.fuel = player.fuelMax;
    } else {
      cpu.fuel = cpu.fuelMax;
      cpuThinkTimer = 0.7 + Math.random() * 0.5;
      const plan = planCpuMove();
      cpuMoveDir = plan.dir;
      cpuMoveRemaining = plan.distance;
      cpuPhase = cpuMoveRemaining > 0 ? 'move' : 'aim';
    }
  }

  function endTurn() {
    if (matchOver) return;
    // そのキャラが1手番を終えるごとに1段階。使用した手番の終了時から再充填を始める。
    advanceSpecialCharge(currentTurn === 'player' ? player : cpu);
    turnCount++;
    if (turnCount >= MAX_TURNS_TOTAL) {
      showCutIn('タイムアップ!', '判定は…', 1.6, () => { judgeByHp(); });
      return;
    }
    currentTurn = currentTurn === 'player' ? 'cpu' : 'player';
    startTurn();
    showCutIn(currentTurn === 'player' ? 'あなたのターン' : 'CPUのターン', '', 0.9);
  }

  // ===== CPU AI(精度成長型)=====
  // 連勝数が伸びるほど理論弾道からの誤差が縮む。20連勝〜はほぼ正解弾道。
  function cpuAccuracyTier(streak) {
    if (streak < 3) return { name: 'low', jitter: 0.38 };
    if (streak < 10) return { name: 'mid', jitter: 0.20 };
    if (streak < 20) return { name: 'high', jitter: 0.09 };
    return { name: 'perfect', jitter: 0.02 };
  }

  // CPUの移動計画:危機回避(近すぎる)・攻撃調整(遠すぎる)の時だけ動く。むやみに動かない。
  let cpuMoveDir = 0;
  let cpuMoveRemaining = 0;
  let cpuPhase = 'aim'; // 'move' | 'aim'

  function planCpuMove() {
    const tier = cpuAccuracyTier(winStreak);
    if (tier.name === 'low') return { dir: 0, distance: 0 }; // 1〜3連勝は動かない

    const dist = Math.abs(player.x - cpu.x);
    const NEAR = 150;  // 近すぎ(自爆や反撃のリスク)→離れる
    const FAR = 500;   // 遠すぎ(命中率のため)→寄る

    let dir = 0;
    if (dist < NEAR) dir = cpu.x < player.x ? -1 : 1;
    else if (dist > FAR) dir = cpu.x < player.x ? 1 : -1;
    if (dir === 0) return { dir: 0, distance: 0 };

    // 中ティアは必要な時でも半分の確率でしか動かない(様子見)
    if (tier.name === 'mid' && Math.random() < 0.5) return { dir: 0, distance: 0 };

    const willingness = tier.name === 'perfect' ? 1 : tier.name === 'high' ? 0.85 : 0.6;
    return { dir, distance: cpu.fuelMax * willingness };
  }

  function cpuAutoTurn() {
    if (matchOver || projectiles.length) return;
    const anchor = unitAnchor(cpu);
    const target = unitAnchor(player);
    const def = CHARACTERS[cpu.character];
    const baseT = Math.min(1.7, Math.max(0.7, Math.abs(target.x - anchor.x) / 230)) * def.tBias;
    const { vx0, vy0 } = perfectAimVelocity(anchor, target, baseT);
    const tier = cpuAccuracyTier(winStreak);
    const jitter = tier.jitter;
    const vx = vx0 * (1 + (Math.random() * 2 - 1) * jitter);
    const vy = vy0 * (1 + (Math.random() * 2 - 1) * jitter);
    const useSpecial = isSpecialReady(cpu) && (tier.name === 'high' || tier.name === 'perfect');
    launchShot(cpu, anchor, vx, vy, useSpecial);
    awaitingResolve = true;
  }

  // 高低差・現在の風を考慮して(anchor→target)を正確に結ぶ「理論上の正解弾道」を逆算
  function perfectAimVelocity(anchor, target, tHint) {
    const dx = target.x - anchor.x;
    const dy = target.y - anchor.y;
    const distAbs = Math.max(1, Math.abs(dx));
    const t = tHint || Math.min(1.7, Math.max(0.7, distAbs / 230));
    const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX;
    const vx0 = (dx - 0.5 * windAccel * t * t) / t;
    const vy0 = (dy - 0.5 * GRAVITY * t * t) / t;
    return { vx0, vy0, t };
  }

  function eliminateAtDeadLine(u) {
    if (u.hp <= 0 || u.y + UNIT_RADIUS < DEAD_LINE_Y) return false;
    u.hp = 0;
    u.vy = 0;
    u.grounded = true;
    playDeadLineSound();
    triggerShake(5, 0.18);
    checkMatchEnd();
    return true;
  }

  function updateFalling(dt, u) {
    // 地面が残っていても、車体下端がデッドラインへ触れた時点で敗北。
    if (eliminateAtDeadLine(u)) return;
    if (u.grounded) {
      const nearbyGround = walkableGroundYAt(u.x, u.y + UNIT_RADIUS);
      const groundY = (nearbyGround === null ? u.y + UNIT_RADIUS : nearbyGround) - UNIT_RADIUS;
      if (groundY > u.y + 2) {
        // 足場が崩れて落下開始
        u.grounded = false;
        u.vy = 0;
        u.fallStartY = u.y;
      } else {
        u.y = groundY; // 地形に追従(登り降りはそのまま歩ける)
      }
    } else {
      const previousFeetY = u.y + UNIT_RADIUS;
      u.vy += GRAVITY * dt;
      u.y += u.vy * dt;
      if (eliminateAtDeadLine(u)) return;
      const g2 = groundYBelow(u.x, previousFeetY) - UNIT_RADIUS;
      if (u.y >= g2) {
        const intoVoid = g2 >= FLOOR_Y - UNIT_RADIUS - 2; // クレーターが底まで貫通=場外
        const fallDist = g2 - u.fallStartY;
        u.y = g2;
        u.vy = 0;
        u.grounded = true;
        if (fallDist > 15) {
          triggerShake(3, 0.1);
        }
        if (u.hp > 0) {
          if (intoVoid) {
            u.hp = 0; // 場外落下は即死(落下ダメージ自体は計算しない)
          }
          checkMatchEnd();
        }
      }
    }
  }

  // ===== 描画 =====
  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, currentTheme.sky[0]);
    g.addColorStop(0.55, currentTheme.sky[1]);
    g.addColorStop(1, currentTheme.sky[2]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH);

    // 遠景の星
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 137.5) % VW;
      const sy = (i * 71.3) % (GROUND_MIN_Y - 20);
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
  }

  // ===== 遠景パララックス(山のシルエット・雲。カメラより遅く動いて奥行きを出す) =====
  function bgHillY(x, seedOffset, baseY, amp) {
    const p = x + seedOffset;
    return baseY
      + Math.sin(p * 0.006) * amp
      + Math.sin(p * 0.017 + 1.3) * amp * 0.4
      + Math.sin(p * 0.041 + 2.7) * amp * 0.18;
  }

  function drawHillLayer(seedOffset, baseY, amp, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    const fromX = -200, toX = STAGE_W + 200, step = 24;
    ctx.moveTo(fromX, bgHillY(fromX, seedOffset, baseY, amp));
    for (let x = fromX + step; x <= toX; x += step) {
      ctx.lineTo(x, bgHillY(x, seedOffset, baseY, amp));
    }
    ctx.lineTo(toX, GROUND_MAX_Y + 50);
    ctx.lineTo(fromX, GROUND_MAX_Y + 50);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawCloudShape(cx, cy, r) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.5, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - r * 0.6, cy + r * 0.15, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + r * 0.6, cy + r * 0.1, r * 0.65, r * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawClouds() {
    ctx.save();
    ctx.fillStyle = currentTheme.cloud;
    const t = Date.now() * 0.008;
    for (let i = 0; i < 6; i++) {
      const cx = ((i * 260 + t * 4 + parallaxSeed) % (STAGE_W + 400)) - 200;
      const cy = 60 + (i % 3) * 45;
      drawCloudShape(cx, cy, 34 + (i % 2) * 14);
    }
    ctx.restore();
  }

  function drawParallax() {
    ctx.save();
    applyWorldCamera(0.15);
    drawHillLayer(parallaxSeed, 220, 46, currentTheme.farHill);
    ctx.restore();
    ctx.save();
    applyWorldCamera(0.35);
    drawHillLayer(parallaxSeed + 500, 270, 60, currentTheme.nearHill);
    ctx.restore();
    ctx.save();
    applyWorldCamera(0.1);
    drawClouds();
    ctx.restore();
  }

  function drawTerrain() {
    // 地形マスク(ピクセル単位で穴があいた実体)をそのまま描画
    ctx.drawImage(terrainCanvas, 0, 0);
    // 地形マスクから生成した全周の境界線。浮島・縦崖・爆破穴も実際の形どおりに縁取る。
    ctx.drawImage(terrainRimCanvas, 0, 0);
    // 橋は既存の薄床地形に重ねた装飾。地形と一緒に爆破で削れる。
    ctx.drawImage(bridgeCanvas, 0, 0);
  }

  function drawDeadLine() {
    const y = worldToScreenY(DEAD_LINE_Y);
    const pulse = 0.68 + Math.sin(performance.now() * 0.006) * 0.18;
    ctx.save();
    ctx.shadowColor = `rgba(255,45,55,${pulse})`;
    ctx.shadowBlur = 10;
    ctx.strokeStyle = `rgba(255,72,72,${pulse + 0.12})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([13, 7]);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(VW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,95,95,0.95)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DEAD LINE', VW / 2, y - 6);
    ctx.restore();
  }

  // 接地点付近の地形傾斜(ラジアン)。急すぎる斜面は見た目が破綻しないようクランプ
  function groundSlopeAt(u) {
    const d = 14;
    const feetY = u.y + UNIT_RADIUS;
    const leftGround = walkableGroundYAt(Math.max(0, u.x - d), feetY);
    const rightGround = walkableGroundYAt(Math.min(STAGE_W, u.x + d), feetY);
    const y1 = leftGround === null ? feetY : leftGround;
    const y2 = rightGround === null ? feetY : rightGround;
    const MAX_TILT = 0.5; // 約28.6度
    return Math.max(-MAX_TILT, Math.min(MAX_TILT, Math.atan2(y2 - y1, 2 * d)));
  }

  function drawUnit(u) {
    const a = unitAnchor(u);
    const isBossUnit = isBossMatch && u.side === 'cpu';
    const img = u.character ? charImages[u.character] : null;
    const imgReady = img && img.complete && img.naturalWidth > 0;
    const facingLeft = u.side === 'cpu'; // 自分は右向き画像そのまま、CPUは反転して内側(左)を向く
    const tilt = u.grounded ? groundSlopeAt(u) : 0; // 空中では傾けない

    // 画像は接地ライン(groundY = a.y + UNIT_RADIUS)に底面を合わせて描画
    const h = SPRITE_SIZE;
    const w = imgReady ? h * (img.naturalWidth / img.naturalHeight) : h;
    const imgTopAbs = a.y + UNIT_RADIUS - h;

    ctx.save();
    ctx.translate(a.x, a.y);
    if (isBossUnit) {
      ctx.beginPath();
      ctx.arc(0, UNIT_RADIUS - h / 2, h / 2 + 8, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    if (imgReady) {
      ctx.save();
      ctx.globalAlpha = u.hp > 0 ? 1 : 0.4;
      // 接地点(0, UNIT_RADIUS)を軸に地形傾斜ぶんだけ回転。flipより外側に回転をかけることで
      // 反転していても傾き方向が世界座標基準(実際の地形)と一致するようにする
      ctx.translate(0, UNIT_RADIUS);
      ctx.rotate(tilt);
      if (facingLeft) ctx.scale(-1, 1);
      ctx.translate(0, -UNIT_RADIUS);
      ctx.drawImage(img, -w / 2, UNIT_RADIUS - h, w, h);
      ctx.restore();
    } else {
      // 画像読み込み中のフォールバック(色付き円)
      ctx.beginPath();
      ctx.arc(0, 0, UNIT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = u.hp > 0 ? u.color : '#555';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(u.label, 0, 4);
    }
    ctx.restore();

    if (isBossUnit) {
      ctx.save();
      ctx.fillStyle = '#ffd24a';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', a.x, imgTopAbs - 2);
      ctx.restore();
    }

    // HPバー
    const barW = 70, barX = a.x - barW / 2, barY = imgTopAbs - (isBossUnit ? 18 : 4);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, 8);
    const ratio = Math.max(0, u.hp / u.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#7be07b' : ratio > 0.25 ? '#f0c860' : '#f06060';
    ctx.fillRect(barX, barY, barW * ratio, 8);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.fillText(`${u.hp}/${u.maxHp}`, a.x, barY - 3);
  }

  function drawWindMeter() {
    const cx = VW / 2, cy = 56;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(cx - 70, cy - 16, 140, 32);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('WIND', cx, cy - 4);

    const len = 16 + wind.strength * 42;
    const dir = wind.dir;
    ctx.strokeStyle = '#ffe08a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - dir * len / 2, cy + 8);
    ctx.lineTo(cx + dir * len / 2, cy + 8);
    ctx.stroke();
    // 矢じり
    const ax = cx + dir * len / 2;
    ctx.beginPath();
    ctx.moveTo(ax, cy + 8);
    ctx.lineTo(ax - dir * 7, cy + 4);
    ctx.lineTo(ax - dir * 7, cy + 12);
    ctx.closePath();
    ctx.fillStyle = '#ffe08a';
    ctx.fill();
    ctx.restore();
  }

  // ===== プレイヤー/CPUのHP・燃料ゲージ(WINDの左右)。燃料はターン開始で満タンに戻るので
  // 「減った分=そのターンでどれだけ移動したか」が常に見える =====
  function drawUnitPanel(u, edgeX, align) {
    const w = 158;
    const barX = align === 'left' ? edgeX : edgeX - w;
    const textX = align === 'left' ? barX : barX + w;
    ctx.save();
    ctx.textAlign = align;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(u.label, textX, 46);

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX, 50, w, 9);
    const hpRatio = Math.max(0, u.hp / u.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#7be07b' : hpRatio > 0.25 ? '#f0c860' : '#f06060';
    ctx.fillRect(barX, 50, w * hpRatio, 9);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, 50, w, 9);

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX, 63, w, 6);
    const fuelRatio = Math.max(0, u.fuel / u.fuelMax);
    ctx.fillStyle = '#8ad0ff';
    ctx.fillRect(barX, 63, w * fuelRatio, 6);
    ctx.strokeRect(barX, 63, w, 6);
    ctx.restore();
  }

  // 引っ張り線(スクリーン座標。カメラの影響を受けないUIレイヤー)
  function drawPullLine() {
    if (!aimState) return;
    const { origin, curX, curY } = aimState;
    const cancelled = isInCancelZone(curX, curY);
    ctx.save();
    ctx.strokeStyle = cancelled ? 'rgba(255,90,90,0.85)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(curX, curY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(curX, curY, 10, 0, Math.PI * 2);
    ctx.fillStyle = cancelled ? 'rgba(255,90,90,0.85)' : 'rgba(255,255,255,0.8)';
    ctx.fill();
    ctx.restore();
  }

  // 弾道プレビュー(ワールド座標。カメラ変換の中で描画する)
  function drawTrajectoryPreview() {
    if (!aimState) return;
    const { anchor, origin, curX, curY } = aimState;
    if (isInCancelZone(curX, curY)) return;

    let dx = curX - origin.x;
    let dy = curY - origin.y;
    const dist = Math.min(MAX_DRAG, Math.hypot(dx, dy));
    if (dist < FIRE_MIN_DRAG) return;
    const ang = Math.atan2(dy, dx);
    dx = Math.cos(ang) * dist;
    dy = Math.sin(ang) * dist;

    // 発射方向は引っ張りの逆向き(自キャラの性能を反映)
    const def = CHARACTERS[player.character];
    const { vx0, vy0 } = computeLaunchVelocity(dx, dy, def);
    const previewT = trajectoryPreviewDuration(vx0, vy0);
    const steps = 14;
    const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX * def.windMul;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let i = 1; i <= steps; i++) {
      const t = (previewT * i) / steps;
      const px = anchor.x + vx0 * t + 0.5 * windAccel * t * t;
      const py = anchor.y + vy0 * t + 0.5 * GRAVITY * t * t;
      ctx.beginPath();
      ctx.arc(px, py, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 画面外の敵の方向インジケータ(スクリーン座標)
  function drawOffscreenIndicator() {
    const sx = worldToScreenX(cpu.x);
    if (sx >= -UNIT_RADIUS && sx <= VW + UNIT_RADIUS) return;
    const onRight = sx > VW;
    const ix = onRight ? VW - 16 : 16;
    const iy = Math.max(180, Math.min(CONTROL_PANEL_Y - 30, worldToScreenY(cpu.y)));
    ctx.save();
    ctx.fillStyle = 'rgba(255,107,107,0.9)';
    ctx.beginPath();
    if (onRight) {
      ctx.moveTo(ix + 10, iy);
      ctx.lineTo(ix - 6, iy - 9);
      ctx.lineTo(ix - 6, iy + 9);
    } else {
      ctx.moveTo(ix - 10, iy);
      ctx.lineTo(ix + 6, iy - 9);
      ctx.lineTo(ix + 6, iy + 9);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('敵', ix + (onRight ? -14 : 14), iy + 4);
    ctx.restore();
  }

  function drawProjectile() {
    for (const p of projectiles) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.pierce ? '#b8f2ff' : '#fff2a8';
      ctx.fill();
      ctx.strokeStyle = p.pierce ? '#4fc3f7' : '#c88a2a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  const continueBtn = { x: VW / 2, y: VH / 2 + 78, w: 210, h: 46 };

  function drawResultBanner() {
    if (!matchOver) return;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, VH / 2 - 120, VW, 280);
    ctx.textAlign = 'center';

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    const msg = winner === 'player' ? 'CPUを撃破!' : 'あなたの負け...';
    ctx.fillText(msg, VW / 2, VH / 2 - 70);

    if (winner === 'player') {
      ctx.fillStyle = '#ffd24a';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText(`${winStreak}連勝!`, VW / 2, VH / 2 - 22);
      if (winStreak > 0 && winStreak % 10 === 0) {

  // ===== 入力(引っ張り照準) =====
  function canvasPointFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const scaleX = VW / rect.width;
    const scaleY = VH / rect.height;
    return { x: cx * scaleX, y: cy * scaleY };
  }

  function beginPinchIfPossible() {
    const touches = [...activeTouchPoints.entries()].filter(([, p]) => p.y < CONTROL_PANEL_Y);
    if (touches.length < 2) return false;
    const [first, second] = touches.slice(-2);
    const a = first[1], b = second[1];
    const distance = Math.hypot(b.x - a.x, b.y - a.y);
    if (distance < 12) return false;
    const midpointX = (a.x + b.x) / 2;

    // 1本目で始まっていたパンを2本指ズームへ切り替える。
    if (inputMode === 'aim') aimState = null;
    if (inputMode === 'moveL' || inputMode === 'moveR') moveDir = 0;
    inputMode = 'pinch';
    inputPointerId = null;
    pinchState = {
      ids: [first[0], second[0]],
      startDistance: distance,
      startZoom: cameraZoom,
      anchorWorldX: cameraX + midpointX / cameraZoom
    };
    return true;
  }

  function hitButton(p, btn) {
    return Math.hypot(p.x - btn.x, p.y - btn.y) <= BTN_R + 12;
  }

  function onPointerDown(e) {
    e.preventDefault();
    if (cutIn) return; // カットイン中は入力を受け付けない
    const p0 = canvasPointFromEvent(e);
    if (gamePhase === 'loading') return;
    if (gamePhase === 'title') {
      if (hitRect(p0, titleVsCpuBtn)) {
        playUiSound();
        gamePhase = 'select';
      }
      return;
    }
    if (gamePhase === 'select') {
      if (hasSuspendedSave && hitRect(p0, resumeBtn)) {
        resumeSuspendedMatch();
        return;
      }
      for (const card of selectCards) {
        if (Math.abs(p0.x - card.x) <= card.w / 2 && Math.abs(p0.y - card.y) <= card.h / 2) {
          selectCharacterAndStart(card.key);
          return;
        }
      }
      return;
    }

    if (menuOpen) {
      if (hitRect(p0, menuResumeBtn)) { menuOpen = false; return; }
      if (hitRect(p0, menuSuspendBtn)) {
        saveSuspendedMatch();
        menuOpen = false;
        gamePhase = 'title';
        hasSuspendedSave = true;
        return;
      }
      return; // メニュー表示中は他の操作を無視
    }

    if (canOpenMenu() && Math.hypot(p0.x - menuBtn.x, p0.y - menuBtn.y) <= menuBtn.r + 10) {
      menuOpen = true;
      return;
    }

    if (Math.hypot(p0.x - soundBtn.x, p0.y - soundBtn.y) <= soundBtn.r + 10) {
      soundOn = !soundOn;
      if (soundOn) playUiSound();
      return;
    }

    if (matchOver) {
      const b = continueBtn;
      if (Math.abs(p0.x - b.x) <= b.w / 2 && Math.abs(p0.y - b.y) <= b.h / 2) {
        resetMatch(true);
      }
      return;
    }

    // 戦場エリアの2本指操作。指を広げると等倍へ、縮めると全景へ戻る。
    if (e.pointerType === 'touch' && p0.y < CONTROL_PANEL_Y) {
      activeTouchPoints.set(e.pointerId, p0);
      canvas.setPointerCapture(e.pointerId);
      if (beginPinchIfPossible()) return;
    }

    // 移動ボタン・必殺ボタン・発射ボタンは自分のターンでのみ
    if (currentTurn === 'player' && !awaitingResolve) {
      if (hitButton(p0, leftBtn)) {
        inputMode = 'moveL'; inputPointerId = e.pointerId; moveDir = -1;
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      if (hitButton(p0, rightBtn)) {
        inputMode = 'moveR'; inputPointerId = e.pointerId; moveDir = 1;
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      if (isSpecialReady(player) && Math.hypot(p0.x - specialBtn.x, p0.y - specialBtn.y) <= specialBtn.r + 10) {
        specialArmed = !specialArmed;
        return;
      }
      if (player.grounded && Math.hypot(p0.x - FIRE_BTN.x, p0.y - FIRE_BTN.y) <= FIRE_BTN.r + 10) {
        // 固定アンカー式:発射ボタンの中心から引っ張った分だけ飛ぶ
        inputMode = 'aim'; inputPointerId = e.pointerId;
        aimState = { anchor: unitAnchor(player), origin: { x: FIRE_BTN.x, y: FIRE_BTN.y }, curX: p0.x, curY: p0.y };
        canvas.setPointerCapture(e.pointerId);
        return;
      }
    }

    // それ以外は画面を直接スライドして視点移動(どちらのターン中でも可・離しても位置はそのまま)
    if (p0.y < CONTROL_PANEL_Y) {
      inputMode = 'pan'; inputPointerId = e.pointerId;
      panLastX = p0.x;
      canvas.setPointerCapture(e.pointerId);
    }
  }

  function onPointerMove(e) {
    const p = canvasPointFromEvent(e);
    if (e.pointerType === 'touch' && activeTouchPoints.has(e.pointerId)) {
      activeTouchPoints.set(e.pointerId, p);
    }
    if (pinchState && pinchState.ids.includes(e.pointerId)) {
      const a = activeTouchPoints.get(pinchState.ids[0]);
      const b = activeTouchPoints.get(pinchState.ids[1]);
      if (a && b) {
        const distance = Math.max(12, Math.hypot(b.x - a.x, b.y - a.y));
        const midpointX = (a.x + b.x) / 2;
        cameraZoom = clampCameraZoom(pinchState.startZoom * distance / pinchState.startDistance);
        cameraX = clampCameraX(pinchState.anchorWorldX - midpointX / cameraZoom);
      }
      return;
    }
    if (e.pointerId !== inputPointerId) return;
    if (inputMode === 'aim' && aimState) {
      aimState.curX = p.x;
      aimState.curY = p.y;
    } else if (inputMode === 'pan') {
      cameraX = clampCameraX(cameraX - (p.x - panLastX) / cameraZoom);
      panLastX = p.x;
    }
  }

  function onPointerUp(e) {
    if (e.pointerType === 'touch') activeTouchPoints.delete(e.pointerId);
    if (pinchState && pinchState.ids.includes(e.pointerId)) {
      pinchState = null;
      inputMode = null;
      inputPointerId = null;
      return;
    }
    if (e.pointerId !== inputPointerId) return;
    if (inputMode === 'aim' && aimState) {
      if (!isInCancelZone(aimState.curX, aimState.curY)) {
        let dx = aimState.curX - aimState.origin.x;
        let dy = aimState.curY - aimState.origin.y;
        const dist = Math.min(MAX_DRAG, Math.hypot(dx, dy));
        if (dist >= FIRE_MIN_DRAG) {
          const ang = Math.atan2(dy, dx);
          dx = Math.cos(ang) * dist;
          dy = Math.sin(ang) * dist;
          const def = CHARACTERS[player.character];
          const { vx0, vy0 } = computeLaunchVelocity(dx, dy, def);
          launchShot(player, aimState.anchor, vx0, vy0, specialArmed);
          runStats.shots++;
          specialArmed = false;
          awaitingResolve = true;
        }
      }
      aimState = null;
    } else if (inputMode === 'moveL' || inputMode === 'moveR') {
      moveDir = 0;
    }
    inputMode = null;
    inputPointerId = null;
  }

  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  canvas.addEventListener('dragstart', (e) => e.preventDefault());
  window.addEventListener('pointercancel', onPointerUp);

  function resetMatch(carrySpecialCharge) {
    const playerCharge = carrySpecialCharge ? player.specialCharge : 0;
    const cpuCharge = carrySpecialCharge ? cpu.specialCharge : 0;
    newTerrain();
    applyCharacter(player, player.character);
    applyCharacter(cpu, cpu.character);
    player.x = STAGE_W * 0.15;
    cpu.x = STAGE_W * 0.85;
    initUnitOnGround(player);
    initUnitOnGround(cpu);
    projectiles = [];
    aimState = null;
    moveDir = 0;
    inputMode = null;
    inputPointerId = null;
    activeTouchPoints.clear();
    pinchState = null;
    specialArmed = false;
    player.specialCharge = Math.max(0, Math.min(SPECIAL_CHARGE_MAX, playerCharge));
    cpu.specialCharge = Math.max(0, Math.min(SPECIAL_CHARGE_MAX, cpuCharge));
    matchOver = false;
    winner = null;
    awaitingResolve = false;
    turnCount = 0;
    currentTurn = 'player';
    cpuMoveDir = 0;
    cpuMoveRemaining = 0;
    cpuPhase = 'aim';
    particles = [];
    floatTexts = [];
    shakeTimer = 0;
    specialFlash = { timer: 0, text: '' };
    cutIn = null;
    cameraZoom = MIN_CAMERA_ZOOM;
    cameraX = 0;
    menuOpen = false;
    isBossMatch = winStreak > 0 && winStreak % 10 === 0;
    bossBannerTimer = isBossMatch ? 2.2 : 0;
    startTurn();
  }

  window.addEventListener('keydown', (e) => {
    if ((e.key === 'r' || e.key === 'R') && gamePhase === 'battle') resetMatch(false);
  });

  window.addEventListener('resize', resize);

  // ===== ゲームループ =====
  let lastTime = 0;
  function update(dt) {
    if (gamePhase !== 'battle') return;
    if (menuOpen) return; // メニュー表示中はゲーム進行を止める

    // カメラ:弾が飛んでいる間だけ自動で追従する。それ以外は指でスライドした位置のまま維持する(戻さない)
    if (projectiles.length) {
      const target = centerCameraOn(projectiles[0].x);
      cameraX += (target - cameraX) * Math.min(1, dt * 5);
    }

    // 演出系の更新はカットイン中も続ける(シェイクが残り続けて震え続けるのを防ぐ)
    if (bossBannerTimer > 0) bossBannerTimer = Math.max(0, bossBannerTimer - dt);
    if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
    if (specialFlash.timer > 0) specialFlash.timer = Math.max(0, specialFlash.timer - dt);

    // パーティクル更新
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.vy += 400 * dt;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.life -= dt;
      if (pt.life <= 0) particles.splice(i, 1);
    }
    // ダメージ数字ポップ更新
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const ft = floatTexts[i];
      ft.y += ft.vy * dt;
      ft.life -= dt;
      if (ft.life <= 0) floatTexts.splice(i, 1);
    }

    if (cutIn) {
      cutIn.timer -= dt;
      if (cutIn.timer <= 0) {
        const done = cutIn.onDone;
        cutIn = null;
        if (done) done();
      }
      return; // カットイン表示中はターン進行・移動・CPU思考を止める
    }

    // 弾の物理(複数弾:必殺の3連弾に対応)
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX * p.windMul;
      p.vx += windAccel * dt;
      p.vy += GRAVITY * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      let hit = false;
      // ユニットへの直撃判定(発射者自身は着弾するまで判定除外。誤射防止)
      for (const u of [player, cpu]) {
        if (u.side === p.owner) continue;
        const a = unitAnchor(u);
        if (Math.hypot(a.x - p.x, a.y - p.y) <= UNIT_HIT_RADIUS + p.radius) {
          explodeAt(p.x, p.y, p.blastMul, p.owner);
          projectiles.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;

      if (!p.pierce && isSolidAt(p.x, p.y)) {
        explodeAt(p.x, p.y, p.blastMul, p.owner);
        projectiles.splice(i, 1);
      } else if (p.x < -30 || p.x > STAGE_W + 30 || p.y > VH + 60) {
        projectiles.splice(i, 1); // 画面外(誤爆なしで消滅)
      }
    }

    // 落下物理(常時判定)
    updateFalling(dt, player);
    updateFalling(dt, cpu);

    if (matchOver) return;

    // 移動(プレイヤーのターンのみ・燃料制・長押しボタン)
    if (currentTurn === 'player' && !awaitingResolve && moveDir !== 0 && player.grounded && player.fuel > 0) {
      const dist = Math.min(MOVE_SPEED * dt, player.fuel);
      let nx = Math.min(STAGE_W - UNIT_RADIUS - 4, Math.max(UNIT_RADIUS + 4, player.x + moveDir * dist));
      nx = limitMoveByClimb(player, nx);
      const moved = Math.abs(nx - player.x);
      player.x = nx;
      player.fuel -= moved;
      followGroundOrFall(player);
    }

    // CPU移動→思考→発射
    if (currentTurn === 'cpu' && !awaitingResolve && cpu.grounded && !projectiles.length) {
      if (cpuPhase === 'move') {
        if (cpuMoveDir !== 0 && cpuMoveRemaining > 0 && cpu.fuel > 0) {
          const dist = Math.min(MOVE_SPEED * dt, cpu.fuel, cpuMoveRemaining);
          let nx = Math.min(STAGE_W - UNIT_RADIUS - 4, Math.max(UNIT_RADIUS + 4, cpu.x + cpuMoveDir * dist));
          nx = limitMoveByClimb(cpu, nx);
          const moved = Math.abs(nx - cpu.x);
          cpu.x = nx;
          cpu.fuel -= moved;
          cpuMoveRemaining -= moved;
          followGroundOrFall(cpu);
          if (moved < 0.01) cpuPhase = 'aim'; // 端に到達して進めなくなったら打ち切り
        } else {
          cpuPhase = 'aim';
        }
      } else {
        cpuThinkTimer -= dt;
        if (cpuThinkTimer <= 0) cpuAutoTurn();
      }
    }

    // ターン解決(着弾+落下が収まったら手番交代)
    if (awaitingResolve && !projectiles.length && player.grounded && cpu.grounded) {
      awaitingResolve = false;
      endTurn();
    }
  }

  function gameLoop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  newTerrain(); // 選択画面の背景として地形だけ先に用意
  resize();
  requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
