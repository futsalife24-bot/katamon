<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>カタモン - カタパルトモンスター</title>
<meta name="description" content="モンスターを選び、風と地形を読んで砲撃するカタパルト対戦ゲーム。">
<meta name="theme-color" content="#070a18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="カタモン">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preload" as="image" href="assets/loading-emblem.png" fetchpriority="high">
<link rel="preload" as="image" href="assets/title-logo.png" fetchpriority="high">
<link rel="preload" as="image" href="assets/kyoryu.png">
<link rel="preload" as="image" href="assets/medama.png">
<link rel="preload" as="image" href="assets/iwa.png">
<link rel="preload" as="image" href="assets/tori.png">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0b0d17;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    display: block;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-drag: none;
    -webkit-tap-highlight-color: transparent;
  }
  #debugPanel {
    display: none;
    position: fixed;
    top: 4px;
    left: 4px;
    color: #9effa8;
    font: 12px/1.4 monospace;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    white-space: pre;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
</div>
<div id="debugPanel">M1: 地形生成+描画+破壊テスト(タップでクレーター)</div>
<audio id="titleBgm" preload="auto">
  <source src="assets/title-bgm.mp3?v=2" type="audio/mpeg">
</audio>
<audio id="stageBgm" preload="none"></audio>

<script>
(() => {
  'use strict';

  // ===== 仮想解像度(9:16縦画面) =====
  const VW = 540;
  const VH = 960;

  // ===== 最終更新日(サーバー側のファイル更新日時から自動取得。手動更新不要) =====
  const LAST_UPDATED_TEXT = (() => {
    const d = new Date(document.lastModified);
    if (isNaN(d.getTime())) return '';
    const pad = n => String(n).padStart(2, '0');
    return `最終更新: ${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
  })();

  // ===== ステージ(横長)とカメラ =====
  // 初期状態はステージ全幅。ピンチアウトで従来の等倍サイズまで拡大できる。
  const STAGE_W = 960;
  const MIN_CAMERA_ZOOM = VW / STAGE_W;
  const MAX_CAMERA_ZOOM = 1;
  let cameraZoom = MIN_CAMERA_ZOOM;
  let cameraX = 0;
  function clampCameraZoom(zoom) {
    return Math.min(MAX_CAMERA_ZOOM, Math.max(MIN_CAMERA_ZOOM, zoom));
  }
  function visibleWorldWidth() {
    return VW / cameraZoom;
  }
  function clampCameraX(x) {
    return Math.min(Math.max(0, STAGE_W - visibleWorldWidth()), Math.max(0, x));
  }
  function centerCameraOn(worldX) {
    return clampCameraX(worldX - visibleWorldWidth() / 2);
  }
  function applyWorldCamera(parallaxFactor = 1) {
    ctx.translate(0, CONTROL_PANEL_Y);
    ctx.scale(cameraZoom, cameraZoom);
    ctx.translate(-cameraX * parallaxFactor, -CONTROL_PANEL_Y);
  }
  function worldToScreenX(worldX) {
    return (worldX - cameraX) * cameraZoom;
  }
  function worldToScreenY(worldY) {
    return CONTROL_PANEL_Y + (worldY - CONTROL_PANEL_Y) * cameraZoom;
  }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const debugPanel = document.getElementById('debugPanel');

  // ===== 効果音(WebAudio合成・音源ファイル不要) =====
  let soundOn = true;
  // ブラウザの自動再生制限に合わせ、タイトル画面での最初のタップから再生する。
  // タイトル→キャラ選択は同じ再生を維持し、出撃時に停止する。
  const titleBgm = document.getElementById('titleBgm');
  titleBgm.volume = 0.34;
  const TITLE_BGM_LOOP_GAP_MS = 2000;
  const TITLE_START_MAX_WAIT_MS = 1500;
  let titleBgmLoopTimer = null;
  let titleStartTimeout = null;
  let titleStartPending = false;
  let titleStartFailed = false;
  // BGMはバックグラウンドで先読みする。端末によっては全曲バッファリング通知が来ないため、
  // ロード完了条件には含めず、TAP後に実際の再生開始とタイトル遷移を同期する。
  titleBgm.load();
  function clearTitleBgmLoopTimer() {
    if (titleBgmLoopTimer === null) return;
    clearTimeout(titleBgmLoopTimer);
    titleBgmLoopTimer = null;
  }
  function playTitleBgm(restart = false) {
    if (!soundOn) return Promise.resolve();
    if (restart) {
      clearTitleBgmLoopTimer();
      titleBgm.pause();
      if (titleBgm.readyState > HTMLMediaElement.HAVE_NOTHING) titleBgm.currentTime = 0;
    }
    const result = titleBgm.play();
    return result && typeof result.then === 'function' ? result : Promise.resolve();
  }
  function startTitleBgm() {
    if (!soundOn || (gamePhase !== 'title' && gamePhase !== 'select')) return;
    if (titleBgmLoopTimer !== null) return;
    playTitleBgm().catch(() => {});
  }
  titleBgm.addEventListener('ended', () => {
    clearTitleBgmLoopTimer();
    if (!soundOn || (gamePhase !== 'title' && gamePhase !== 'select')) return;
    titleBgmLoopTimer = setTimeout(() => {
      titleBgmLoopTimer = null;
      if (!soundOn || (gamePhase !== 'title' && gamePhase !== 'select')) return;
      playTitleBgm(true).catch(() => {});
    }, TITLE_BGM_LOOP_GAP_MS);
  });
  function finishTitleStart(failed = false) {
    if (!titleStartPending) return;
    if (titleStartTimeout !== null) {
      clearTimeout(titleStartTimeout);
      titleStartTimeout = null;
    }
    titleStartPending = false;
    titleStartFailed = failed;
    if (gamePhase === 'press') gamePhase = 'title';
  }
  function enterTitleFromTap() {
    if (titleStartPending) return;
    titleStartPending = true;
    titleStartFailed = false;
    // 通常は実際の再生開始と同時にタイトルへ進む。端末側の音源準備が停止しても、
    // 最大1.5秒で必ず画面遷移し、以後のタップでBGM再生を再試行できるようにする。
    titleStartTimeout = setTimeout(() => {
      finishTitleStart(titleBgm.paused);
    }, TITLE_START_MAX_WAIT_MS);
    try {
      playTitleBgm(true)
        .then(() => { finishTitleStart(false); })
        .catch(() => { finishTitleStart(true); });
    } catch (_) {
      finishTitleStart(true);
    }
  }
  function stopTitleBgm(reset = true) {
    clearTitleBgmLoopTimer();
    titleBgm.pause();
    if (reset && titleBgm.readyState > HTMLMediaElement.HAVE_NOTHING) titleBgm.currentTime = 0;
  }
  const stageBgm = document.getElementById('stageBgm');
  const STAGE_BGM_SOURCES = {
    grass: 'assets/stage-grass.mp3?v=1',
    desert: 'assets/stage-desert.mp3?v=1',
    snow: 'assets/stage-snow.mp3?v=1',
    volcanic: 'assets/stage-volcanic.mp3?v=1'
  };
  const STAGE_BGM_VOLUME = 0.28;
  stageBgm.volume = STAGE_BGM_VOLUME;
  stageBgm.loop = true;
  let stageBgmTheme = null;
  let stageBgmRestoreTimer = null;
  function playStageBgm(themeKey, restart = false) {
    if (!soundOn || gamePhase !== 'battle') return;
    const src = STAGE_BGM_SOURCES[themeKey] || STAGE_BGM_SOURCES.grass;
    if (stageBgmTheme !== themeKey) {
      stageBgm.pause();
      stageBgm.src = src;
      stageBgmTheme = themeKey;
      stageBgm.load();
      restart = true;
    }
    if (restart && stageBgmRestoreTimer !== null) {
      clearTimeout(stageBgmRestoreTimer);
      stageBgmRestoreTimer = null;
    }
    if (restart) stageBgm.volume = STAGE_BGM_VOLUME;
    if (restart && stageBgm.readyState > HTMLMediaElement.HAVE_NOTHING) stageBgm.currentTime = 0;
    const result = stageBgm.play();
    if (result && typeof result.catch === 'function') result.catch(() => {});
  }
  function stopStageBgm(reset = true) {
    if (stageBgmRestoreTimer !== null) {
      clearTimeout(stageBgmRestoreTimer);
      stageBgmRestoreTimer = null;
    }
    stageBgm.volume = STAGE_BGM_VOLUME;
    stageBgm.pause();
    if (reset && stageBgm.readyState > HTMLMediaElement.HAVE_NOTHING) stageBgm.currentTime = 0;
  }
  function duckStageBgm(duration = 1800) {
    if (!soundOn || stageBgm.paused) return;
    if (stageBgmRestoreTimer !== null) clearTimeout(stageBgmRestoreTimer);
    stageBgm.volume = 0.11;
    stageBgmRestoreTimer = setTimeout(() => {
      stageBgmRestoreTimer = null;
      stageBgm.volume = STAGE_BGM_VOLUME;
    }, duration);
  }
  let audioCtx = null;
  let sfxCompressor = null;
  function getAudioCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function getSfxDestination(ac) {
    if (!sfxCompressor) {
      const compressor = ac.createDynamicsCompressor();
      compressor.threshold.value = -16;
      compressor.knee.value = 18;
      compressor.ratio.value = 5;
      compressor.attack.value = 0.003;
      compressor.release.value = 0.18;
      const master = ac.createGain();
      master.gain.value = 0.78;
      compressor.connect(master).connect(ac.destination);
      sfxCompressor = compressor;
    }
    return sfxCompressor;
  }

  function playTone(freq, duration, type, peakGain, freqEnd, delay, attack) {
    if (!soundOn) return;
    const ac = getAudioCtx();
    const startAt = ac.currentTime + (delay || 0);
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, startAt);
    if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), startAt + duration);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(peakGain || 0.25, startAt + (attack == null ? 0.015 : attack));
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.connect(gain).connect(getSfxDestination(ac));
    osc.start(startAt);
    osc.stop(startAt + duration + 0.02);
  }

  function playFilteredNoise(duration, peakGain, filterType, frequency, delay, attack, q) {
    if (!soundOn) return;
    const ac = getAudioCtx();
    const startAt = ac.currentTime + (delay || 0);
    const bufSize = Math.floor(ac.sampleRate * duration);
    const buffer = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const decay = Math.pow(1 - i / bufSize, 1.35);
      data[i] = (Math.random() * 2 - 1) * decay;
    }
    const src = ac.createBufferSource();
    src.buffer = buffer;
    const filter = ac.createBiquadFilter();
    filter.type = filterType || 'lowpass';
    filter.frequency.setValueAtTime(frequency || 900, startAt);
    filter.Q.value = q == null ? 0.8 : q;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(peakGain || 0.4, startAt + (attack == null ? 0.003 : attack));
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    src.connect(filter).connect(gain).connect(getSfxDestination(ac));
    src.start(startAt);
  }

  function playLaunchSound() {
    // 金属信管→撃鉄→火薬噴出→砲身の低い圧力を短時間に重ねる。
    playTone(1650, 0.028, 'square', 0.055, 980, 0, 0.001);
    playFilteredNoise(0.032, 0.16, 'highpass', 2300, 0.004, 0.001, 0.9);
    playTone(420, 0.10, 'triangle', 0.075, 285, 0.012, 0.002);
    playFilteredNoise(0.21, 0.18, 'bandpass', 760, 0.016, 0.002, 0.82);
    playFilteredNoise(0.14, 0.13, 'lowpass', 320, 0.019, 0.002, 0.7);
    playTone(126, 0.22, 'sine', 0.24, 46, 0.012, 0.002);
  }
  function playExplosionSound(blastMul) {
    // 破裂の芯・土煙・低音・飛び散る破片を重ねた小型爆発。
    const power = Math.min(1.35, Math.max(0.72, Math.sqrt(blastMul || 1)));
    playFilteredNoise(0.042, 0.23 * power, 'highpass', 1900, 0, 0.001, 0.65);
    playFilteredNoise(0.32, 0.34 * power, 'lowpass', 620, 0.003, 0.002, 0.72);
    playFilteredNoise(0.19, 0.19 * power, 'bandpass', 980, 0.012, 0.002, 0.9);
    playTone(94, 0.34, 'sine', 0.30 * power, 35, 0.002, 0.002);
    playTone(330, 0.20, 'triangle', 0.07 * power, 185, 0.018, 0.002);
    for (let i = 0; i < 4; i++) {
      playFilteredNoise(0.035 + i * 0.009, 0.055 * power, 'highpass', 1300 + i * 420, 0.045 + i * 0.038, 0.001, 1.4);
    }
  }
  function playDeadLineSound() { playTone(150, 0.22, 'sawtooth', 0.22, 60); }
  function playSpecialSound() {
    playLaunchSound();
    playTone(420, 0.28, 'triangle', 0.12, 680, 0.035, 0.005);
  }
  function playUiSound() { playTone(600, 0.08, 'sine', 0.12, 800); }
  function playVictorySound() {
    duckStageBgm(2200);
    const notes = [392, 523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      playTone(freq, 0.34, 'triangle', 0.13, freq * 1.01, i * 0.12, 0.012);
      playTone(freq / 2, 0.42, 'sine', 0.075, null, i * 0.12, 0.018);
    });
    for (const freq of [523.25, 659.25, 783.99]) {
      playTone(freq, 0.78, 'triangle', 0.08, null, 0.52, 0.025);
    }
    playFilteredNoise(0.55, 0.055, 'highpass', 3600, 0.42, 0.02, 0.7);
  }
  function playDefeatSound() {
    duckStageBgm(2100);
    const notes = [392, 349.23, 293.66, 196];
    notes.forEach((freq, i) => {
      playTone(freq, 0.34 + i * 0.04, 'triangle', 0.105, freq * 0.94, i * 0.16, 0.012);
    });
    playTone(82, 0.72, 'sine', 0.20, 38, 0.48, 0.012);
    playFilteredNoise(0.32, 0.09, 'lowpass', 260, 0.49, 0.008, 0.75);
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;
    const scale = Math.min(viewportW / VW, viewportH / VH);
    const cssW = VW * scale;
    const cssH = VH * scale;

    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.round(VW * dpr);
    canvas.height = Math.round(VH * dpr);

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  // ===== 地形生成(ピクセル単位のマスク方式:キャンバスに地形を描いて円形にくり抜く) =====
  const TERRAIN_COLS = 320; // STAGE_W=960 → 3px刻み(接地判定・描画キャッシュ用の列)
  const COL_W = STAGE_W / TERRAIN_COLS;
  const ROW_H = 4; // 縦方向の判定グリッド刻み
  const ROWS = Math.ceil(VH / ROW_H);
  const GROUND_MIN_Y = 380;   // 地形が取りうる最も高い(浅い)位置
  const GROUND_MAX_Y = 600;   // 地形が取りうる最も低い(深い)位置(下部コントローラパネルとの間に余白を確保)
  const FLOOR_Y = VH;         // 画面下端(この高さ=地面なし/場外扱い)

  // ===== ステージの見た目テーマ(空・地形・草・遠景の配色セット。試合ごとにランダムで選ぶ) =====
  const THEMES = {
    grass: {
      sky: ['#1a2340', '#2c3a63', '#4a5a8a'],
      dirtTop: '#7a5a3a', dirtBottom: '#33241a',
      rim: '#9be08a', rimShadow: '#4f8a4f',
      farHill: 'rgba(58,70,112,0.55)', nearHill: 'rgba(60,88,66,0.55)',
      cloud: 'rgba(255,255,255,0.22)'
    },
    desert: {
      sky: ['#3a2b1a', '#6b4a2a', '#c98a4a'],
      dirtTop: '#c9954a', dirtBottom: '#5a3a1c',
      rim: '#e0c37a', rimShadow: '#a97f30',
      farHill: 'rgba(110,66,40,0.5)', nearHill: 'rgba(160,110,60,0.5)',
      cloud: 'rgba(255,240,220,0.18)'
    },
    snow: {
      sky: ['#233047', '#3c5170', '#7c9bb8'],
      dirtTop: '#e8eef5', dirtBottom: '#6f7f93',
      rim: '#ffffff', rimShadow: '#b9cadd',
      farHill: 'rgba(90,110,140,0.5)', nearHill: 'rgba(140,160,182,0.45)',
      cloud: 'rgba(255,255,255,0.3)'
    },
    volcanic: {
      sky: ['#200f14', '#4a1a20', '#8a3018'],
      dirtTop: '#5a4038', dirtBottom: '#180f0d',
      rim: '#ff7a3a', rimShadow: '#a8371a',
      farHill: 'rgba(50,20,20,0.6)', nearHill: 'rgba(96,32,20,0.55)',
      cloud: 'rgba(255,160,100,0.14)'
    }
  };
  const THEME_KEYS = Object.keys(THEMES);
  const STAGE_BACKGROUND_SOURCES = {
    grass: 'assets/stage-grass-bg.jpg?v=1',
    desert: 'assets/stage-desert-bg.jpg?v=1',
    snow: 'assets/stage-snow-bg.jpg?v=1',
    volcanic: 'assets/stage-volcanic-bg.jpg?v=1'
  };
  const stageBackgroundImages = {};
  for (const key of THEME_KEYS) {
    const image = new Image();
    image.decoding = 'async';
    image.fetchPriority = 'low';
    image.src = STAGE_BACKGROUND_SOURCES[key];
    stageBackgroundImages[key] = image;
  }
  function getReadyStageBackground() {
    const image = stageBackgroundImages[currentThemeKey];
    return image && image.complete && image.naturalWidth > 0 ? image : null;
  }
  const THEME_FX = {
    grass: {
      glow: 'rgba(126,210,255,0.22)', orb: '#d9f1ff',
      particle: 'rgba(174,255,168,0.72)', strata: 'rgba(255,222,160,0.10)',
      stoneLight: 'rgba(236,213,172,0.16)', stoneDark: 'rgba(38,24,16,0.20)'
    },
    desert: {
      glow: 'rgba(255,177,82,0.34)', orb: '#ffd47d',
      particle: 'rgba(255,220,154,0.38)', strata: 'rgba(255,223,153,0.14)',
      stoneLight: 'rgba(255,226,168,0.18)', stoneDark: 'rgba(83,44,18,0.20)'
    },
    snow: {
      glow: 'rgba(156,221,255,0.30)', orb: '#eefaff',
      particle: 'rgba(255,255,255,0.72)', strata: 'rgba(214,240,255,0.17)',
      stoneLight: 'rgba(255,255,255,0.22)', stoneDark: 'rgba(62,87,116,0.17)'
    },
    volcanic: {
      glow: 'rgba(255,76,28,0.34)', orb: '#ff7040',
      particle: 'rgba(255,132,47,0.76)', strata: 'rgba(255,105,47,0.12)',
      stoneLight: 'rgba(255,142,91,0.13)', stoneDark: 'rgba(10,5,5,0.30)'
    }
  };
  let currentTheme = THEMES.grass;
  let currentThemeKey = 'grass';
  let parallaxSeed = 0; // 遠景の山の形を試合ごとに変えるための位相オフセット

  // 実体は不可視のオフスクリーンキャンバス(見た目)。塗り(source-over)で地面、destination-outで爆風の穴をあける
  const terrainCanvas = document.createElement('canvas');
  terrainCanvas.width = STAGE_W;
  terrainCanvas.height = VH;
  const terrainCtx = terrainCanvas.getContext('2d');

  // 地形マスク全体から境界線を作る専用キャンバス。最上面の点を結ぶ方式だと、浮島や縦崖を
  // またいで長い線が出るため、実際の地形シルエットを膨張させて全周の輪郭だけを抜き出す。
  const terrainRimCanvas = document.createElement('canvas');
  terrainRimCanvas.width = STAGE_W;
  terrainRimCanvas.height = VH;
  const terrainRimCtx = terrainRimCanvas.getContext('2d');
  const terrainRimLayer = document.createElement('canvas');
  terrainRimLayer.width = STAGE_W;
  terrainRimLayer.height = VH;
  const terrainRimLayerCtx = terrainRimLayer.getContext('2d');

  function paintTerrainRimLayer(color, radius) {
    terrainRimLayerCtx.save();
    terrainRimLayerCtx.clearRect(0, 0, STAGE_W, VH);
    terrainRimLayerCtx.globalCompositeOperation = 'source-over';
    terrainRimLayerCtx.imageSmoothingEnabled = true;
    for (let i = 0; i < 16; i++) {
      const angle = i * Math.PI * 2 / 16;
      terrainRimLayerCtx.drawImage(terrainCanvas, Math.cos(angle) * radius, Math.sin(angle) * radius);
    }
    terrainRimLayerCtx.globalCompositeOperation = 'source-in';
    terrainRimLayerCtx.fillStyle = color;
    terrainRimLayerCtx.fillRect(0, 0, STAGE_W, VH);
    terrainRimLayerCtx.globalCompositeOperation = 'destination-out';
    terrainRimLayerCtx.drawImage(terrainCanvas, 0, 0);
    terrainRimLayerCtx.restore();
    terrainRimCtx.drawImage(terrainRimLayer, 0, 0);
  }

  function rebuildTerrainRim() {
    terrainRimCtx.clearRect(0, 0, STAGE_W, VH);
    paintTerrainRimLayer(currentTheme.rimShadow, 6);
    paintTerrainRimLayer(currentTheme.rim, 3);
  }

  // 既存の薄床地形を土台にして、橋だと一目で分かる装飾だけを別レイヤーに描く。
  // 地形と同じクレーターで削るため、爆破後に絵だけ宙へ残ることもない。
  const bridgeCanvas = document.createElement('canvas');
  bridgeCanvas.width = STAGE_W;
  bridgeCanvas.height = VH;
  const bridgeCtx = bridgeCanvas.getContext('2d');

  function rebuildBridgeDecoration() {
    bridgeCtx.clearRect(0, 0, STAGE_W, VH);
    if (!currentBridge) return;
    const { startX, endX, y, style } = currentBridge;
    const length = endX - startX;
    const plankStep = style === 'rope' ? 11 : 15;
    const postStep = style === 'rope' ? 44 : 38;

    bridgeCtx.save();
    bridgeCtx.lineCap = 'round';
    bridgeCtx.lineJoin = 'round';

    // 橋桁と板張り
    bridgeCtx.fillStyle = '#6b3f24';
    bridgeCtx.fillRect(startX - 8, y - 6, length + 16, 19);
    bridgeCtx.fillStyle = '#b8793f';
    bridgeCtx.fillRect(startX - 5, y - 5, length + 10, 11);
    bridgeCtx.strokeStyle = '#3b2418';
    bridgeCtx.lineWidth = 2;
    for (let x = startX; x <= endX; x += plankStep) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y - 5);
      bridgeCtx.lineTo(x + Math.sin(x * 0.17 + currentBridge.seed) * 2, y + 7);
      bridgeCtx.stroke();
    }
    bridgeCtx.strokeStyle = '#2b1a12';
    bridgeCtx.lineWidth = 5;
    bridgeCtx.beginPath();
    bridgeCtx.moveTo(startX - 5, y + 13);
    bridgeCtx.lineTo(endX + 5, y + 13);
    bridgeCtx.stroke();

    // 支柱・手すり。ロープ橋は上の線を少したるませる。
    const posts = [];
    for (let x = startX; x <= endX + 1; x += postStep) posts.push(Math.min(x, endX));
    if (posts[posts.length - 1] !== endX) posts.push(endX);
    bridgeCtx.strokeStyle = '#4a2b1b';
    bridgeCtx.lineWidth = 5;
    for (const x of posts) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y + 10);
      bridgeCtx.lineTo(x, y - 32);
      bridgeCtx.stroke();
    }
    bridgeCtx.strokeStyle = style === 'rope' ? '#d3b27a' : '#7e512e';
    bridgeCtx.lineWidth = style === 'rope' ? 3 : 5;
    bridgeCtx.beginPath();
    bridgeCtx.moveTo(posts[0], y - 29);
    for (let i = 1; i < posts.length; i++) {
      if (style === 'rope') {
        const midX = (posts[i - 1] + posts[i]) / 2;
        bridgeCtx.quadraticCurveTo(midX, y - 20, posts[i], y - 29);
      } else {
        bridgeCtx.lineTo(posts[i], y - 29);
      }
    }
    bridgeCtx.stroke();

    // 地面の表面に見える補強材。長い橋ほど三角形が増えて橋らしく見える。
    bridgeCtx.strokeStyle = 'rgba(62,34,20,0.9)';
    bridgeCtx.lineWidth = 4;
    for (let x = startX; x + postStep <= endX; x += postStep) {
      bridgeCtx.beginPath();
      bridgeCtx.moveTo(x, y + 15);
      bridgeCtx.lineTo(x + postStep / 2, y + 40);
      bridgeCtx.lineTo(x + postStep, y + 15);
      bridgeCtx.stroke();
    }

    // 両端の橋台
    bridgeCtx.fillStyle = '#51483f';
    bridgeCtx.fillRect(startX - 12, y - 3, 10, 28);
    bridgeCtx.fillRect(endX + 2, y - 3, 10, 28);
    bridgeCtx.restore();
  }

  // 地形の質感用ノイズタイル(1度だけ生成し、繰り返しパターンとして焼き込む。点描だとムラや塊が
  // 出てしまうため、ピクセル単位のノイズタイルの方が均一な粒立ちになる)
  const noiseTile = document.createElement('canvas');
  noiseTile.width = 28;
  noiseTile.height = 28;
  (() => {
    const ntCtx = noiseTile.getContext('2d');
    const img = ntCtx.createImageData(28, 28);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() < 0.5 ? 0 : 255;
      img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v;
      img.data[i + 3] = Math.round(Math.random() * 46);
    }
    ntCtx.putImageData(img, 0, 0);
  })();

  // 判定用のグリッド(見た目のキャンバスとは別に、ロジック側で正確に持つ実体データ)。1=地面,0=空気
  let solidGrid = new Uint8Array(TERRAIN_COLS * ROWS);
  // 列ごとの「一番上にある地面のY」キャッシュ(接地判定・描画の草ラインに使用。掘削のたびに該当範囲だけ再走査)
  let surfaceY = new Float64Array(TERRAIN_COLS).fill(FLOOR_Y);

  function clampGround(y) {
    return Math.min(GROUND_MAX_Y, Math.max(GROUND_MIN_Y, y));
  }

  function drawTerrainDetails() {
    const fx = THEME_FX[currentThemeKey];
    const detailTop = 220;
    terrainCtx.save();
    terrainCtx.globalCompositeOperation = 'source-atop';

    // 地層の流れ。太いベタ線ではなく、ゆるい曲線を重ねて岩肌の奥行きを出す。
    terrainCtx.lineCap = 'round';
    terrainCtx.strokeStyle = fx.strata;
    terrainCtx.lineWidth = 2;
    for (let band = 0; band < 9; band++) {
      const baseY = detailTop + 26 + band * 44;
      terrainCtx.beginPath();
      for (let x = -20; x <= STAGE_W + 20; x += 18) {
        const y = baseY
          + Math.sin(x * 0.012 + band * 1.7 + parallaxSeed * 0.001) * 6
          + Math.sin(x * 0.031 + band) * 2;
        if (x === -20) terrainCtx.moveTo(x, y);
        else terrainCtx.lineTo(x, y);
      }
      terrainCtx.stroke();
    }

    // 小石と埋まった岩片。生成シードから位置を固定して、再描画時にも形が変わらないようにする。
    for (let i = 0; i < 150; i++) {
      const x = (i * 73.37 + parallaxSeed * 0.41) % STAGE_W;
      const y = detailTop + 18 + ((i * 47.19 + parallaxSeed * 0.17) % (VH - detailTop - 22));
      const rw = 2.4 + (i % 5) * 0.9;
      const rh = 1.5 + (i % 3) * 0.8;
      terrainCtx.save();
      terrainCtx.translate(x, y);
      terrainCtx.rotate(Math.sin(i * 2.13) * 0.75);
      terrainCtx.fillStyle = i % 3 === 0 ? fx.stoneLight : fx.stoneDark;
      terrainCtx.beginPath();
      terrainCtx.ellipse(0, 0, rw, rh, 0, 0, Math.PI * 2);
      terrainCtx.fill();
      if (i % 11 === 0) {
        terrainCtx.strokeStyle = fx.stoneLight;
        terrainCtx.lineWidth = 0.8;
        terrainCtx.beginPath();
        terrainCtx.moveTo(-rw * 0.65, 0);
        terrainCtx.lineTo(0, -rh * 0.45);
        terrainCtx.lineTo(rw * 0.55, rh * 0.18);
        terrainCtx.stroke();
      }
      terrainCtx.restore();
    }

    // 表面直下を少し明るくし、地面が一枚絵ではなく厚みのある断面に見えるようにする。
    const surfaceGlow = terrainCtx.createLinearGradient(0, detailTop, 0, detailTop + 320);
    surfaceGlow.addColorStop(0, 'rgba(255,255,255,0.11)');
    surfaceGlow.addColorStop(1, 'rgba(255,255,255,0)');
    terrainCtx.fillStyle = surfaceGlow;
    terrainCtx.fillRect(0, detailTop, STAGE_W, 320);
    terrainCtx.restore();
  }

  function buildTerrainMask(segments, refreshRim = true) {
    terrainCtx.clearRect(0, 0, STAGE_W, VH);
    terrainCtx.globalCompositeOperation = 'source-over';
    const grad = terrainCtx.createLinearGradient(0, GROUND_MIN_Y, 0, FLOOR_Y);
    grad.addColorStop(0, currentTheme.dirtTop);
    grad.addColorStop(1, currentTheme.dirtBottom);
    terrainCtx.fillStyle = grad;
    solidGrid.fill(0);
    for (let c = 0; c < TERRAIN_COLS; c++) {
      const x = c * COL_W;
      for (const seg of segments[c]) {
        const top = seg[0], bottom = seg[1];
        if (bottom <= top) continue;
        terrainCtx.fillRect(x, top, COL_W + 0.6, bottom - top);
        const r0 = Math.max(0, Math.floor(top / ROW_H));
        const r1 = Math.min(ROWS - 1, Math.ceil(bottom / ROW_H));
        for (let r = r0; r <= r1; r++) solidGrid[r * TERRAIN_COLS + c] = 1;
      }
    }
    // 質感付け:ピクセル単位のノイズタイルを繰り返し焼き込んで単色塗りっぽさを消す
    // (点描だと粒がランダムに寄り集まって「塊」に見えてしまうため、均一なタイルパターンにする)
    terrainCtx.save();
    terrainCtx.globalCompositeOperation = 'source-atop';
    terrainCtx.fillStyle = terrainCtx.createPattern(noiseTile, 'repeat');
    terrainCtx.fillRect(0, 0, STAGE_W, VH);
    terrainCtx.restore();
    drawTerrainDetails();
    rebuildBridgeDecoration();
    if (refreshRim) rebuildTerrainRim();
  }

  // グリッド上の地面から、列ごとの最上段Yを再計算する(軽量。掘削のたびに影響範囲だけ呼ぶ)
  function rescanColumnsFromGrid(colFrom, colTo) {
    colFrom = Math.max(0, colFrom);
    colTo = Math.min(TERRAIN_COLS - 1, colTo);
    for (let c = colFrom; c <= colTo; c++) {
      let topRow = ROWS;
      for (let r = 0; r < ROWS; r++) {
        if (solidGrid[r * TERRAIN_COLS + c]) { topRow = r; break; }
      }
      surfaceY[c] = topRow >= ROWS ? FLOOR_Y : topRow * ROW_H;
    }
  }

  // 着弾クレーターの実処理:見た目(キャンバス)と判定(グリッド)の両方を円形にくり抜く
  function carveCraterInternal(cx, cy, radius, refreshRim = true) {
    terrainCtx.save();
    terrainCtx.globalCompositeOperation = 'destination-out';
    terrainCtx.beginPath();
    terrainCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    terrainCtx.fill();
    terrainCtx.restore();
    bridgeCtx.save();
    bridgeCtx.globalCompositeOperation = 'destination-out';
    bridgeCtx.beginPath();
    bridgeCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    bridgeCtx.fill();
    bridgeCtx.restore();

    const colFrom = Math.max(0, Math.floor((cx - radius) / COL_W));
    const colTo = Math.min(TERRAIN_COLS - 1, Math.ceil((cx + radius) / COL_W));
    const rowFrom = Math.max(0, Math.floor((cy - radius) / ROW_H));
    const rowTo = Math.min(ROWS - 1, Math.ceil((cy + radius) / ROW_H));
    const r2 = radius * radius;
    for (let c = colFrom; c <= colTo; c++) {
      const colCx = (c + 0.5) * COL_W;
      for (let r = rowFrom; r <= rowTo; r++) {
        const rowCy = (r + 0.5) * ROW_H;
        const dx = colCx - cx, dy = rowCy - cy;
        if (dx * dx + dy * dy <= r2) solidGrid[r * TERRAIN_COLS + c] = 0;
      }
    }
    rescanColumnsFromGrid(colFrom, colTo);
    if (refreshRim) rebuildTerrainRim();
  }

  let craterHistory = []; // 中断/再開のため、実発射で開いたクレーターを再生可能な形で記録
  function carveTrailMark(cx, cy, radius) {
    carveCraterInternal(cx, cy, radius, false);
    craterHistory.push({ x: cx, y: cy, r: radius });
  }
  function carveCrater(cx, cy, radius) {
    carveCraterInternal(cx, cy, radius);
    craterHistory.push({ x: cx, y: cy, r: radius });
  }

  function groundYAt(x) {
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    return surfaceY[c];
  }

  // 弾の直撃判定用:列の最上段ではなく、その座標そのものに地面があるかを正確に見る
  // (浮島の下の空間などで「列の最上段=島の上」を基準にすると何もない場所で爆発してしまうため)
  function isSolidAt(x, y) {
    if (y < 0 || y >= VH) return false;
    const c = Math.min(TERRAIN_COLS - 1, Math.max(0, Math.floor(x / COL_W)));
    const r = Math.min(ROWS - 1, Math.max(0, Math.floor(y / ROW_H)));
    return solidGrid[r * TERRAIN_COLS + c] === 1;
  }

  // 骨格パターン: 片方が高台/中央に山/谷底スタート/なだらか
  function baseCurve(pattern, t) {
    // t: 0..1 (左端から右端)。yは小さいほど浅い(高い地形)、大きいほど深い(低い地形)
    const mid = (GROUND_MIN_Y + GROUND_MAX_Y) / 2;
    const range = GROUND_MAX_Y - GROUND_MIN_Y;
    switch (pattern) {
      case 'plateauLeft':
        // 左が高台(浅い)、右が低地
        return GROUND_MIN_Y + range * smoothstep(t, 0.25, 0.75);
      case 'plateauRight':
        // 右が高台(浅い)、左が低地
        return GROUND_MAX_Y - range * smoothstep(t, 0.25, 0.75);
      case 'mountainCenter':
        // 中央が山(浅い)、両端が低地(深い)
        return GROUND_MAX_Y - range * Math.sin(Math.PI * t);
      case 'valley':
        // 中央が谷(深い)、両端が高台(浅い)
        return GROUND_MIN_Y + range * Math.sin(Math.PI * t);
      case 'bridge':
        // 橋用。左右の岸を近い高さにそろえ、中央へ細い足場を架けやすくする
        return mid + Math.sin(t * Math.PI * 2) * range * 0.045;
      case 'rolling':
      default:
        return mid;
    }
  }

  function smoothstep(t, a, b) {
    const x = Math.min(1, Math.max(0, (t - a) / (b - a)));
    return x * x * (3 - 2 * x);
  }

  // 中点変位法で乱数揺らぎを加える(滑らかなノイズ)
  function midpointDisplacement(n, roughness) {
    const size = 1;
    let arr = new Float64Array(n + 1);
    arr[0] = (Math.random() - 0.5) * 2;
    arr[n] = (Math.random() - 0.5) * 2;
    let step = n;
    let scale = 1;
    while (step > 1) {
      const half = step / 2;
      for (let i = half; i < n; i += step) {
        const left = arr[i - half];
        const right = arr[i + half];
        arr[i] = (left + right) / 2 + (Math.random() - 0.5) * 2 * scale;
      }
      step = half;
      scale *= roughness;
    }
    return arr;
  }

  // スポーン地点(左15%/右85%)の列。ランダム地形イベントがここに重ならないよう避ける
  const SPAWN_COLS = [Math.round(STAGE_W * 0.15 / COL_W), Math.round(STAGE_W * 0.85 / COL_W)];
  function overlapsSpawn(start, len, margin) {
    const end = start + len;
    return SPAWN_COLS.some(sc => sc + margin >= start && sc - margin <= end);
  }

  function applyNaturalThinFloor(segments, hm, start, len, baseDepth) {
    const shoulder = Math.max(5, Math.floor(len * 0.3));
    const phase = Math.random() * Math.PI * 2;
    for (let i = 0; i < len; i++) {
      const c = start + i;
      if (c < 0 || c >= TERRAIN_COLS) continue;

      // 両端では通常の地面の厚さを保ち、中央へ向けて洞窟状になだらかに薄くする。
      const edgeDistance = Math.min(i, len - 1 - i);
      const thinBlend = smoothstep(edgeDistance, 0, shoulder);
      const organicDepth = baseDepth * (0.95 + Math.sin(i * 0.52 + phase) * 0.05);
      const fullDepth = FLOOR_Y - hm[c];
      const depth = fullDepth + (organicDepth - fullDepth) * thinBlend;
      segments[c] = [[hm[c], Math.min(FLOOR_Y, hm[c] + depth)]];
    }
  }

  const ISLAND_SHAPES = ['lens', 'long', 'jagged', 'mesa'];
  function addFloatingIsland(segments, start, len, islandTop, thickness, shape, phase) {
    for (let i = 0; i < len; i++) {
      const c = start + i;
      if (c < 0 || c >= TERRAIN_COLS) continue;
      const t = (i + 0.5) / len;
      const taper = Math.sin(t * Math.PI);
      if (taper < 0.08) continue;

      let topOffset = 0;
      let depth = thickness;
      if (shape === 'lens') {
        topOffset = (1 - taper) * thickness * 0.28;
        depth = Math.max(8, thickness * (0.35 + taper * 0.65));
      } else if (shape === 'long') {
        topOffset = Math.sin(t * Math.PI * 4 + phase) * 2;
        depth = Math.max(10, thickness * (0.7 + taper * 0.2) + Math.sin(t * 9 + phase) * 3);
      } else if (shape === 'jagged') {
        topOffset = (1 - taper) * 9 + Math.sin(t * 12 + phase) * 3.5;
        depth = Math.max(9, thickness * (0.52 + taper * 0.48) + Math.sin(t * 17 + phase) * 5);
      } else {
        // mesa:中央は平らで、両端だけ丸くすぼむ大型足場向け
        const edge = Math.max(0, (0.2 - Math.min(t, 1 - t)) / 0.2);
        topOffset = edge * 8;
        depth = Math.max(10, thickness * (0.72 + taper * 0.28));
      }

      const top = islandTop + topOffset;
      segments[c] = [[top, top + depth], ...segments[c]];
    }
  }

  function generateTerrain(pattern) {
    const patterns = ['plateauLeft', 'plateauRight', 'mountainCenter', 'valley', 'rolling', 'bridge'];
    const p = pattern || patterns[Math.floor(Math.random() * patterns.length)];

    // 中点変位のnは2の冪にする必要があるため、近い2の冪を使い後でリサンプル
    let pow = 1;
    while (pow < TERRAIN_COLS) pow *= 2;
    const noiseRaw = midpointDisplacement(pow, 0.55);
    const noiseAmp = p === 'bridge' ? 9 : 26; // 橋は接続部を安定させるため凹凸を控えめにする

    const hm = new Float64Array(TERRAIN_COLS);
    for (let i = 0; i < TERRAIN_COLS; i++) {
      const t = i / (TERRAIN_COLS - 1);
      const base = baseCurve(p, t);
      const noiseIdx = t * pow;
      const i0 = Math.floor(noiseIdx);
      const i1 = Math.min(pow, i0 + 1);
      const frac = noiseIdx - i0;
      const noiseVal = noiseRaw[i0] * (1 - frac) + noiseRaw[i1] * frac;
      hm[i] = clampGround(base + noiseVal * noiseAmp);
    }
    // 両端を少しなだらかに(プレイヤー初期足場を安定させる)
    for (let i = 0; i < 8; i++) {
      const wL = i / 8;
      hm[i] = hm[i] * wL + hm[8] * (1 - wL);
      const j = TERRAIN_COLS - 1 - i;
      hm[j] = hm[j] * wL + hm[TERRAIN_COLS - 9] * (1 - wL);
    }

    // 各列の中身(地面の実区間リスト)。基本は地表〜床までの単一の塊
    const segments = [];
    for (let c = 0; c < TERRAIN_COLS; c++) segments.push([[hm[c], FLOOR_Y]]);

    const midStart = 14, midEnd = TERRAIN_COLS - 14;
    let bridge = null;

    // 橋ステージ:既存の薄床地形に、長さが毎回変わる橋イラストを重ねる。
    if (p === 'bridge') {
      const bridgeLen = 30 + Math.floor(Math.random() * 61); // 約90〜270px
      const rawStart = Math.floor(TERRAIN_COLS / 2 - bridgeLen / 2 + (Math.random() - 0.5) * 28);
      const bridgeStart = Math.max(midStart + 18, Math.min(midEnd - bridgeLen - 18, rawStart));
      const leftY = hm[Math.max(0, bridgeStart - 1)];
      const rightY = hm[Math.min(TERRAIN_COLS - 1, bridgeStart + bridgeLen)];
      const bridgeY = clampGround((leftY + rightY) / 2 - 4);
      // 当たり判定に必要な最小限の薄さだけ残し、見た目は橋の板と桁が足場になる。
      const thinDepth = 8 + Math.random() * 5;
      for (let i = 0; i < bridgeLen; i++) {
        const c = bridgeStart + i;
        if (c < midStart || c >= midEnd) continue;
        hm[c] = bridgeY;
        segments[c] = [[bridgeY, bridgeY + thinDepth]];
      }
      bridge = {
        startX: bridgeStart * COL_W,
        endX: (bridgeStart + bridgeLen) * COL_W,
        y: bridgeY,
        style: Math.random() < 0.5 ? 'timber' : 'rope',
        seed: Math.random() * 1000
      };
    // 通常ステージにも、ときどき短い薄床を混ぜる。
    } else if (Math.random() < 0.35) {
      const zoneLen = 18 + Math.floor(Math.random() * 20);
      const zoneStart = midStart + Math.floor(Math.random() * Math.max(1, midEnd - midStart - zoneLen));
      if (!overlapsSpawn(zoneStart, zoneLen, 20)) {
        const thinDepth = 34 + Math.random() * 22;
        const actualLen = Math.min(zoneLen, midEnd - zoneStart);
        applyNaturalThinFloor(segments, hm, zoneStart, actualLen, thinDepth);
      }
    }

    // 浮島ゾーン。崖・薄床の有無とは完全に独立して抽選し、連続した普通の地面の上にも出現する。
    // 下の地面は必ず残すので、島と同じ幅の縦穴や崖は作らない。
    const floatingIslandCount = Math.random() < 0.58 ? (Math.random() < 0.22 ? 2 : 1) : 0;
    const floatingIslandRanges = [];
    for (let islandIndex = 0; islandIndex < floatingIslandCount; islandIndex++) {
      const sizeRoll = Math.random();
      const islandLen = sizeRoll < 0.22
        ? 10 + Math.floor(Math.random() * 10)
        : sizeRoll < 0.55
          ? 38 + Math.floor(Math.random() * 25)
          : 20 + Math.floor(Math.random() * 18);
      let islandStart = -1;
      for (let attempt = 0; attempt < 8; attempt++) {
        const candidate = midStart + Math.floor(Math.random() * Math.max(1, midEnd - midStart - islandLen));
        const overlapsOtherIsland = floatingIslandRanges.some(r => candidate < r.end + 10 && candidate + islandLen > r.start - 10);
        if (!overlapsSpawn(candidate, islandLen, 20) && !overlapsOtherIsland) {
          islandStart = candidate;
          break;
        }
      }
      if (islandStart >= 0) {
        let localMinY = Infinity;

    });
  }

  function rotateVec(vx, vy, deg) {
    const r = deg * Math.PI / 180;
    return { vx: vx * Math.cos(r) - vy * Math.sin(r), vy: vx * Math.sin(r) + vy * Math.cos(r) };
  }

  function spawnFireworkBurst(p) {
    const speed = 300;
    const baseAngle = Math.atan2(p.vy, p.vx);
    spawnExplosion(p.x, p.y, 0.55);
    for (let i = 0; i < 8; i++) {
      const angle = baseAngle + (Math.PI * 2 * i) / 8;
      fireProjectile(p.owner, { x: p.x, y: p.y }, Math.cos(angle) * speed, Math.sin(angle) * speed, {
        blastMul: 0.4,
        damageMul: 0.3,
        windMul: 0,
        gravityMul: 0,
        pierce: true,
        fireworkShard: true,
        maxDistance: 150,
        trailRadius: 5
      });
    }
  }

  function applyFireworkShardHit(p, u) {
    if (p.hitTargets.includes(u.side)) return;
    p.hitTargets.push(u.side);
    const damage = Math.max(1, Math.round(45 * p.damageMul * (CHARACTERS[u.character]?.damageTakenMul || 1)));
    u.hp = Math.max(0, u.hp - damage);
    spawnDamageText(u.x, u.y - UNIT_RADIUS - 10, damage);
    if (p.owner === 'player' && u.side === 'cpu') runStats.damageDealt += damage;
    checkMatchEnd();
  }

  // キャラ性能+必殺ショットを反映して発射する共通口
  function launchShot(unit, anchor, vx0, vy0, useSpecial) {
    const def = CHARACTERS[unit.character];
    const owner = unit.side;
    const activateSpecial = useSpecial && isSpecialReady(unit);

    if (activateSpecial && def.key === 'medama') {
      // 目玉の必殺: 地形を削らず、着弾点から電磁波を放って移動を封じる。
      fireProjectile(owner, anchor, vx0, vy0, {
        blastMul: def.blastMul,
        windMul: def.windMul,
        emp: true,
        empRadius: def.empRadius,
        empTurns: 2,
        noTerrain: true
      });
    } else if (activateSpecial && def.key === 'iwa') {
      // 岩の必殺: 地形大破壊(巨大クレーター)
      fireProjectile(owner, anchor, vx0, vy0, { blastMul: def.blastMul * 2.6, windMul: def.windMul });
    } else if (activateSpecial && def.key === 'tori') {
      // 鳥の必殺: 貫通せず、風と重力に強い超高速ロケット。
      fireProjectile(owner, anchor, vx0 * 1.45, vy0 * 1.45, {
        blastMul: def.blastMul,
        windMul: def.windMul * 0.55,
        gravityMul: def.gravityMul,
        damageMul: 1.05
      });
    } else if (activateSpecial && def.key === 'kyoryu') {
      // 恐竜の必殺: 強化砲弾(バランス型らしい高威力・大爆風の一撃)
      fireProjectile(owner, anchor, vx0, vy0, { blastMul: def.blastMul * 1.8, windMul: def.windMul });
    } else if (activateSpecial && def.key === 'barugerukan') {
      // バルゲルカンの必殺: 5連掃射(水弾を広範囲へばらまく)
      for (const deg of [-16, -8, 0, 8, 16]) {
        const v = rotateVec(vx0, vy0, deg);
        fireProjectile(owner, anchor, v.vx, v.vy, { blastMul: def.blastMul * 0.76, windMul: def.windMul });
      }
    } else if (activateSpecial && def.key === 'nisenmono') {
      // ニセンモノの必殺: 高速貫通レーザー
      fireProjectile(owner, anchor, vx0 * 1.8, vy0 * 1.8, { blastMul: def.blastMul * 1.2, windMul: def.windMul, pierce: true });
    } else if (activateSpecial && def.key === 'burumutan') {
      // ブルームタンの必殺: 自己回復後に花弾を発射
      const heal = Math.min(30, unit.maxHp - unit.hp);
      unit.hp += heal;
      if (heal > 0) spawnHealText(unit.x, unit.y - 32, heal);
      fireProjectile(owner, anchor, vx0, vy0, {
        blastMul: def.blastMul,
        windMul: def.windMul,
        gravityMul: def.gravityMul
      });
    } else if (activateSpecial && def.key === 'sumoeru') {
      // スモエルの必殺: 着弾または時間経過で8方向へ散る空中花火。
      fireProjectile(owner, anchor, vx0, vy0, {
        blastMul: def.blastMul * 0.72,
        windMul: def.windMul,
        firework: true
      });
    } else if (activateSpecial && def.key === 'doRednote') {
      // 弩レッドノートの必殺: 超高速の貫通狙撃
      fireProjectile(owner, anchor, vx0 * 2.15, vy0 * 2.15, { blastMul: def.blastMul * 1.25, windMul: def.windMul, pierce: true });
    } else if (activateSpecial && def.key === 'mocchario') {
      // モッチャリオの必殺: 高火力・大爆風のレーザー砲
      fireProjectile(owner, anchor, vx0 * 1.1, vy0 * 1.1, { blastMul: def.blastMul * 2.0, windMul: def.windMul });
    } else {
      fireProjectile(owner, anchor, vx0, vy0, {
        blastMul: def.blastMul,
        windMul: def.windMul,
        gravityMul: def.gravityMul
      });
    }

    if (activateSpecial) {
      unit.specialCharge = 0;
      triggerSpecialFlash(`必殺: ${def.special}!!`);
      playSpecialSound();
    } else {
      playLaunchSound();
    }
  }

  // ===== タイトル・キャラクター選択画面 =====
  let gamePhase = 'loading'; // 'loading' | 'press' | 'title' | 'select' | 'battle'
  const titleVsCpuBtn = { x: VW / 2, y: 650, w: 340, h: 76 };
  const SELECT_WHEEL_CENTER_Y = 454;
  const SELECT_WHEEL_RADIUS_Y = 328;
  const SELECT_WHEEL_ANGLE_STEP = (Math.PI * 2) / CHARACTER_LIST.length;
  const SELECT_WHEEL_DRAG_STEP = 150;
  const SELECT_WHEEL_DEPTH_SHIFT_X = 89;
  const SELECT_WHEEL_DEPTH_LIFT_Y = 18;
  const selectFocusedMainCard = { x: 187, y: SELECT_WHEEL_CENTER_Y, w: 338, h: 200 };
  const selectSortieBtn = { x: 438, y: SELECT_WHEEL_CENTER_Y, w: 168, h: 200 };
  let selectWheelPosition = 0;
  let selectWheelVelocity = 0;
  let selectWheelDragging = false;
  let selectWheelLastY = 0;
  let selectWheelLastTime = 0;
  let selectWheelTravel = 0;
  let selectWheelTapKey = null;

  function wrapSelectWheelPosition(value) {
    const count = CHARACTER_LIST.length;
    return ((value % count) + count) % count;
  }

  function getSelectWheelDelta(index) {
    const count = CHARACTER_LIST.length;
    let delta = index - selectWheelPosition;
    while (delta > count / 2) delta -= count;
    while (delta < -count / 2) delta += count;
    return delta;
  }

  function getFocusedSelectIndex() {
    return ((Math.round(selectWheelPosition) % CHARACTER_LIST.length) + CHARACTER_LIST.length) % CHARACTER_LIST.length;
  }

  function getVisibleSelectCards() {
    const focusedIndex = getFocusedSelectIndex();
    return CHARACTER_LIST.map((key, index) => {
      const delta = getSelectWheelDelta(index);
      const angle = delta * SELECT_WHEEL_ANGLE_STEP;
      const depth = Math.cos(angle);
      const alpha = depth >= 0
        ? 0.28 + depth * 0.72
        : 0.18 + (depth + 1) * 0.12;
      return {
        key,
        index,
        order: index + 1,
        delta,
        depth,
        scale: 1,
        horizontalScale: 1,
        verticalScale: 1,
        alpha,
        // 最奥のカードは発射ギアの背後まで右へ回り込み、斜め向きの水車を形作る。
        x: selectFocusedMainCard.x + (1 - depth) * SELECT_WHEEL_DEPTH_SHIFT_X,
        y: SELECT_WHEEL_CENTER_Y + Math.sin(angle) * SELECT_WHEEL_RADIUS_Y - (1 - depth) * SELECT_WHEEL_DEPTH_LIFT_Y,
        w: selectFocusedMainCard.w,
        h: selectFocusedMainCard.h,
        focused: index === focusedIndex && Math.abs(delta) < 0.15
      };
    }).sort((a, b) => a.depth - b.depth);
  }

  function getSelectCardAtPoint(point) {
    const cards = getVisibleSelectCards().slice().sort((a, b) => b.depth - a.depth);
    const focusedCard = cards.find(card => card.focused);
    if (focusedCard && (hitRect(point, selectFocusedMainCard) || hitRect(point, selectSortieBtn))) return focusedCard;
    for (const card of cards) {
      if (card.focused) continue;
      if (card.depth < 0) continue;
      const halfW = card.w * card.scale * card.horizontalScale / 2;
      const halfH = card.h * card.scale * card.verticalScale / 2;
      if (Math.abs(point.x - card.x) <= halfW && Math.abs(point.y - card.y) <= halfH) return card;
    }
    return null;
  }

  function focusSelectWheelIndex(index) {
    const delta = getSelectWheelDelta(index);
    selectWheelPosition = wrapSelectWheelPosition(selectWheelPosition + delta);
    selectWheelVelocity = 0;
  }

  function updateSelectWheel(dt) {
    if (selectWheelDragging) return;
    if (Math.abs(selectWheelVelocity) > 0.035) {
      selectWheelPosition = wrapSelectWheelPosition(selectWheelPosition + selectWheelVelocity * dt);
      selectWheelVelocity *= Math.exp(-5.8 * dt);
      return;
    }
    selectWheelVelocity = 0;
    const targetIndex = getFocusedSelectIndex();
    const delta = getSelectWheelDelta(targetIndex);
    selectWheelPosition = wrapSelectWheelPosition(selectWheelPosition + delta * Math.min(1, dt * 11));
    if (Math.abs(delta) < 0.001) selectWheelPosition = targetIndex;
  }

  function resumeSuspendedMatch() {

  function wrapText(text, x, y, maxWidth, lineHeight) {
    let line = '';
    let cy = y;
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, cy);
        line = ch;
        cy += lineHeight;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, x, cy);
  }

    if (LAST_UPDATED_TEXT) {
      ctx.fillStyle = 'rgba(255,255,255,0.38)';

  function drawLoadingScreen() {
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, VW, VH);

    const angle = (Date.now() % 3600) / 3600 * Math.PI * 2;
    const spinnerY = VH / 2 - 100;
    const spinnerX = VW / 2;
    if (loadingEmblemReady) {
      const emblemSize = 112;
      ctx.save();
      ctx.translate(spinnerX, spinnerY);
      ctx.rotate(angle);
      ctx.shadowColor = 'rgba(255,210,74,0.35)';
      ctx.shadowBlur = 14;
      ctx.drawImage(loadingEmblemImage, -emblemSize / 2, -emblemSize / 2, emblemSize, emblemSize);
      ctx.restore();
    } else {
      // エンブレムが間に合わない瞬間だけ、軽量な円弧を予備表示する。
      ctx.beginPath();
      ctx.arc(VW / 2, spinnerY, 28, angle, angle + Math.PI * 1.45);
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    const readyToStart = gamePhase === 'press';
    const pulse = 0.55 + Math.sin(Date.now() / 260) * 0.28;
    ctx.textAlign = 'center';
    if (readyToStart) {
      ctx.fillStyle = titleStartPending ? 'rgba(255,255,255,0.78)' : `rgba(255,210,74,${Math.min(1, pulse + 0.18)})`;
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(titleStartPending ? 'STARTING BGM...' : 'TAP TO START', VW / 2, VH / 2 + 30);
      ctx.fillStyle = 'rgba(255,255,255,0.70)';
      ctx.font = '11px sans-serif';
      ctx.fillText(titleStartPending ? 'タイトルを準備しています' : (titleStartFailed ? 'BGMを開始できませんでした。もう一度タップしてください' : '画面をタップしてタイトルBGMを開始'), VW / 2, VH / 2 + 53);
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('NOW LOADING...', VW / 2, VH / 2 + 30);
      ctx.fillStyle = 'rgba(255,255,255,0.62)';
      ctx.font = '11px sans-serif';
      ctx.fillText(`ゲーム画像を準備しています ${getCoreImageProgress()}/${CHARACTER_LIST.length + 2}`, VW / 2, VH / 2 + 53);
    }
    ctx.restore();
  }

  function selectRoundedRect(x, y, w, h, radius) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, radius);
    else ctx.rect(x, y, w, h);
  }

  function drawSelectStat(label, value, x, y, color) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(label, x, y);
    for (let i = 0; i < 5; i++) {
      selectRoundedRect(x + i * 13, y + 6, 10, 4, 2);
      ctx.fillStyle = i < value ? color : 'rgba(255,255,255,0.13)';
      ctx.fill();
    }
  }

  function spawnEmpPulse(x, y, radius) {
    empRings.push({ x, y, radius, life: 0.55, maxLife: 0.55 });
    const count = 18;
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const dist = radius * (0.2 + Math.random() * 0.8);
      particles.push({
        x: x + Math.cos(ang) * dist,
        y: y + Math.sin(ang) * dist,
        vx: Math.cos(ang) * 22,
        vy: Math.sin(ang) * 22,
        life: 0.45 + Math.random() * 0.3,
        maxLife: 0.75,
        color: Math.random() < 0.55 ? '#66e8ff' : '#b38cff',
        size: 2 + Math.random() * 2
      });
    }
  }

  function drawWheelSelectCard(card, def) {
    const main = { x: card.x, y: card.y, w: card.w, h: card.h };
    const left = main.x - main.w / 2;
    const top = main.y - main.h / 2;

    ctx.save();
    ctx.globalAlpha = card.alpha;
    ctx.shadowColor = card.focused ? `${def.color}aa` : 'rgba(0,0,0,0.72)';
    ctx.shadowBlur = card.focused ? 28 : 16;
    ctx.shadowOffsetY = card.focused ? 0 : 7;
    selectRoundedRect(left, top, main.w, main.h, 18);
    const cardFill = ctx.createLinearGradient(left, top, left + main.w, top + main.h);
    cardFill.addColorStop(0, 'rgba(13,23,40,0.99)');
    cardFill.addColorStop(0.72, 'rgba(24,35,52,0.98)');
    cardFill.addColorStop(1, `${def.color}42`);
    ctx.fillStyle = cardFill;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = def.color;
    ctx.lineWidth = card.focused ? 3 : 2;
    ctx.stroke();

    selectRoundedRect(left + 5, top + 5, main.w - 10, main.h - 10, 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 左側のキャラクター表示枠
    const imageBox = { x: left + 10, y: top + 10, w: 112, h: main.h - 20 };
    selectRoundedRect(imageBox.x, imageBox.y, imageBox.w, imageBox.h, 13);
    const imageGlow = ctx.createRadialGradient(
      imageBox.x + imageBox.w / 2, imageBox.y + 72, 5,
      imageBox.x + imageBox.w / 2, imageBox.y + 72, 82
    );
    imageGlow.addColorStop(0, `${def.color}48`);
    imageGlow.addColorStop(0.62, 'rgba(8,17,31,0.78)');
    imageGlow.addColorStop(1, 'rgba(3,7,16,0.96)');
    ctx.fillStyle = imageGlow;
    ctx.fill();
    ctx.strokeStyle = `${def.color}88`;
    ctx.stroke();

    const cImg = charImages[card.key];
    const cReady = cImg && cImg.complete && cImg.naturalWidth > 0;
    const imageCx = imageBox.x + imageBox.w / 2;
    const imageCy = imageBox.y + 74;
    if (cReady) {
      const imageScale = Math.min(104 / cImg.naturalWidth, 112 / cImg.naturalHeight);
      const iw = cImg.naturalWidth * imageScale;
      const ih = cImg.naturalHeight * imageScale;
      if (def.facesLeft) {
        ctx.save();
        ctx.translate(imageCx, imageCy);
        ctx.scale(-1, 1);
        ctx.drawImage(cImg, -iw / 2, -ih / 2, iw, ih);
        ctx.restore();
      } else {
        ctx.drawImage(cImg, imageCx - iw / 2, imageCy - ih / 2, iw, ih);
      }
    } else {
      ctx.beginPath();
      ctx.arc(imageCx, imageCy, 31, 0, Math.PI * 2);
      ctx.fillStyle = def.color;
      ctx.fill();
    }

    selectRoundedRect(imageBox.x + 12, imageBox.y + imageBox.h - 30, imageBox.w - 24, 19, 10);
    ctx.fillStyle = 'rgba(0,0,0,0.74)';
    ctx.fill();
    ctx.strokeStyle = `${def.color}aa`;
    ctx.stroke();
    ctx.fillStyle = def.color;
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.role, imageCx, imageBox.y + imageBox.h - 16);

    // 2/3幅の中へ情報を再配置する。
    const textX = left + 132;
    const contentRight = left + main.w - 12;
    const contentW = contentRight - textX;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${def.name.length >= 5 ? 16 : 20}px sans-serif`;
    ctx.fillText(def.name, textX, top + 31);

    selectRoundedRect(contentRight - 68, top + 12, 64, 19, 10);
    ctx.fillStyle = `${def.color}22`;
    ctx.fill();
    ctx.strokeStyle = `${def.color}99`;
    ctx.stroke();
    ctx.fillStyle = def.color;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(def.roleEn, contentRight - 36, top + 25);

    ctx.fillStyle = 'rgba(255,255,255,0.76)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    wrapText(def.desc, textX, top + 53, contentW, 13);

    drawSelectStat('耐久', def.selectStats[0], textX, top + 101, def.color);
    drawSelectStat('火力', def.selectStats[1], textX + 64, top + 101, def.color);
    drawSelectStat('機動', def.selectStats[2], textX + 128, top + 101, def.color);

    selectRoundedRect(textX, top + 127, contentW, 55, 10);
    ctx.fillStyle = 'rgba(255,210,74,0.09)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,74,0.46)';
    ctx.stroke();
    ctx.fillStyle = '#ffd24a';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('SPECIAL', textX + 9, top + 141);
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(def.special, textX + 9, top + 158);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '8px sans-serif';
    ctx.fillText(def.specialDesc, textX + 9, top + 174);

    ctx.restore();
  }

  function drawFixedSelectSortieButton() {

    ctx.save();

    // カード右端へ届く発射レバー。先端位置は常に固定。
    ctx.beginPath();
    ctx.moveTo(sortie.x - 38, sortie.y - 23);
    ctx.lineTo(cardRight, sortie.y);
    ctx.lineTo(sortie.x - 38, sortie.y + 23);
    ctx.lineTo(sortie.x - 38, sortie.y + 11);

    ctx.lineTo(sortie.x - 4, sortie.y - 11);
    ctx.lineTo(sortie.x - 38, sortie.y - 11);

    for (let i = 0; i < 12; i++) {

    ctx.shadowColor = 'rgba(255,190,62,0.42)';

    gearFill.addColorStop(0.74, '#48301e');

    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = '#ffe4a0';

    ctx.fillStyle = 'rgba(255,255,255,0.62)';
    ctx.font = 'bold 9px sans-serif';
    ctx.fillText('TAP', 0, 37);
    ctx.restore();
    ctx.restore();
  }

  function drawCharacterSelect() {
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, VW, VH);

    const headerGlow = ctx.createRadialGradient(VW / 2, 78, 0, VW / 2, 78, 260);
    headerGlow.addColorStop(0, 'rgba(79,195,247,0.15)');
    headerGlow.addColorStop(1, 'rgba(79,195,247,0)');
    ctx.fillStyle = headerGlow;
    ctx.fillRect(0, 0, VW, 145);

    ctx.strokeStyle = 'rgba(255,210,74,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(42, 88);
    ctx.lineTo(152, 88);
    ctx.moveTo(VW - 152, 88);
    ctx.lineTo(VW - 42, 88);
    ctx.stroke();
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath();
    ctx.arc(VW / 2, 88, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('モンスターを選択', VW / 2, 78);
    ctx.fillStyle = 'rgba(255,255,255,0.62)';
    ctx.font = '11px sans-serif';
    ctx.fillText('上下に回して、手前へ来た相棒を選ぼう', VW / 2, 111);

    if (hasSuspendedSave) {
      const b = resumeBtn;
      selectRoundedRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, 12);
      ctx.fillStyle = 'rgba(27,45,78,0.96)';
      ctx.fill();
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText('▶ 中断した対戦を再開', b.x, b.y + 5);
    }

    // 手前左から出撃ギアの背後へ回り込む、横角度のついた楕円水車軌道。
    ctx.save();
    const wheelCenterX = selectFocusedMainCard.x + SELECT_WHEEL_DEPTH_SHIFT_X;
    const wheelCenterY = SELECT_WHEEL_CENTER_Y - SELECT_WHEEL_DEPTH_LIFT_Y;
    const wheelHalo = ctx.createRadialGradient(wheelCenterX, wheelCenterY, 30, wheelCenterX, wheelCenterY, 340);
    wheelHalo.addColorStop(0, 'rgba(79,195,247,0.12)');
    wheelHalo.addColorStop(0.52, 'rgba(255,210,74,0.035)');
    wheelHalo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wheelHalo;
    ctx.fillRect(0, 118, VW, 720);
    ctx.strokeStyle = 'rgba(79,195,247,0.16)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 13]);
    for (const lane of [-1, 1]) {
      const laneOffset = lane * 7;
      ctx.beginPath();
      for (let sample = 0; sample <= 72; sample++) {
        const angle = (sample / 72) * Math.PI * 2;
        const depth = Math.cos(angle);
        const x = selectFocusedMainCard.x + (1 - depth) * SELECT_WHEEL_DEPTH_SHIFT_X + laneOffset;
        const y = SELECT_WHEEL_CENTER_Y
          + Math.sin(angle) * SELECT_WHEEL_RADIUS_Y
          - (1 - depth) * SELECT_WHEEL_DEPTH_LIFT_Y;
        if (sample === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 124, VW, 708);
    ctx.clip();
    const visibleCards = getVisibleSelectCards();
    for (let cardIndex = 0; cardIndex < visibleCards.length; cardIndex++) {
      const card = visibleCards[cardIndex];
      const def = CHARACTERS[card.key];
      drawWheelSelectCard(card, def);
      continue;
      if (card.focused) {
        drawFocusedSelectCard(card, def);
        continue;
      }
      ctx.save();
      ctx.translate(card.x, card.y);
      ctx.globalAlpha = card.alpha;
      ctx.scale(card.scale * card.horizontalScale, card.scale * card.verticalScale);

      ctx.shadowColor = card.focused ? `${def.color}aa` : 'rgba(0,0,0,0.65)';
      ctx.shadowBlur = card.focused ? 28 : 18;
      ctx.shadowOffsetY = card.focused ? 0 : 8;
      selectRoundedRect(-card.w / 2, -card.h / 2, card.w, card.h, 17);
      const cardFill = ctx.createLinearGradient(-card.w / 2, -card.h / 2, card.w / 2, card.h / 2);
      cardFill.addColorStop(0, 'rgba(15,24,42,0.97)');
      cardFill.addColorStop(0.68, 'rgba(26,35,52,0.94)');
      cardFill.addColorStop(1, card.focused ? `${def.color}42` : `${def.color}22`);
      ctx.fillStyle = cardFill;
      ctx.fill();
      ctx.shadowColor = 'transparent';

      ctx.strokeStyle = def.color;
      ctx.lineWidth = card.focused ? 3 : 2;
      ctx.stroke();
      selectRoundedRect(-card.w / 2 + 5, -card.h / 2 + 5, card.w - 10, card.h - 10, 13);
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1;
      ctx.stroke();

      selectRoundedRect(-card.w / 2, -card.h / 2 + 18, 5, card.h - 36, 3);
      ctx.fillStyle = def.color;
      ctx.fill();

      const imageBox = { x: -card.w / 2 + 14, y: -card.h / 2 + 14, w: 132, h: card.h - 28 };
      selectRoundedRect(imageBox.x, imageBox.y, imageBox.w, imageBox.h, 13);
      const imageGlow = ctx.createRadialGradient(imageBox.x + imageBox.w / 2, -10, 4, imageBox.x + imageBox.w / 2, -10, 80);
      imageGlow.addColorStop(0, `${def.color}33`);
      imageGlow.addColorStop(0.65, 'rgba(10,18,32,0.74)');
      imageGlow.addColorStop(1, 'rgba(4,8,18,0.92)');
      ctx.fillStyle = imageGlow;
      ctx.fill();
      ctx.strokeStyle = `${def.color}77`;
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(imageBox.x + imageBox.w / 2, 39, 48, 8, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.38)';
      ctx.fill();

      const cImg = charImages[card.key];
      const cReady = cImg && cImg.complete && cImg.naturalWidth > 0;
      const imageCx = imageBox.x + imageBox.w / 2;
      const imageCy = -7;
      if (cReady) {
        const imageScale = Math.min(118 / cImg.naturalWidth, 94 / cImg.naturalHeight);
        const iw = cImg.naturalWidth * imageScale;
        const ih = cImg.naturalHeight * imageScale;
        // 選択画面では全キャラを右向きで統一。左向き素材だけここで反転する。
        if (def.facesLeft) {
          ctx.save();
          ctx.translate(imageCx, imageCy);
          ctx.scale(-1, 1);
          ctx.drawImage(cImg, -iw / 2, -ih / 2, iw, ih);
          ctx.restore();
        } else {
          ctx.drawImage(cImg, imageCx - iw / 2, imageCy - ih / 2, iw, ih);
        }
      } else {
        ctx.beginPath();
        ctx.arc(imageCx, imageCy, 31, 0, Math.PI * 2);
        ctx.fillStyle = def.color;
        ctx.fill();
      }

      selectRoundedRect(imageCx - 44, 48, 88, 18, 9);
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fill();
      ctx.strokeStyle = `${def.color}99`;
      ctx.stroke();
      ctx.fillStyle = def.color;
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(def.role, imageCx, 61);

      const textX = -card.w / 2 + 160;
      const contentRight = card.w / 2 - 14;
      const contentW = contentRight - textX;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${def.name.length >= 5 ? 17 : 22}px sans-serif`;
      ctx.fillText(def.name, textX, -48);

      const roleX = contentRight - 122;
      selectRoundedRect(roleX, -65, 70, 20, 10);
      ctx.fillStyle = `${def.color}22`;
      ctx.fill();
      ctx.strokeStyle = `${def.color}99`;
      ctx.stroke();
      ctx.fillStyle = def.color;
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(def.roleEn, roleX + 35, -51);

      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.font = 'bold 30px monospace';
      ctx.fillText(String(card.order).padStart(2, '0'), contentRight, -45);

      ctx.textAlign = 'left';
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      wrapText(def.desc, textX, -22, contentW, 14);

      drawSelectStat('耐久', def.selectStats[0], textX, 16, def.color);
      drawSelectStat('火力', def.selectStats[1], textX + 96, 16, def.color);
      drawSelectStat('機動', def.selectStats[2], textX + 192, 16, def.color);

      selectRoundedRect(textX, 40, contentW, 32, 9);
      ctx.fillStyle = 'rgba(255,210,74,0.09)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,210,74,0.48)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#ffd24a';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('SPECIAL', textX + 10, 51);
      ctx.font = 'bold 12px sans-serif';
      ctx.fillText(def.special, textX + 10, 66);
      ctx.fillStyle = 'rgba(255,255,255,0.60)';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(def.specialDesc, contentRight - 10, 65);

      if (card.focused) {
        ctx.textAlign = 'center';
        selectRoundedRect(-55, -card.h / 2 - 13, 110, 22, 11);
        ctx.fillStyle = def.color;
        ctx.fill();
        ctx.fillStyle = '#071019';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('●  READY  ●', 0, -card.h / 2 + 2);

        ctx.strokeStyle = '#fff2ad';
        ctx.lineWidth = 2;
        const corner = 19;
        const edgeX = card.w / 2 + 7;
        const edgeY = card.h / 2 + 7;
        for (const sx of [-1, 1]) {
          for (const sy of [-1, 1]) {
            ctx.beginPath();
            ctx.moveTo(sx * (edgeX - corner), sy * edgeY);
            ctx.lineTo(sx * edgeX, sy * edgeY);
            ctx.lineTo(sx * edgeX, sy * (edgeY - corner));
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }
    ctx.restore();
    drawFixedSelectSortieButton();

    // 出撃ボタンは固定。手前で止まったカードへ矢印だけがぴったり接続する。
    const focusedIndex = getFocusedSelectIndex();

    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↑  上下にスワイプ  ↓', VW / 2, 856);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`${String(focusedIndex + 1).padStart(2, '0')} / ${String(CHARACTER_LIST.length).padStart(2, '0')}`, VW / 2, 884);

    if (LAST_UPDATED_TEXT) {
      ctx.fillStyle = 'rgba(255,255,255,0.34)';
      ctx.font = '10px sans-serif';
      ctx.fillText(LAST_UPDATED_TEXT, VW / 2, VH - 16);
    }
    ctx.restore();
  }

  // 直撃>至近>爆風減衰のダメージ計算(blastMulでキャラの爆風サイズを反映)
  function computeDamage(dist, blastMul, damageMul = 1) {
    const DIRECT = 20 * blastMul, CLOSE = 48 * blastMul, BLAST = 100 * blastMul;
    if (dist <= DIRECT) return Math.round(45 * damageMul);
    if (dist <= CLOSE) return Math.round((45 - (dist - DIRECT) / (CLOSE - DIRECT) * 20) * damageMul);
    if (dist <= BLAST) return Math.round((25 - (dist - CLOSE) / (BLAST - CLOSE) * 25) * damageMul);
    return 0;
  }

  function emitEmp(x, y, radius, owner, turns) {
    spawnEmpPulse(x, y, radius);
    triggerShake(2.5, 0.16);
    for (const u of [player, cpu]) {
      if (u.side === owner) continue;
      const dist = Math.hypot(u.x - x, u.y - y);
      if (dist > radius) continue;
      const baseDamage = dist <= radius * 0.35 ? 20 : 10;
      const damage = Math.max(1, Math.round(baseDamage * (CHARACTERS[u.character]?.damageTakenMul || 1)));
      u.hp = Math.max(0, u.hp - damage);
      u.moveLockTurns = Math.max(u.moveLockTurns || 0, turns);
      spawnDamageText(u.x, u.y - UNIT_RADIUS - 10, damage);
      if (owner === 'player' && u.side === 'cpu') runStats.damageDealt += damage;
    }
    triggerSpecialFlash(`電磁波: 移動封印 ${turns}手`);
    playExplosionSound(0.8);
    checkMatchEnd();
  }

  function explodeAt(x, y, blastMul, owner, damageMul = 1) {
    blastMul = blastMul || 1;
    carveCrater(x, y, 44 * blastMul);
    spawnExplosion(x, y, blastMul);
    triggerShake(4 + 4 * blastMul, 0.12 + 0.08 * blastMul);
    playExplosionSound(blastMul);
    for (const u of [player, cpu]) {
      const a = unitAnchor(u);
      const dist = Math.hypot(a.x - x, a.y - y);
      const dmg = computeDamage(dist, blastMul, damageMul);
      if (dmg > 0) {
        const takenMul = CHARACTERS[u.character]?.damageTakenMul || 1;
        const actualDamage = Math.max(1, Math.round(dmg * takenMul));
        u.hp = Math.max(0, u.hp - actualDamage);
        spawnDamageText(a.x, a.y - UNIT_RADIUS - 10, actualDamage);
        if (owner === 'player' && u.side === 'cpu') runStats.damageDealt += actualDamage;
      }
    }
    checkMatchEnd();
  }

  function estimateFlightTime(vx0, vy0, gravity = GRAVITY) {
    // ほぼ水平(vy0が±1px/s程度)なドラッグはatan2/sinの浮動小数点誤差で
    // vy0がごく僅かな負値になり得るため、しきい値を設けてフォールバックに逃がす
    if (vy0 < -1) return Math.min(3, (2 * Math.abs(vy0)) / gravity);
    return 0.6;
  }

  // 水平付近では「発射高度へ戻るまでの時間」がほぼ0になるため、時間だけで
  // ガイド長を決めると点が発射位置に固まる。角度に関係なく最低限の距離を見せる。
  const TRAJECTORY_PREVIEW_MIN_DISTANCE = 100;
  const TRAJECTORY_PREVIEW_MAX_MIN_TIME = 0.45;
  function trajectoryPreviewDuration(vx0, vy0, gravity = GRAVITY) {
    const normalPreviewTime = estimateFlightTime(vx0, vy0, gravity) * 0.2;
    const speed = Math.max(1, Math.hypot(vx0, vy0));
    const minimumVisibleTime = Math.min(
      TRAJECTORY_PREVIEW_MAX_MIN_TIME,
      TRAJECTORY_PREVIEW_MIN_DISTANCE / speed
    );
    return Math.max(normalPreviewTime, minimumVisibleTime);
  }

  function checkMatchEnd() {
    if (matchOver) return;
    if (player.hp <= 0 || cpu.hp <= 0) {
      matchOver = true;
      winner = (player.hp <= 0 && cpu.hp <= 0) ? 'cpu' : (player.hp <= 0 ? 'cpu' : 'player');
      applyStreakResult();
    }
  }

  function judgeByHp() {
    matchOver = true;
    const pr = player.hp / player.maxHp;
    const cr = cpu.hp / cpu.maxHp;
    winner = pr > cr ? 'player' : 'cpu'; // 同率は引き分けなし・CPU勝ち扱い
    applyStreakResult();
  }

  let lastRunStreak = 0;
  let lastRunEfficiency = 0;
  function applyStreakResult() {
    if (winner === 'player') {
      winStreak++;
      playVictorySound();
    } else {
      lastRunStreak = winStreak;
      lastRunEfficiency = currentEfficiency();
      winStreak = 0;
      runStats = { damageDealt: 0, shots: 0 }; // 連勝が途切れたら次の挑戦は与ダメ効率もリセット
      playDefeatSound();
    }
  }

  function startTurn() {
    if (turnCount % 4 === 0) rollWind(); // 風は自分・相手2ターンずつ(計4ターン)固定
    if (currentTurn === 'player') {
      player.fuel = player.fuelMax;
    } else {
      cpu.fuel = cpu.fuelMax;
      cpuThinkTimer = 0.7 + Math.random() * 0.5;
      const plan = planCpuMove();
      cpuMoveDir = plan.dir;
      cpuMoveRemaining = plan.distance;
      cpuPhase = cpuMoveRemaining > 0 ? 'move' : 'aim';
    }
  }

  function endTurn() {
    if (matchOver) return;
    const actingUnit = currentTurn === 'player' ? player : cpu;
    if (actingUnit.moveLockTurns > 0) actingUnit.moveLockTurns--;
    // そのキャラが1手番を終えるごとに1段階。使用した手番の終了時から再充填を始める。
    advanceSpecialCharge(actingUnit);
    turnCount++;
    if (turnCount >= MAX_TURNS_TOTAL) {
      showCutIn('タイムアップ!', '判定は…', 1.6, () => { judgeByHp(); });
      return;
    }
    currentTurn = currentTurn === 'player' ? 'cpu' : 'player';
    startTurn();
    showCutIn(currentTurn === 'player' ? 'あなたのターン' : 'CPUのターン', '', 0.9);
  }

  // ===== CPU AI(精度成長型)=====
  // 連勝数が伸びるほど理論弾道からの誤差が縮む。20連勝〜はほぼ正解弾道。
  function cpuAccuracyTier(streak) {
    if (streak < 3) return { name: 'low', jitter: 0.38 };
    if (streak < 10) return { name: 'mid', jitter: 0.20 };
    if (streak < 20) return { name: 'high', jitter: 0.09 };
    return { name: 'perfect', jitter: 0.02 };
  }

  // CPUの移動計画:危機回避(近すぎる)・攻撃調整(遠すぎる)の時だけ動く。むやみに動かない。
  let cpuMoveDir = 0;
  let cpuMoveRemaining = 0;
  let cpuPhase = 'aim'; // 'move' | 'aim'

  function planCpuMove() {
    const tier = cpuAccuracyTier(winStreak);
    if (cpu.moveLockTurns > 0) return { dir: 0, distance: 0 };
    if (tier.name === 'low') return { dir: 0, distance: 0 }; // 1〜3連勝は動かない

    const dist = Math.abs(player.x - cpu.x);
    const NEAR = 150;  // 近すぎ(自爆や反撃のリスク)→離れる
    const FAR = 500;   // 遠すぎ(命中率のため)→寄る

    let dir = 0;
    if (dist < NEAR) dir = cpu.x < player.x ? -1 : 1;
    else if (dist > FAR) dir = cpu.x < player.x ? 1 : -1;
    if (dir === 0) return { dir: 0, distance: 0 };

    // 中ティアは必要な時でも半分の確率でしか動かない(様子見)
    if (tier.name === 'mid' && Math.random() < 0.5) return { dir: 0, distance: 0 };

    const willingness = tier.name === 'perfect' ? 1 : tier.name === 'high' ? 0.85 : 0.6;
    return { dir, distance: cpu.fuelMax * willingness };
  }

  function cpuAutoTurn() {
    if (matchOver || projectiles.length) return;
    const anchor = unitAnchor(cpu);
    const target = unitAnchor(player);
    const def = CHARACTERS[cpu.character];
    const baseT = Math.min(1.7, Math.max(0.7, Math.abs(target.x - anchor.x) / 230)) * def.tBias;
    const tier = cpuAccuracyTier(winStreak);
    const useSpecial = isSpecialReady(cpu) && (tier.name === 'high' || tier.name === 'perfect');
    const aimWindMul = useSpecial && def.key === 'tori' ? def.windMul * 0.55 : (def.windMul || 1);
    const launchSpeedMul = useSpecial ? (def.specialVelocityMul || 1) : 1;
    const { vx0, vy0 } = perfectAimVelocity(anchor, target, baseT, def.gravityMul || 1, aimWindMul, launchSpeedMul);
    const jitter = tier.jitter;
    const vx = vx0 * (1 + (Math.random() * 2 - 1) * jitter);
    const vy = vy0 * (1 + (Math.random() * 2 - 1) * jitter);
    launchShot(cpu, anchor, vx, vy, useSpecial);
    awaitingResolve = true;
  }

  // 高低差・現在の風を考慮して(anchor→target)を正確に結ぶ「理論上の正解弾道」を逆算
  function perfectAimVelocity(anchor, target, tHint, gravityMul = 1, windMul = 1, launchSpeedMul = 1) {
    const dx = target.x - anchor.x;
    const dy = target.y - anchor.y;
    const distAbs = Math.max(1, Math.abs(dx));
    const t = tHint || Math.min(1.7, Math.max(0.7, distAbs / 230));
    const windAccel = wind.dir * wind.strength * WIND_ACCEL_MAX * windMul;
    const gravity = GRAVITY * gravityMul;
    const vx0 = ((dx - 0.5 * windAccel * t * t) / t) / launchSpeedMul;
    const vy0 = ((dy - 0.5 * gravity * t * t) / t) / launchSpeedMul;
    return { vx0, vy0, t };
  }

  function eliminateAtDeadLine(u) {
    if (u.hp <= 0 || u.y + UNIT_RADIUS < DEAD_LINE_Y) return false;
    u.hp = 0;
    u.vy = 0;
    u.grounded = true;
    playDeadLineSound();
    triggerShake(5, 0.18);
    checkMatchEnd();
    return true;
  }

  function updateFalling(dt, u) {
    // 地面が残っていても、車体下端がデッドラインへ触れた時点で敗北。
    if (eliminateAtDeadLine(u)) return;
    if (u.grounded) {
      const nearbyGround = walkableGroundYAt(u.x, u.y + UNIT_RADIUS);
      const groundY = (nearbyGround === null ? u.y + UNIT_RADIUS : nearbyGround) - UNIT_RADIUS;
      if (groundY > u.y + 2) {
        // 足場が崩れて落下開始
        u.grounded = false;
        u.vy = 0;
        u.fallStartY = u.y;
      } else {
        u.y = groundY; // 地形に追従(登り降りはそのまま歩ける)
      }
    } else {
      const previousFeetY = u.y + UNIT_RADIUS;
      u.vy += GRAVITY * dt;
      u.y += u.vy * dt;
      if (eliminateAtDeadLine(u)) return;
      const g2 = groundYBelow(u.x, previousFeetY) - UNIT_RADIUS;
      if (u.y >= g2) {
        const intoVoid = g2 >= FLOOR_Y - UNIT_RADIUS - 2; // クレーターが底まで貫通=場外
        const fallDist = g2 - u.fallStartY;
        u.y = g2;
        u.vy = 0;
        u.grounded = true;
        if (fallDist > 15) {
          triggerShake(3, 0.1);
        }
        if (u.hp > 0) {
          if (intoVoid) {
            u.hp = 0; // 場外落下は即死(落下ダメージ自体は計算しない)
          }
          checkMatchEnd();
        }
      }
    }
  }

  // ===== 描画 =====
  function drawSky() {
    const fx = THEME_FX[currentThemeKey];
    const g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, currentTheme.sky[0]);
    g.addColorStop(0.55, currentTheme.sky[1]);
    g.addColorStop(1, currentTheme.sky[2]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH);

    const stageBackground = getReadyStageBackground();
    if (stageBackground) {
      ctx.drawImage(stageBackground, 0, 0, VW, VH);
      // HUD・弾道・キャラクターの視認性を保ちつつ、生成背景の色彩を残す。
      const readabilityShade = ctx.createLinearGradient(0, 0, 0, VH);
      readabilityShade.addColorStop(0, 'rgba(5,10,18,0.06)');
      readabilityShade.addColorStop(0.48, 'rgba(5,10,18,0.03)');
      readabilityShade.addColorStop(1, 'rgba(5,10,18,0.19)');
